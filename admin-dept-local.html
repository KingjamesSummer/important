<head>

<link rel="stylesheet" href="assets/admin-dept-console-v2.css?v=3">
<style>
:root{font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;color:#315a84;background:#f6faff}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f6faff}button,input,select,textarea{font:inherit}button{cursor:pointer}
.app{width:100%;height:100vh;display:grid;grid-template-columns:238px minmax(0,1fr);background:#f6faff}.sidebar{height:100vh;display:flex;flex-direction:column;border-right:1px solid #dceafb;background:#fff;overflow:hidden}.brand{height:66px;display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid #e5eff9}.brand-mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid #cfe1f6;border-radius:11px;background:#f2f8ff;color:#1769ff;font-size:11px;font-weight:800}.brand-copy{min-width:0}.brand-copy strong{display:block;color:#152f50;font-size:16px}.brand-copy span{display:block;margin-top:3px;color:#8297ad;font-size:9px;white-space:nowrap}.nav-scroll{flex:1;min-height:0;overflow:auto;padding:14px 10px}.nav-title{padding:12px 10px 7px;color:#7c9aba;font-size:10px;font-weight:700}.nav-item{position:relative;width:100%;height:42px;display:flex;align-items:center;gap:10px;margin:2px 0;padding:0 12px;border:1px solid transparent;border-radius:9px;background:#fff;color:#4c7197;text-align:left}.nav-item:hover{border-color:#d7e9fb;background:#f3f9ff;color:#075edf}.nav-item.active{border-color:#afd2fb;background:#e8f3ff;color:#075edf;font-weight:700;box-shadow:inset 3px 0 #1769ff}.nav-item .icon-stack{width:18px;height:18px}.ad-console-scope{margin:10px 14px 8px;padding:12px;border:1px solid #d7e7f8;border-radius:11px;background:#f8fbff}.ad-console-scope span{display:block;color:#8096ac;font-size:9px}.ad-console-scope strong{display:block;margin-top:6px;color:#244d76;font-size:11px;line-height:1.55}.ad-console-return{height:38px;margin:0 14px 14px;border:1px solid #cfe1f5;border-radius:9px;background:#fff;color:#1769ff}.shell{min-width:0;height:100vh;display:flex;flex-direction:column}.topbar{height:62px;flex:none;display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid #dceafb;background:#fff}.breadcrumb{display:flex;align-items:center;gap:8px;color:#7b91a8;font-size:11px}.breadcrumb b{color:#294c70}.breadcrumb .sep{color:#bdd0e2}.top-spacer{flex:1}.global-search{width:min(400px,36vw);height:37px;display:flex;align-items:center;gap:8px;padding:0 11px;border:1px solid #cfe2f7;border-radius:10px;background:#f7fbff;color:#6286aa}.global-search input{min-width:0;flex:1;border:0;outline:0;background:transparent;color:#315a84;font-size:10px}.kbd{padding:2px 6px;border:1px solid #d5e5f6;border-radius:5px;background:#fff;color:#7b96b2;font-size:8px}.top-icon{position:relative;width:36px;height:36px;display:grid;place-items:center;border:0;border-radius:9px;background:#fff;color:#50769d}.top-icon:hover{background:#eef6ff;color:#075edf}.top-icon .dot{position:absolute;right:7px;top:6px;width:6px;height:6px;border:2px solid #fff;border-radius:50%;background:#1769ff}.profile-wrap{position:relative}.avatar{width:35px;height:35px;display:grid;place-items:center;border:1px solid #bdd8f7;border-radius:10px;background:#edf6ff;color:#075edf;font-weight:750}.profile-pop{position:absolute;right:0;top:44px;z-index:3000;width:230px;padding:8px;border:1px solid #d7e6f5;border-radius:12px;background:#fff;box-shadow:0 18px 45px rgba(30,70,115,.18)}.profile-card-head{display:flex;align-items:center;gap:9px;padding:8px}.profile-avatar{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:#eaf4ff;color:#075edf;font-weight:750}.profile-card-head strong,.profile-card-head span{display:block}.profile-card-head strong{color:#244c73;font-size:11px}.profile-card-head span{margin-top:2px;color:#879bae;font-size:8px}.profile-item{width:100%;height:35px;display:flex;align-items:center;gap:8px;padding:0 9px;border:0;border-radius:7px;background:#fff;color:#426a91;text-align:left;font-size:10px}.profile-item:hover{background:#eef6ff;color:#075edf}.profile-item span{margin-left:auto;color:#879caf;font-size:8px}.profile-item.danger{color:#b43d4b}.menu-sep{height:1px;margin:5px 4px;background:#e9f0f7}.main{flex:1;min-height:0;overflow:auto;padding:20px 22px 28px;background:#f6faff}.page{max-width:1600px;margin:0 auto}.page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}.page-head-main{min-width:0}.page-title-row{display:flex;align-items:center;gap:8px}.page-title{margin:0;color:#12365e;font-size:22px;line-height:1.25}.page-subtitle{margin:6px 0 0;color:#7790a9;font-size:11px}.page-actions{margin-left:auto;display:flex;align-items:center;gap:8px}.btn{height:38px;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 13px;border:1px solid #d2e3f5;border-radius:9px;background:#fff;color:#315a84;white-space:nowrap}.btn:hover{border-color:#96c2f3;background:#f4f9ff;color:#075edf}.btn.primary{border-color:#1769ff;background:#1769ff;color:#fff;box-shadow:0 6px 14px rgba(23,105,255,.14)}.btn.primary:hover{border-color:#0756d6;background:#0756d6;color:#fff}.btn.danger{border-color:#d84a58;background:#d84a58;color:#fff}.btn.ghost{background:transparent}.btn.text{height:auto;padding:0;border:0;background:transparent;color:#075edf}.btn.sm{height:32px;padding:0 10px;font-size:10px}.btn.compact{height:30px;padding:0 9px;font-size:9px}.btn.icon-only{width:36px;padding:0}.badge{height:23px;display:inline-flex;align-items:center;padding:0 8px;border-radius:7px;background:#f1f6fb;color:#587895;font-size:9px}.badge.blue{border:1px solid #bfd9f7;background:#eaf4ff;color:#075edf}.notice{padding:10px 12px;border:1px solid #cfe2f6;border-radius:9px;background:#f3f9ff;color:#52789e;font-size:10px}.notice.danger-notice{border-color:#f2c8cc;background:#fff4f5;color:#a53c48}.search-box{height:37px;display:flex;align-items:center;gap:8px;padding:0 10px;border:1px solid #d2e3f5;border-radius:9px;background:#fff;color:#6485a5}.search-box input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:#315a84;font-size:10px}.input,.select{width:100%;height:38px;padding:0 10px;border:1px solid #d2e3f5;border-radius:9px;background:#fff;color:#315a84;outline:0}.input:focus,.select:focus{border-color:#76aff6;box-shadow:0 0 0 3px rgba(23,105,255,.07)}.field{display:grid;gap:6px}.field label{color:#4e6f90;font-size:10px}.spacer{flex:1}.icon-stack{width:17px;height:17px;display:inline-grid;place-items:center;flex:none;color:currentColor}.icon-stack svg{width:100%;height:100%;display:block;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.local-admin-fallback{padding:24px;border:1px solid #d7e7f8;border-radius:13px;background:#fff}.local-admin-fallback h2{margin:0 0 8px;color:#183f69;font-size:17px}.local-admin-fallback p{margin:0;color:#7890a8;line-height:1.8;font-size:11px}.local-toast-root{position:fixed;right:22px;top:78px;z-index:5000;display:grid;gap:8px}.local-toast{min-width:250px;max-width:380px;padding:12px 14px;border:1px solid #cfe2f6;border-radius:10px;background:#fff;color:#315a84;box-shadow:0 16px 40px rgba(26,65,108,.16);font-size:10px;line-height:1.6}.local-toast.warning{border-color:#f0d4aa;background:#fffaf1;color:#9b631e}@media(max-width:980px){.app{grid-template-columns:210px minmax(0,1fr)}.global-search{width:260px}}
</style>
</head>
<body class="admin-console-v2">
<div id="app"></div><div class="local-toast-root" id="localToastRoot"></div>
<script>
(function(){
  const paths={building:'<path d="M4 21V7l8-4v18M12 9h8v12M7 10h2M7 14h2M7 18h2M15 13h2M15 17h2M3 21h18"/>',users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',user:'<path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"/>',shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10ZM9 12l2 2 4-4"/>',chart:'<path d="M4 19V9M10 19V5M16 19v-7M22 19H2"/>',lock:'<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>',bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/>',info:'<circle cx="12" cy="12" r="10"/><path d="M12 11v6M12 7h.01"/>',external:'<path d="M14 3h7v7M10 14 21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>',down:'<path d="m6 9 6 6 6-6"/>',more:'<circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>',plus:'<path d="M12 5v14M5 12h14"/>',edit:'<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/>',move:'<path d="M5 9 2 12l3 3M19 9l3 3-3 3M9 5l3-3 3 3M9 19l3 3 3-3M2 12h20M12 2v20"/>',trash:'<path d="M3 6h18M8 6V4h8v2M19 6l-1 15H6L5 6M10 11v6M14 11v6"/>',folder:'<path d="M3 6h7l2 2h9v11H3Z"/>',check:'<path d="m5 12 4 4L19 6"/>',transfer:'<path d="M7 7h11l-3-3M17 17H6l3 3"/>',copy:'<rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/>',x:'<path d="m6 6 12 12M18 6 6 18"/>',eye:'<path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>',download:'<path d="M12 3v12M7 10l5 5 5-5M5 21h14"/>',file:'<path d="M6 2h8l4 4v16H6Z"/><path d="M14 2v5h5M9 13h6M9 17h6"/>',clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'};
  window.state={page:'admin',adminTab:'dept',profileOpen:false,toasts:[]};
  window.safe=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
  window.icon=name=>`<span class="icon-stack" aria-hidden="true"><svg viewBox="0 0 24 24">${paths[name]||paths.file}</svg></span>`;
  window.pageHead=(title,sub,actions='',badge='')=>`<div class="page-head"><div class="page-head-main"><div class="page-title-row"><h1 class="page-title">${safe(title)}</h1>${badge}</div><p class="page-subtitle">${safe(sub)}</p></div><div class="page-actions">${actions}</div></div>`;
  window.toast=(message,type='success')=>{const root=document.getElementById('localToastRoot');if(!root)return;const item=document.createElement('div');item.className=`local-toast ${type}`;item.textContent=String(message||'');root.appendChild(item);setTimeout(()=>item.remove(),2800)};
  window.profileMenu=()=>`<div class="profile-pop" onclick="event.stopPropagation()"><div class="profile-card-head"><div class="profile-avatar">张</div><div><strong>张明远</strong><span>系统管理员 · 全集团</span></div></div><div class="menu-sep"></div><button class="profile-item" onclick="toast('管理账号安全设置已打开')">${icon('shield')}账号与安全</button><div class="menu-sep"></div><button class="profile-item danger" onclick="toast('已安全退出当前账号','warning')">${icon('external')}退出登录</button></div>`;
  window.sidebar=()=>`<aside class="sidebar"><div class="brand"><div class="brand-mark">GDG</div><div class="brand-copy"><strong>GDG知识库</strong><span>智能知识库管理平台 · 管理端</span></div></div><div class="nav-scroll"><div class="nav-title">组织与成员</div><button class="nav-item active">${icon('building')}<span>部门管理</span></button><button class="nav-item">${icon('users')}<span>成员管理</span></button><button class="nav-item">${icon('shield')}<span>管理员设置</span></button><div class="nav-title">治理与审计</div><button class="nav-item">${icon('chart')}<span>统计报表</span></button><button class="nav-item">${icon('lock')}<span>安全配置</span></button></div><div class="ad-console-scope"><span>当前管理范围</span><strong>贵安发展集团及全部下级组织</strong></div><button class="ad-console-return">${icon('external')}打开用户端</button></aside>`;
  window.breadcrumb=()=>`<div class="breadcrumb"><span>GDG知识库</span><span class="sep">/</span><span>管理中心</span><span class="sep">/</span><b>部门管理</b></div>`;
  window.topbar=()=>`<header class="topbar">${breadcrumb()}<div class="top-spacer"></div><div class="global-search">${icon('search')}<input placeholder="搜索部门、成员或管理功能" readonly><span class="kbd">Ctrl K</span></div><button class="top-icon">${icon('bell')}<i class="dot"></i></button><button class="top-icon">${icon('info')}</button><div class="profile-wrap"><button class="avatar" onclick="event.stopPropagation();state.profileOpen=!state.profileOpen;render()">张</button>${state.profileOpen?profileMenu():''}</div></header>`;
  window.adminContent=()=>`<section class="local-admin-fallback"><h2>${safe({member:'成员管理',grant:'管理员设置',stats:'统计报表',security:'安全配置'}[state.adminTab]||'管理中心')}</h2><p>当前本地直开模式优先保障部门管理与日志审计模块。其他管理模块请从对应优化页面进入。</p></section>`;
  window.adminPage=()=>adminContent();
  window.render=()=>{const app=document.getElementById('app');if(app)app.innerHTML=`<div class="app">${sidebar()}<section class="shell">${topbar()}<main class="main"><div class="page">${adminPage()}</div></main></section></div>`};
  document.addEventListener('click',()=>{if(state.profileOpen){state.profileOpen=false;render()}});
})();
</script>
<script src="assets/admin-dept-console-v2.js?v=4"></script>
<script src="assets/admin-dept-console-v11.js?v=5"></script>
<script src="assets/admin-dept-console-v12.js?v=3"></script>
<script src="assets/admin-audit-console-v1.js?v=2"></script>
<script>if(location.hash==='#audit'&&typeof setAdminTab==='function')setAdminTab('audit');else if(typeof setAdminTab==='function')setAdminTab('dept');else render();</script>
</body>
</html>
