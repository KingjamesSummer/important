<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDG知识库｜成员管理</title>
<link rel="stylesheet" href="assets/admin-member-local.css">
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">知</div><div><strong>智汇云知</strong><small>智能知识库管理平台 · 管理端</small></div></div>
    <nav class="nav">
      <div class="nav-title">组织与成员</div>
      <a class="nav-item" href="web-prototype.html?console=admin#dept">▦ 部门管理</a>
      <a class="nav-item active" href="#">♙ 成员管理</a>
      <a class="nav-item" href="web-prototype.html?console=admin#grant">♢ 管理员设置</a>
      <div class="nav-title" style="margin-top:16px">治理与审计</div>
      <a class="nav-item" href="web-prototype.html?console=admin#audit">▥ 统计报表</a>
      <a class="nav-item" href="web-prototype.html?console=admin#audit">▤ 日志审计</a>
      <a class="nav-item" href="web-prototype.html?console=admin#security">▣ 安全配置</a>
    </nav>
    <div class="side-foot"><div class="scope">当前管理范围<strong>贵安发展集团及全部下级组织</strong></div><button class="open-user">↗ 打开用户端</button></div>
  </aside>
  <header class="top">
    <div class="crumb">智能知识库　/　管理中心　/　<b>成员管理</b></div>
    <div class="top-right"><div class="global-search">⌕ <input placeholder="搜索部门、成员或管理功能"></div><span>♧</span><span>ⓘ</span><div class="avatar-top">张</div></div>
  </header>
  <main class="main">
    <section class="page">
      <div class="head">
        <div><h1>成员管理</h1><p>管理成员进入、部门归属、账号状态与文件资产交接</p></div>
        <div class="actions"><button class="btn" data-sync>↻ 同步 MDM</button><button class="btn" data-import>⇩ 批量导入</button><button class="btn primary" data-add>＋ 添加成员</button></div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="work">
        <aside class="tree">
          <div class="tree-head"><strong>组织范围</strong><button>展开全部</button></div>
          <div class="search">⌕ <input id="deptSearch" placeholder="搜索部门"></div>
          <div class="nodes" id="deptNodes"></div>
        </aside>
        <section class="panel">
          <div class="toolbar">
            <div class="filters">
              <div class="search">⌕ <input id="memberSearch" placeholder="搜索姓名、工号、手机号或邮箱"></div>
              <select class="select" id="statusFilter"><option value="all">全部状态</option><option value="normal">正常</option><option value="disabled">停用</option><option value="pending">待完善</option></select>
              <select class="select" id="roleFilter"><option value="all">全部管理身份</option><option>系统管理员</option><option>分级管理员</option><option>部门负责人</option><option>文件管理员</option></select>
              <button class="reset" data-reset>重置筛选</button>
            </div>
          </div>
          <div class="bulk hidden" id="bulkBar"><span>已选择 <b id="selectedCount">0</b> 名成员</span><div><button class="btn small" data-bulk="dept">调整部门</button> <button class="btn small" data-bulk="disable">停用</button> <button class="btn small" data-bulk="enable">启用</button> <button class="btn small" data-bulk="export">导出</button> <button class="btn small" data-bulk="clear">取消选择</button></div></div>
          <div class="table-wrap">
            <table class="table">
              <colgroup><col style="width:38px"><col style="width:150px"><col style="width:90px"><col style="width:125px"><col style="width:125px"><col style="width:150px"><col style="width:115px"><col style="width:75px"><col style="width:85px"><col style="width:105px"></colgroup>
              <thead><tr><th><input class="check" id="selectAll" type="checkbox"></th><th>成员</th><th>工号/账号</th><th>联系方式</th><th>所属部门</th><th>管理身份</th><th>文件权限</th><th>状态</th><th>最近活跃</th><th>操作</th></tr></thead>
              <tbody id="memberBody"></tbody>
            </table>
          </div>
          <div class="pagination"><span id="pageInfo"></span><div class="pages" id="pages"></div></div>
        </section>
      </div>
    </section>
  </main>
</div>
<script src="assets/admin-member-local.js"></script>
</body>
</html>
