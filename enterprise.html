<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜企业空间</title>
<meta name="theme-color" content="#f3f6f8">
<style>html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#eef3f6;color:#5b7085;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loading{padding:22px 26px;border:1px solid #dce5eb;border-radius:14px;background:#fff;box-shadow:0 12px 30px rgba(31,52,72,.08)}</style>
</head>
<body><div class="loading">正在加载企业空间…</div>
<script src="enterprise-payload-1.js"></script>
<script src="enterprise-payload-2.js"></script>
<script src="enterprise-payload-3.js"></script>
<script src="enterprise-payload-4a.js"></script>
<script src="enterprise-payload-4b.js"></script>
<script>
(async()=>{try{const raw=atob(window.__enterprisePayload||'');const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(err){console.error(err);document.body.innerHTML='<div class="loading">企业空间加载失败，请使用最新版 Edge 或 Chrome 浏览器。</div>'}})();
</script>
</body>
</html>
