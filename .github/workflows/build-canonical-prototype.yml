name: Build canonical web prototype

on:
  issues:
    types: [opened, reopened, edited]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: canonical-prototype-main
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.issue.title == '[temporary] Run canonical prototype build')
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Report start
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Deterministic canonical finalizer started.'
            });

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser driver
        shell: bash
        run: |
          set -o pipefail
          npm install --no-save --package-lock=false playwright-core@1.55.0 2>&1 | tee -a canonical-build.log

      - name: Select runner Chrome
        shell: bash
        run: |
          set -o pipefail
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME_PATH"
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "Browser: $CHROME_PATH" | tee -a canonical-build.log

      - name: Prepare finalizer
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee -a canonical-build.log
          from pathlib import Path
          import re

          p = Path('tools/finalize-authoritative.mjs')
          s = p.read_text(encoding='utf-8')

          marker = "const REPLACEMENTS = ["
          semantic = r"""const REPLACEMENTS = [
            [/public-shell-hotfix(?:-v\d+)?/gi, 'public-shell-refinement'],
            [/admin-shell-hotfix(?:-v\d+)?/gi, 'admin-shell-refinement'],
            [/admin-grant-polish(?:-v\d+)?/gi, 'admin-grant-refinement'],
            [/admin-dept-console-v\d+/gi, 'admin-department'],
            [/admin-dept-polish-v\d+/gi, 'admin-department-refinement'],
            [/__personalSpaceV8Loaded/g, '__personalCoreReady'],
            [/__personalSpaceV9Loaded/g, '__personalNavigationReady'],
            [/__personalSpaceV10Loaded/g, '__personalDetailsReady'],
            [/__personalSpaceV11Loaded/g, '__personalToolbarReady'],
            [/__personalSpaceV12Loaded/g, '__personalTransferReady'],
            [/__personalSpaceV13Loaded/g, '__personalDropdownReady'],
            [/__collaborationSpaceV1Loaded/g, '__collaborationCoreReady'],
            [/__collaborationSpaceV2Loaded/g, '__collaborationFilesReady'],
            [/__collaborationSpaceV3Loaded/g, '__collaborationDetailReady'],
            [/__collaborationSpaceV4Loaded/g, '__collaborationLayoutReady'],
            [/__collaborationSpaceV5Loaded/g, '__collaborationListReady'],
            [/__collaborationSpaceV6Loaded/g, '__collaborationActionsReady'],
            [/__adminDeptConsoleV2/g, '__adminDepartmentLayoutReady'],
            [/__adminDeptConsoleV3/g, '__adminDepartmentInteractionReady'],
            [/__adminDeptConsoleV9/g, '__adminDepartmentThemeReady'],
            [/__adminDeptConsoleV11/g, '__adminDepartmentFinalReady'],"""
          if marker not in s:
              raise SystemExit('Replacement marker not found')
          s = s.replace(marker, semantic, 1)

          s, guard_count = re.subn(
              r"function removeVersionScaffolding\(code\) \{[\s\S]*?\n\}",
              "function removeVersionScaffolding(code) { return code; }",
              s,
              count=1,
          )
          if guard_count != 1:
              raise SystemExit('Version scaffolding function not found')

          validation = r'''async function validateInBrowser(origin) {
            const executablePath = process.env.CHROME_PATH || undefined;
            const browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox', '--disable-dev-shm-usage'] });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            const errors = [];
            const localCodeRequests = [];
            try {
              page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
              page.on('console', message => { if (message.type() === 'error') errors.push(`console: ${message.text()}`); });
              page.on('request', request => {
                try {
                  const url = new URL(request.url());
                  if (url.origin === origin && /\.(?:js|css)$/i.test(url.pathname)) localCodeRequests.push(url.href);
                } catch {}
              });
              await page.route('**/*', async route => {
                const request = route.request();
                try {
                  const url = new URL(request.url());
                  if (url.origin !== origin) {
                    if (request.resourceType() === 'script') {
                      const stub = url.href.includes('anime')
                        ? 'window.anime=function(){return {pause(){},play(){}}};window.anime.timeline=function(){return {add(){return this}}};'
                        : '';
                      await route.fulfill({ status: 200, contentType: 'application/javascript', body: stub });
                      return;
                    }
                    if (request.resourceType() === 'stylesheet') {
                      await route.fulfill({ status: 200, contentType: 'text/css', body: '' });
                      return;
                    }
                    if (['font', 'image'].includes(request.resourceType())) {
                      await route.abort();
                      return;
                    }
                  }
                } catch {}
                await route.continue();
              });

              await page.goto(`${origin}/web-prototype.html`, { waitUntil: 'domcontentloaded', timeout: 20000 });
              await page.waitForFunction(() => document.querySelector('#app') && document.body.innerText.length > 100, null, { timeout: 10000 });

              const clickText = async text => page.evaluate(label => {
                const normalize = value => String(value || '').replace(/\s+/g, ' ').trim();
                const visible = element => {
                  const style = getComputedStyle(element);
                  const rect = element.getBoundingClientRect();
                  return style.display !== 'none' && style.visibility !== 'hidden' && rect.width > 0 && rect.height > 0;
                };
                const nodes = [...document.querySelectorAll('button,a,[role="button"],.nav-item,.menu-item,.admin-menu button')];
                const target = nodes.find(node => visible(node) && normalize(node.textContent) === label)
                  || nodes.find(node => visible(node) && normalize(node.textContent).includes(label));
                if (!target) return false;
                target.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, view: window }));
                return true;
              }, text);

              for (const route of ['工作台', '企业空间', '个人空间', '协作空间', '检索', '管理中心']) {
                if (!await clickText(route)) throw new Error(`Unable to open module: ${route}`);
                await page.waitForTimeout(180);
              }
              for (const section of ['部门管理', '成员管理', '管理员设置', '统计报表', '安全配置']) {
                await clickText('管理中心');
                await page.waitForTimeout(120);
                if (!await clickText(section)) throw new Error(`Unable to open admin module: ${section}`);
                await page.waitForTimeout(180);
              }

              await clickText('个人空间');
              const row = page.locator('tbody tr').first();
              if (await row.count()) await row.click({ button: 'right', timeout: 1000 }).catch(() => {});
              await clickText('协作空间');
              const card = page.locator('.collab-card').first();
              if (await card.count()) await card.click({ timeout: 1000 }).catch(() => {});
            } finally {
              await browser.close().catch(() => {});
            }

            const meaningful = errors.filter(item => !/favicon|ERR_ABORTED|Failed to load resource/i.test(item));
            if (localCodeRequests.length) throw new Error(`Local JS/CSS requests remain:\n${localCodeRequests.join('\n')}`);
            if (meaningful.length) throw new Error(`Browser validation errors:\n${meaningful.join('\n')}`);
          }'''
          s, validation_count = re.subn(
              r"async function validateInBrowser\(origin\) \{[\s\S]*?\n\}\n\nasync function main",
              validation + "\n\nasync function main",
              s,
              count=1,
          )
          if validation_count != 1:
              raise SystemExit('Browser validation function not found')

          close_line = "await new Promise(resolve => server.close(resolve));"
          if close_line not in s:
              raise SystemExit('Server close target not found')
          s = s.replace(close_line, "server.closeAllConnections?.();\n    await new Promise(resolve => server.close(resolve));", 1)

          p.write_text(s, encoding='utf-8')
          print(f'Finalizer prepared: guards={guard_count}, validation={validation_count}')
          PY

      - name: Finalize and validate authoritative prototype
        shell: bash
        run: |
          set -o pipefail
          node tools/finalize-authoritative.mjs 2>&1 | tee -a canonical-build.log

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-web-prototype
          path: |
            web-prototype.html
            canonical-build.log
          retention-days: 7

      - name: Commit canonical source to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web-prototype.html
          if git diff --cached --quiet; then
            echo "No canonical source changes to commit."
            exit 0
          fi
          git commit -m "refactor: make web prototype canonical"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Canonical prototype build completed, browser validation passed, and web-prototype.html was committed to main.'
            });

      - name: Report failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'No build log was produced.';
            if (fs.existsSync('canonical-build.log')) log = fs.readFileSync('canonical-build.log', 'utf8').slice(-12000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Canonical prototype build failed.\n\n\`\`\`text\n${log}\n\`\`\``
            });
