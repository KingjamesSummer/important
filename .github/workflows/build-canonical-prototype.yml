name: Build canonical web prototype

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: canonical-prototype-main
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.issue.title == '[temporary] Run canonical prototype build')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        shell: bash
        run: |
          set -o pipefail
          {
            npm install --no-save \
              playwright@1.55.0 \
              cheerio@1.0.0 \
              postcss@8.5.6 \
              cssnano@7.1.0 \
              @babel/parser@7.28.0 \
              @babel/traverse@7.28.0 \
              @babel/generator@7.28.0 \
              terser@5.43.1
            npx playwright install --with-deps chromium
          } 2>&1 | tee -a canonical-build.log

      - name: Build and validate authoritative prototype
        id: canonical_build
        shell: bash
        run: |
          set -o pipefail
          node tools/build-canonical-prototype-v2.mjs 2>&1 | tee -a canonical-build.log

      - name: Upload generated prototype
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-web-prototype
          path: |
            web-prototype.html
            canonical-build.log
          retention-days: 7

      - name: Commit canonical source to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web-prototype.html
          if git diff --cached --quiet; then
            echo "No canonical source changes to commit."
            exit 0
          fi
          git commit -m "refactor: make web prototype canonical"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Canonical prototype build completed and committed to main.'
            });

      - name: Report failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'No build log was produced.';
            if (fs.existsSync('canonical-build.log')) log = fs.readFileSync('canonical-build.log', 'utf8').slice(-7000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Canonical prototype build failed.\n\n\`\`\`text\n${log}\n\`\`\``
            });
