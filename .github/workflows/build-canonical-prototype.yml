name: Build canonical web prototype

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: canonical-prototype-main
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.issue.title == '[temporary] Run canonical prototype build')
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Report start
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Lightweight canonical finalizer started.'
            });

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser driver
        shell: bash
        run: |
          set -o pipefail
          npm install --no-save --package-lock=false playwright-core@1.55.0 2>&1 | tee -a canonical-build.log

      - name: Select runner Chrome
        shell: bash
        run: |
          set -o pipefail
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "No preinstalled Chrome/Chromium found." | tee -a canonical-build.log
            exit 1
          fi
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "Browser: $CHROME_PATH" | tee -a canonical-build.log

      - name: Finalize and validate authoritative prototype
        shell: bash
        run: |
          set -o pipefail
          node tools/finalize-authoritative.mjs 2>&1 | tee -a canonical-build.log

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-web-prototype
          path: |
            web-prototype.html
            canonical-build.log
          retention-days: 7

      - name: Commit canonical source to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web-prototype.html
          if git diff --cached --quiet; then
            echo "No canonical source changes to commit."
            exit 0
          fi
          git commit -m "refactor: make web prototype canonical"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Canonical prototype build completed, browser validation passed, and web-prototype.html was committed to main.'
            });

      - name: Report failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'No build log was produced.';
            if (fs.existsSync('canonical-build.log')) log = fs.readFileSync('canonical-build.log', 'utf8').slice(-10000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Canonical prototype build failed.\n\n\`\`\`text\n${log}\n\`\`\``
            });
