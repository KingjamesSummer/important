name: Personal space refinement

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/personal-space-v6.yml

permissions:
  contents: write

# One-time validated application; the workflow is returned to manual-only after success.
jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply personal-space v6
        run: python scripts/personal_space_v6.py

      - name: Apply v6.1 icon hotfix
        run: python scripts/personal_space_v6_1.py

      - name: Apply personal-space v7
        run: python scripts/personal_space_v7.py

      - name: Validate generated prototype
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html = Path('web-prototype.html').read_text(encoding='utf-8')
          required = [
              'personal-space-v6-information-layout',
              'personal-space-v6-1-icon-hotfix',
              'personal-space-v7-functional-polish',
              'function personalPagination',
              'function personalPathbar',
              'function personalBulkControl',
              'function personalFolderCount',
              'function personalDestinationNodes',
              'function movePersonalEntries',
              'function copyPersonalEntry',
              '最近活动',
              '访问范围',
              'vscode-icons:default-folder',
              'personalPageSize:8',
              "openModal('destination',{space:'personal',mode:'copy'})",
          ]
          for item in required:
              assert item in html, item

          assert "${selectionBar('personal')}" not in html
          assert 'oncontextmenu="openMenu' in html
          assert 'personal-pagination' in html
          assert 'personal-bulk-menu' in html
          assert "name:'差旅票据归档.zip'" in html
          assert '${destinationTree(mode)}' in html

          blocks = re.findall(r'<script(?:\s[^>]*)?>([\s\S]*?)</script>', html, re.I)
          inline = [block for block in blocks if block.strip()]
          assert inline
          Path('/tmp/web-prototype.js').write_text(inline[-1], encoding='utf-8')
          PY
          node --check /tmp/web-prototype.js

      - name: Commit validated prototype
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web-prototype.html scripts/personal_space_v6.py scripts/personal_space_v6_1.py scripts/personal_space_v7.py
          git commit -m 'feat: complete personal space information layout'
          git push
