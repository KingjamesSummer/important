/* ===== authoritative boundary ===== */

/* Enterprise space: reuse the personal-space file-list language. */
.enterprise-mode .nav-item.active{background:var(--primary-soft);color:var(--primary)}
.enterprise-mode .nav-item.active:before{background:var(--primary)}
.enterprise-nav-caret{margin-left:auto;width:16px;height:16px;display:grid;place-items:center;color:var(--muted);transition:transform .16s}
.enterprise-nav-caret .icon{width:13px;height:13px}
.enterprise-nav-caret.collapsed{transform:rotate(-90deg)}
.enterprise-org-tree{margin:3px 0 12px 22px;padding:2px 0 5px 10px;border-left:1px solid var(--line)}
.enterprise-org-tree.collapsed{display:none}
.enterprise-org-root{min-height:35px;display:grid;grid-template-columns:22px minmax(0,1fr) auto;align-items:center;gap:7px;padding:0 7px;border-radius:8px}
.enterprise-tree-toggle,.enterprise-org-label{border:0;background:transparent;color:var(--sub)}
.enterprise-tree-toggle{width:22px;height:28px;display:grid;place-items:center;padding:0;border-radius:6px;transition:transform .16s}
.enterprise-tree-toggle:hover{background:var(--line-soft);color:var(--primary)}
.enterprise-tree-toggle.collapsed{transform:rotate(-90deg)}
.enterprise-tree-toggle .icon{width:13px;height:13px}
.enterprise-org-label{min-width:0;height:34px;display:flex;align-items:center;gap:8px;padding:0;text-align:left;font-size:12px;font-weight:600}
.enterprise-org-label:hover{color:var(--primary)}
.enterprise-org-label .icon,.enterprise-dept-nav .icon{width:15px;height:15px}
.enterprise-org-root small,.enterprise-dept-nav small{color:var(--muted);font-size:10px;font-weight:500}
.enterprise-org-children{padding-left:22px}
.enterprise-org-children.collapsed{display:none}
.enterprise-dept-nav{width:100%;height:36px;display:flex;align-items:center;gap:8px;padding:0 8px;border:0;border-radius:8px;background:transparent;color:var(--sub);font-size:12px;text-align:left;transition:.14s}
.enterprise-dept-nav:hover{background:#f4f7fb;color:#24446d}
.enterprise-dept-nav.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.enterprise-dept-nav small{margin-left:auto}

/* Legacy deep tree fix. */
.enterprise-org-tree-v4{
  min-width:0!important;
  overflow:visible!important;
}
.enterprise-dept-group-v4,
.enterprise-dept-children-v4{
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  margin-left:0!important;
  box-sizing:border-box!important;
}
.enterprise-dept-children-v4{
  padding-left:0!important;
}
.enterprise-dept-children-v4 .enterprise-dept-children-v4{
  padding-left:0!important;
  margin-left:0!important;
}
.enterprise-dept-nav-v4{
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  box-sizing:border-box!important;
  overflow:hidden!important;
}
.enterprise-dept-nav-v4 strong{
  display:block!important;
  min-width:0!important;
  width:auto!important;
  max-width:100%!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
  white-space:nowrap!important;
}
.enterprise-dept-nav-v4 .icon-stack{
  flex:0 0 15px!important;
}

/* Current organization tree: reserve real width for department names. */
.enterprise-mode .enterprise-org-v7{

  width:100%!important;

}

  max-width:none!important;
  min-height:38px!important;

}

.enterprise-page .page-actions:empty{display:none}
.enterprise-panel{display:flex;flex-direction:column;min-height:calc(100vh - 170px);overflow:visible;position:relative}
.enterprise-panel>.enterprise-filter-pop{top:58px;right:88px}
.enterprise-file-content{flex:1;min-height:0;align-items:stretch}
.enterprise-file-content>.table-zone,.enterprise-file-content>.grid-zone{min-height:0}
.enterprise-file-table{table-layout:fixed}

/* ===== authoritative boundary ===== */

/* Workbench v4 — white + powder-blue system theme. */
body.workbench-v4{
  --wb-primary:var(--primary,#2563eb);
  --wb-primary-hover:var(--primary-hover,#1d4ed8);
  --wb-primary-soft:#eef5ff;
  --wb-primary-line:#d9e6f7;
  --wb-ink:#17263a;
  --wb-text:#53677d;
  --wb-muted:#8798aa;
}
body.workbench-v4 .main{
  padding:26px 28px 34px;
  background:
    radial-gradient(circle at 18% -8%,rgba(37,99,235,.09),transparent 34%),
    linear-gradient(180deg,#f4f8ff 0%,#f8fbff 46%,#f3f7fc 100%);
}
body.workbench-v4 .page{max-width:1580px}
body.workbench-v4 .page-head{margin-bottom:18px;padding:2px 2px 0}
body.workbench-v4 .page-title{font-size:24px;color:var(--wb-ink);letter-spacing:-.35px}
body.workbench-v4 .page-subtitle{color:#7890aa}
body.workbench-v4 .page-actions{display:none!important}

/* Top overview cards: restrained white cards with blue-family accents. */
body.workbench-v4 .stats-grid{
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-bottom:16px;
  align-items:stretch;
  perspective:1200px;
}
body.workbench-v4 .stat-card{
  --card-accent:#4f86e8;
  --card-accent-rgb:79,134,232;
  --mx:78%;
  --my:20%;
  --rx:0deg;
  --ry:0deg;
  position:relative;
  isolation:isolate;
  min-height:118px;
  height:100%;
  padding:18px 18px 16px;
  overflow:hidden;
  border:1px solid rgba(var(--card-accent-rgb),.20);
  border-radius:14px;
  background:
    radial-gradient(circle at var(--mx) var(--my),rgba(var(--card-accent-rgb),.075),transparent 34%),
    linear-gradient(145deg,rgba(255,255,255,.99) 0%,rgba(250,252,255,.99) 70%,rgba(var(--card-accent-rgb),.045) 100%);
  box-shadow:0 8px 22px rgba(47,88,145,.055),inset 0 1px rgba(255,255,255,.94);
  cursor:pointer;
  transform:perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) translateY(0);
  transform-style:preserve-3d;
  will-change:transform,box-shadow;
  transition:transform .22s cubic-bezier(.2,.75,.25,1),border-color .2s,box-shadow .22s,background .22s;
}
body.workbench-v4 .stat-card::before{
  content:"";
  position:absolute;
  z-index:2;
  left:0;
  right:0;
  top:0;
  height:3px;
  background:linear-gradient(90deg,rgba(var(--card-accent-rgb),.22),var(--card-accent),rgba(var(--card-accent-rgb),.28));
  background-size:200% 100%;
  animation:wbAccentDrift 6.2s ease-in-out infinite;
}
body.workbench-v4 .stat-card::after{
  content:"";
  position:absolute;
  z-index:0;
  width:132px;
  height:132px;
  right:-54px;
  top:-66px;
  border-radius:50%;
  border:1px solid rgba(var(--card-accent-rgb),.11);
  background:linear-gradient(145deg,rgba(var(--card-accent-rgb),.09),rgba(255,255,255,.18));
  box-shadow:0 18px 42px rgba(var(--card-accent-rgb),.06);
  pointer-events:none;

  /* Personal space v11.3: pure white surfaces, vivid tags and clean selection states */
  :root{--ps-blue:#1769ff;--ps-blue-soft:#edf5ff;--ps-blue-line:#9fc2f8;--ps-violet:#6d5dfc;--ps-violet-soft:#f5f2ff;--ps-violet-line:#cfc7ff;--ps-line:#dfe7f1;--ps-text:#2d4059;--ps-muted:#7f8fa3}

/* ===== authoritative boundary ===== */

/* Workbench premium card motion — bright, restrained and interaction-driven. */
body.workbench-v4 .stat-card{
  background:
    radial-gradient(circle at var(--mx,78%) var(--my,20%),rgba(255,255,255,.34) 0%,rgba(255,255,255,.12) 18%,transparent 38%),
    linear-gradient(138deg,var(--sun-a) 0%,var(--sun-b) 56%,var(--sun-c) 100%)!important;
  transform:perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateY(0);
  transform-style:preserve-3d;
  transition:
    transform .24s cubic-bezier(.2,.75,.25,1),
    box-shadow .24s ease,
    filter .24s ease,
    border-color .24s ease;
}
body.workbench-v4 .stat-card::before{
  content:""!important;
  position:absolute!important;
  inset:-36%!important;
  z-index:0!important;
  border-radius:inherit!important;
  background:
    conic-gradient(from 210deg,
      transparent 0deg,
      rgba(255,255,255,.10) 48deg,
      transparent 112deg,
      rgba(255,255,255,.07) 210deg,
      transparent 286deg)!important;
  opacity:.38;
  transform:rotate(0deg) scale(1.04);
  pointer-events:none;
  animation:wbPremiumAurora 18s linear infinite!important;
}
body.workbench-v4 .stat-card::after{
  content:""!important;
  display:block!important;
  position:absolute!important;
  inset:-48% auto -48% -42%!important;
  width:28%!important;
  height:auto!important;
  z-index:0!important;
  border:0!important;
  border-radius:0!important;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent)!important;
  box-shadow:none!important;
  transform:skewX(-18deg) translateX(-190%)!important;
  pointer-events:none;
  animation:wbPremiumSheen 10.5s cubic-bezier(.35,.05,.25,1) infinite!important;
  animation-delay:calc(var(--card-index,0) * 1.15s)!important;
}
body.workbench-v4 .stat-card:hover{
  transform:perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateY(-4px) scale(1.006);
  filter:saturate(1.08) brightness(1.055);
}
body.workbench-v4 .stat-card:active{
  transform:perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateY(-1px) scale(.993);
  transition-duration:.10s;
}
body.workbench-v4 .stat-top,
body.workbench-v4 .stat-number,
body.workbench-v4 .stat-note,
body.workbench-v4 .stat-icon{
  transform-style:preserve-3d;
  transition:transform .24s cubic-bezier(.2,.75,.25,1),text-shadow .24s ease,box-shadow .24s ease;
}
body.workbench-v4 .stat-card:hover .stat-top{transform:translateZ(18px) translateY(-1px)}
body.workbench-v4 .stat-card:hover .stat-number{transform:translateZ(24px) translateY(-2px);text-shadow:0 5px 16px rgba(18,54,110,.26)}
body.workbench-v4 .stat-card:hover .stat-note{transform:translateZ(14px) translateY(-1px)}
body.workbench-v4 .stat-card:hover .stat-icon{
  transform:translateZ(28px) translateY(-3px) scale(1.065) rotate(-2deg);
  box-shadow:0 12px 24px rgba(17,66,132,.18),inset 0 1px rgba(255,255,255,.56)!important;
}
body.workbench-v4 .stat-card:nth-child(even):hover .stat-icon{transform:translateZ(28px) translateY(-3px) scale(1.065) rotate(2deg)}
body.workbench-v4 .stat-card:focus-visible{
  outline:3px solid rgba(255,255,255,.72)!important;
  outline-offset:3px;
}
@keyframes wbPremiumAurora{
  from{transform:rotate(0deg) scale(1.04)}
  to{transform:rotate(360deg) scale(1.04)}
}
@keyframes wbPremiumSheen{
  0%,68%{transform:skewX(-18deg) translateX(-190%);opacity:0}
  72%{opacity:.65}
  88%{transform:skewX(-18deg) translateX(620%);opacity:.18}
  100%{transform:skewX(-18deg) translateX(620%);opacity:0}
}
@media(prefers-reduced-motion:reduce){
  body.workbench-v4 .stat-card,
  body.workbench-v4 .stat-card::before,
  body.workbench-v4 .stat-card::after,
  body.workbench-v4 .stat-top,
  body.workbench-v4 .stat-number,
  body.workbench-v4 .stat-note,
  body.workbench-v4 .stat-icon{
    animation:none!important;
    transition:none!important;
    transform:none!important;
  }
}

    border-color .20s ease;

body.workbench-v4 .activity:hover .activity-avatar{

  filter:saturate(1.04) brightness(1.015);
  border-color:color-mix(in srgb,var(--avatar-border) 68%,var(--avatar-ink));
  box-shadow:
    0 2px 4px rgba(35,63,106,.08),
    0 8px 16px rgba(35,63,106,.12),
    inset 0 1px rgba(255,255,255,.94),
    inset 0 -1px rgba(79,117,169,.06);
}
body.workbench-v4 .activity:active .activity-avatar{
  transform:translateY(0) scale(.985);
}
@media(prefers-reduced-motion:reduce){
  body.workbench-v4 .activity-avatar{transition:none!important;transform:none!important}
}

function enterprise(){return `${pageHead('企业空间','组织级文件资产按部门资料库统一治理',`<span class="badge blue">当前权限：操作者</span>`)}<div class="panel explorer"><aside class="dept-pane"><div class="dept-head">${icon('building')}<span style="margin-left:8px">部门资料库</span></div><div class="dept-tree">${depts.map((d,i)=>`<div class="tree-row ${state.dept===d?'active':''} ${i?'child':''}" onclick="changeDept('${d}')">${i?icon('folder'):icon('building')}<span>${d}</span><span class="count">${enterpriseFiles[d]?.length||0}</span></div>`).join('')}</div><div class="dept-tip">部门资料库属于组织资产。可见范围与上传、下载、分享能力由部门关系和显式授权共同决定。</div></aside><section class="file-pane"><div class="toolbar"><button class="btn primary" onclick="startUpload('enterprise')">${icon('upload')}上传</button><button class="btn" onclick="openModal('newFolder',{space:'enterprise'})">${icon('folderPlus')}新建文件夹</button><div class="spacer"></div><div class="search-box">${icon('search')}<input value="${safe(state.query)}" placeholder="搜索当前资料库" onkeydown="if(event.key==='Enter'){state.query=this.value;render()}"><button class="btn ghost icon-only" style="width:26px;height:26px" title="搜索条件">${icon('filter')}</button></div></div><div class="pathbar"><button onclick="state.folder=[];render()">企业空间</button><span style="padding:0 5px">/</span><button>${safe(state.dept)}</button>${state.folder.map(x=>`<span style="padding:0 5px">/</span><button>${safe(x)}</button>`).join('')}<span class="count">${currentFiles('enterprise').length} 项</span></div>${selectionBar('enterprise')}<div class="file-content"><div class="table-zone">${fileTable(currentFiles('enterprise'),{owner:true,space:'enterprise'})}</div>${detailPane()}</div></section></div>`}
function changeDept(d){state.dept=d;state.selected=[];state.detail=null;state.folder=[];state.query='';render()}
function selectionBar(space){const count=state.selected.length;if(space!=='personal'){if(!count)return'';return `<div class="selection-bar"><strong>已选择 ${count} 项</strong><button class="btn compact" onclick="toast('已加入 '+count+' 个下载任务')">${icon('download')}下载</button><button class="btn compact" onclick="openModal('destination',{space,mode:'move'})">${icon('move')}移动</button><button class="btn compact" onclick="openModal('destination',{space,mode:'copy'})">${icon('copy')}复制到</button><button class="btn compact" onclick="openModal('delete',{space})">${icon('trash')}删除</button><button class="btn compact" onclick="showSelectedDetail()">${icon('info')}详情</button><div class="spacer"></div><button class="btn ghost icon-only compact" onclick="clearSelection()">${icon('x')}</button></div>`}const has=count>0;const one=count===1;const disabled=has?'':'disabled';const oneDisabled=one?'':'disabled';return `<div class="selection-bar static-selection-bar" data-space="personal"><strong class="selection-count">${has?`已选择 ${count} 项`:'未选择文件'}</strong><button class="btn compact action-download" ${disabled} onclick="toast('已加入 '+state.selected.length+' 个下载任务')">${icon('download')}下载</button><button class="btn compact action-move" ${disabled} onclick="openModal('destination',{space:'personal',mode:'move'})">${icon('move')}移动</button><button class="btn compact action-copy" ${disabled} onclick="openModal('destination',{space:'personal',mode:'copy'})">${icon('copy')}复制到</button><button class="btn compact action-favorite" ${disabled} onclick="toggleFavoriteSelected()">${icon('star')}收藏</button><button class="btn compact action-tag" ${disabled} onclick="openModal('tag')">${icon('tag')}标签</button><button class="btn compact action-delete" ${disabled} onclick="openModal('delete',{space:'personal'})">${icon('trash')}删除</button><button class="btn compact action-detail" ${oneDisabled} onclick="showSelectedDetail()">${icon('info')}详情</button><div class="spacer"></div><button class="btn ghost icon-on function fileTable(files,opt={}){const compact=opt.compact;return `<table class="file-table"><thead><tr><th class="check-col"><input class="check" type="checkbox" ${state.selected.length&&state.selected.length===files.length?'checked':''} onchange="toggleAll(this.checked,${JSON.stringify(files.map(x=>x.id)).replace(/"/g,'&quot;')})"></th><th class="name-col"><span class="sort-head" onclick="sortBy('name')">名称${sortArrows('name')}</span></th><th class="size-col"><span class="sort-head" onclick="sortBy('size')">大小${sortArrows('size')}</span></th>${opt.owner?'<th class="owner-col">创建人</th>':''}<th class="time-col"><span class="sort-head" onclick="sortBy('modified')">修改时间${sortArrows('modified')}</span></th>${compact?'':'<th class="status-col">状态</th><th class="op-col"></th>'}</tr></thead><tbody>${files.map(f=>`<tr class="${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','${opt.space||'personal'}')" ondblclick="openFile('${f.id}','${opt.space||'personal'}')"><td class="check-col"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"></td><td><div class="file-name">${fileVisual(f)}<div class="file-name-copy"><div class="file-name-title">${safe(f.name)}</div><div class="file-name-meta">${f.tag?`<span class="badge blue">${safe(f.tag)}</span>`:''}${f.favorite?'<span style="color:#f59e0b">★</span>':''}</div></div></div></td><td>${f.type==='folder'?'—':safe(f.size||'—')}</td>${opt.owner?`<td class="owner-col">${safe(f.owner||'张明远')}</td>`:''}<td>${safe(f.modified)}</td>${compact?'':`<td><span class="status-dot ${f.status==='正常'?'green':f.status==='受控'?'orange':'red'}"></span>${safe(f.status||'正常')}</td><td class="op-col"><button class="more-btn" onclick="event.stopPropagation();openMenu(event,'${f.id}','${opt.space||'personal'}')">${icon('more')}</button></td>`}</tr>`).join('')||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">${icon( function personalCurrentPath(){return state.folder.join('/')}

function personalFileType(file){return {folder:'文件夹',doc:'Word 文档',pdf:'PDF 文档',xls:'Excel 表格',ppt:'演示文稿',img:'图片',zip:'压缩包',mp4:'视频',md:'Markdown'}[file.type]||'文件'}

function personalFileTable(files){return `<table class="file-table personal-file-table"><colgroup><col class="personal-check-col"><col class="personal-name-col"><col class="personal-activity-col"><col class="personal-tag-col"><col class="personal-size-col"><col class="personal-time-col"><col class="personal-status-col"><col class="personal-op-col"></colgroup><thead><tr><th class="check-col"><input class="check" type="checkbox" ${state.selected.length&&state.selected.length===files.length?'checked':''} onchange="toggleAll(this.checked,${JSON.stringify(files.map(x=>x.id)).replace(/"/g,'&quot;')})"></th><th><span class="sort-head" onclick="sortBy('name')">名称${sortMark('name')}</span></th><th>最近活动</th><th>标签</th><th><span class="sort-head" onclick="sortBy('size')">大小${sortMark('size')}</span></th><th><span class="sort-head" onclick="sortBy('modified')">修改时间${sortMark('modified')}</span></th><th>访问范围</th><th class="op-col"></th></tr></thead><tbody>${files.map(f=>`<tr data-file-id="${f.id}" class="${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','personal')" ondblclick="openFile('${f.id}','personal')" oncontextmenu="openMenu(event,'${f.id}','personal')"><td class="check-col"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"></td><td><div class="file-name">${fileVisual(f)}<div class="file-name-copy"><button class="file-entry-link" onclick="event.stopPropagation();openFile('${f.id}','personal')">${safe(f.name)}</button><div class="file-name-meta"><span>${personalFileType(f)}</span>${f.favorite?'<span class="favorite-note">★ 已收藏</span>':''}</div></div></div></td><td><div class="activity-cell">${icon('clock')}<span>${safe(personalActivity(f))}</span></div></td><td>${personalTag(f)}</td><td>${f.type==='folder'?'—':safe(f.size||'—')}</td><td>${safe(f.modified)}</td><td>${personalAccess(f)}</td><td class="op-col"><button class="more-btn" aria-labe function personal(){const allFiles=currentFiles('personal');const files=personalPageFiles(allFiles);const filtersActive=state.filters.type!=='all'||state.filters.tag!=='all';return `${pageHead('个人空间','存放个人工作文件与临时资料，默认仅本人可见','',`<span class="badge blue">${icon('lock','icon')}本人可见</span>`)}<div class="tabs personal-tabs"><button class="tab ${state.personalTab==='all'?'active':''}" onclick="setPersonalTab('all')">全部文件</button><button class="tab ${state.personalTab==='recent'?'active':''}" onclick="setPersonalTab('recent')">最近使用</button><button class="tab ${state.personalTab==='favorites'?'active':''}" onclick="setPersonalTab('favorites')">我的收藏</button></div><div class="panel personal-panel" style="position:relative"><div class="personal-toolbar"><div class="upload-split"><button class="btn primary upload-main" onclick="startUpload('personal')">${icon('upload')}上传文件</button><button class="btn primary upload-caret" aria-label="更多上传方式" aria-expanded="${state.personalUploadOpen}" onclick="event.stopPropagation();state.personalUploadOpen=!state.personalUploadOpen;state.profileOpen=false;render()">${icon('down')}</button>${state.personalUploadOpen?`<div class="upload-method-pop" onclick="event.stopPropagation()"><button onclick="state.personalUploadOpen=false;startUpload('personal')">${icon('upload')}<span class="upload-option-copy"><strong>上传文件</strong><small>支持多选</small></span></button><button onclick="state.personalUploadOpen=false;startFolderUpload()">${icon('folder')}<span class="upload-option-copy"><strong>上传文件夹</strong><small>保留目录结构</small></span></button></div>`:''}</div><button class="btn" onclick="openModal('newFolder',{space:'personal'})">${icon('folderPlus')}新建文件夹</button>${personalBulkControl()}<div class="search-box personal-search">${icon('search')}<input value="${safe(state.query)}" placeholder="搜索当前目录" onkeydown="if(event.key==='Enter'){state.query=this.value;state.personalPage=1;render()}"><button class="btn ghost icon-only" style="width:26px;height:26px" onclick="state.filterOpen=!state.filterOpen;state.personalUploadOpen=false;render()" title="筛选条件">${icon('filter')}</button></div><div class="spacer"></div><div class="view-toggle"><button class="${state.view==='list'?'active':''}" onclick="state.view='list';render()" title="列表视图">${icon('list')}</button><button class="${state.view==='grid'?'active':''}" onclick="state.view='grid';render()" title="网格视图">${icon('grid')}</button></div></div>${state.filterOpen?filterPop():''}${filtersActive?`<div class="filter-summary">当前筛选：${state.filters.type!=='all'?`<span class="filter-chip">${state.filters.type.toUpperCase()} <b onclick="state.filters.type='all';state.personalPage=1;render()">×</b></span>`:''}${state.filters.tag!=='all'?`<span class="filter-chip">${state.filters.tag} <b onclick="state.filters.tag='all';state.personalPage=1;render()">×</b></span>`:''}<button class="btn text" style="margin-left:auto" onclick="clearFilters()">清除筛选</button></div>`:''}${personalPathbar(allFiles.length)}<div class="file-content personal-file-content">${state.view==='list'?`<div class="table-zone">${personalFileTable(files)}</div>`:personalGrid(files)}${detailPane()}</div>${personalPagination(allFiles.length)}</div>`}
function setPersonalTab(t){state.personalTab=t;state.personalPage=1;state.selected=[];state.detail=null;render()}
function filterPop(){return `<div class="filter-pop"><div class="filter-title">搜索条件<button class="btn ghost icon-only" onclick="state.filterOpen=false;render()">${icon('x')}</button></div><div class="form-grid"><div class="field"><label>文件类型</label><select class="select" id="filterType"><option value="all" ${state.filters.type==='all'?'selected':''}>全部类型</option><option value="folder">文件夹</option><option value="doc">Word 文档</option><option value="pdf">PDF 文件</option><option value="xls">Excel 表格</option><option value="ppt">演示文稿</option><option value="img">图片</option></select></div><div class="field"><label>标签</label><select class="select" id="filterTag"><option value="all">全部标签</option>${['项目','计划','调研','任务','汇报','设计','技术','临时','需求','评审','资料','模板','复盘','归档'].map(x=>`<option value="${x}" ${state.filters.tag===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>显示方式</label><div class="view-toggle" style="width:74px"><button class="${state.view==='list'?'active':''}" onclick="state.view='list';render()">${icon('list')}</button><button class="${state.view==='grid'?'active':''}" onclick="state.view='grid';render()">${icon('grid')}</button></div></div></div><div class="filter-actions"><button class="btn" onclick="clearFilters()">重置</button><button class="btn primary" onclick="applyFilters()">应用</button></div></div>`}
function applyFilters(){state.filters.type=document.getElementById('filterType').value;state.filters.tag=document.getElementById('filterTag').value;state.filterOpen=false;state.personalPage=1;state.selected=[];render()}
function clearFilters(){state.filters={type:'all',tag:'all'};state.filterOpen=false;state.personalPage=1;state.selected=[];render()}
function personalGrid(files){return `<div class="grid-zone"><div class="file-grid">${files.map(f=>`<div data-file-id="${f.id}" class="file-card ${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','personal')" ondblclick="openFile('${f.id}','personal')" oncontextmenu="openMenu(event,'${f.id}','personal')"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"><button class="more-btn" onclick="event.stopPropagation();openMenu(event,'${f.id}','personal')">${icon('more')}</button>${fileVisual(f)}<button class="file-card-name file-entry-link" onclick="event.stopPropagation();openFile('${f.id}','personal')">${safe(f.name)}</button><div class="file-card-meta"><span>${f.type==='folder'?personalFolderCount(f):safe(f.size||'—')}</span><span>${safe(f.modified.slice(5,10))}</span></div><div class="file-card-access">${personalAccess(f)}</div></div>`).join('')}</div></div>`}
function collaboration(){if(state.collabDetail)return collabDetailPage();let list=collabs.filter(c=>state.collabTab==='archived'?c.archived:!c.archived&&(state.collabTab==='all'||state.collabTab==='created'&&c.owner==='张明远'||state.collabTab==='joined'&&c.owner!=='张明远'));return `${pageHead('协作空间','面向项目和跨部门团队的群组协作文件空间',`<button class="btn primary" onclick="openModal('createCollab')">${icon('plus')}新建协作空间</button>`)}<div class="collab-layout"><div class="collab-toolbar"><div class="tabs" style="margin:0;flex:1"><button class="tab ${state.collabTab==='all'?'active':''}" onclick="setCollabTab('all')">全部</button><button class="tab ${state.collabTab==='created'?'active':''}" onclick="setCollabTab('created')">我创建的</button><button class="tab ${state.collabTab==='joined'?'active':''}" onclick="setCollabTab('joined')">我加入的</button><button class="tab ${state.collabTab==='archived'?'active':''}" onclick="setCollabTab('archived')">已归档</button></div><div class="search-box">${icon('search')}<input placeholder="搜索协作空间"></div></div><div class="collab-grid">${list.map(c=>collabCard(c)).join('')||`<div class="panel empty" style="grid-column:1/-1"><div class="empty-icon">${icon('archive')}</div><strong>暂无协作空间</strong><p>当前分类下没有可显示的协作空间</p></div>`}</div></div>`}
function setCollabTab(t){state.collabTab=t;render()}
function collabCard(c){return `<article class="panel collab-card ${c.archived?'archived':''}" onclick="openCollab('${c.id}')"><div class="collab-top"><div class="collab-icon">${icon(c.archived?'archive':'users')}</div><div class="collab-main"><div class="collab-name">${safe(c.name)}</div><div class="collab-desc">${safe(c.desc)}</div></div><button class="more-btn collab-more" style="opacity:1" onclick="event.stopPropagation();openCollabMenu(event,'${c.id}')">${icon('more')}</button></div><div class="collab-tags"><span class="badge blue">${safe(c.role)}</span>${c.tags.map(x=>`<span class="badge ${c.archived?'':'green'}">${safe(x)}</span>`).join('')}</div><div class="collab-foot"><div class="avatar-stack">${c.members.map(x=>`<span class="mini-avatar">${x}</span>`).join('')}</div><span class="member-more">+${c.more} 成员</span><span class="meta">${icon('clock')} ${safe(c.updated)}</span></div><div class="card-actions"><button class="btn compact" onclick="event.stopPropagation();openCollab('${c.id}')">进入空间</button></div></article>`}
function openCollab(id){state.collabDetail=id;state.collabDetailTab='files';state.selected=[];state.detail=null;render()}
function collabDetailPage(){const c=collabs.find(x=>x.id===state.collabDetail);return `<div class="panel detail-banner"><button class="back-btn" onclick="state.collabDetail=null;render()">${icon('arrowLeft')}</button><div class="collab-icon">${icon(c.archived?'archive':'users')}</div><div class="detail-banner-main"><h2>${safe(c.name)} ${c.archived?'<span class="badge orange">只读归档</span>':''}</h2><p>${safe(c.desc)} · 群主：${safe(c.owner)}</p></div><div class="page-actions"><button class="btn" onclick="openModal('members',{collab:c})">${icon('users')}成员管理</button><button class="btn" onclick="openModal('invite',{collab:c})">${icon('plus')}邀请成员</button><button class="btn icon-only" onclick="openCollabMenu(event,'${c.id}')">${icon('more')}</button></div></div><div class="collab-detail-grid"><div class="panel personal-panel"><div class="segment-tabs"><button class="${state.collabDetailTab==='files'?'active':''}" onclick="state.collabDetailTab='files';render()">文件</button><button class="${state.collabDetailTab==='activity'?'active':''}" onclick="state.collabDetailTab='activity';render()">动态</button><button class="${state.collabDetailTab==='settings'?'active':''}" onclick="state.collabDetailTab='settings';render()">空间设置</button></div>${state.collabDetailTab==='files'?collabFilesView(c):state.collabDetailTab==='activity'?collabActivity():collabSettings(c)}</div><aside class="panel member-panel"><div class="card-head"><div><div class="panel-title">空间成员</div><div class="panel-subtitle">共 ${members.length+4} 人</div></div><button class="btn text right" onclick="openModal('members',{collab:c})">管理</button></div><div class="member-list">${members.map(m=>`<div class="member-row"><div class="person-avatar">${m.initial}</div><div class="member-info"><strong>${m.name}</strong><span>${m.dept}</span></div><span class="badge ${m.role==='群主'?'blue':''}">${m.role}</span></div>`).join('')}</div></aside></div>`}
function collabFilesView(c){return `<div class="personal-toolbar"><button class="btn primary" ${c.archived?'disabled':''} onclick="startUpload('collab')">${icon('upload')}上传</button><button class="btn" ${c.archived?'disabled':''} onclick="openModal('newFolder',{space:'collab'})">${icon('folderPlus')}新建文件夹</button><div class="spacer"></div><div class="search-box">${icon('search')}<input placeholder="搜索空间文件"></div></div>${selectionBar('collab')}<div class="pathbar"><button>${safe(c.name)}</button><span class="count">${collabFiles.length} 项</span></div><div class="file-content"><div class="table-zone">${fileTable(collabFiles,{owner:true,space:'collab'})}</div>${detailPane()}</div>`}
function collabActivity(){return `<div class="card-body" style="padding-top:8px">${[['许欣','上传了 3 个交互原型文件','今天 09:42'],['周凯','更新了《系统架构评审材料.pdf》','昨天 16:22'],['张明远','将赵敏的角色调整为预览者','06-21 11:08'],['刘浩','新建文件夹「03 开发交付」','06-20 18:31']].map(x=>`<div class="activity"><div class="activity-avatar">${x[0][0]}</div><div class="activity-main"><b>${x[0]}</b> ${x[1]}<span>${x[2]}</span></div></div>`).join('')}</div>`}
function collabSettings(c){return `<div class="card-body"><div class="form-grid" style="max-width:620px"><div class="field"><label>空间名称</label><input class="input" value="${safe(c.name)}"></div><div class="field"><label>空间说明</label><textarea class="textarea">${safe(c.desc)}</textarea></div><div class="form-row"><div class="field"><label>默认文件角色</label><select class="select"><option>编辑者</option><option>下载者</option><option>预览者</option></select></div><div class="field"><label>空间状态</label><select class="select"><option>${c.archived?'已归档':'正常使用'}</option></select></div></div><div><button class="btn primary" onclick="toast('空间设置已保存')">保存设置</button></div><div class="notice ${c.archived?'':'danger-notice'}">${c.archived?'归档空间处于只读状态。恢复后成员才可以继续上传和修改文件。':'归档后空间将变为只读，成员仍可查看和下载；解散操作不可恢复。'}</div><div style="display:flex;gap:8px"><button class="btn" onclick="archiveCollab('${c.id}')">${c.archived?'恢复空间':'归档空间'}</button><button class="btn danger" onclick="openModal('dissolve',{collab:c})">解散空间</button></div></div></div>`}
function related(){return `${pageHead('与我相关','聚合共享授权、权限审批和文件收集事项，不形成新的存储空间')}<div class="panel list-panel" style="min-height:calc(100vh - 170px)"><div class="segment-tabs"><button class="${state.relatedTab==='shared'?'active':''}" onclick="state.relatedTab='shared';render()">共享给我</button><button class="${state.relatedTab==='approval'?'active':''}" onclick="state.relatedTab='approval';render()">审批中心 <span class="badge blue">2</span></button><button class="${state.relatedTab==='collect'?'active':''}" onclick="state.relatedTab='collect';render()">文件收集 <span class="badge">3</span></button></div>${state.relatedTab==='shared'?sharedView():state.relatedTab==='approval'?approvalView():collectionView()}</div>`}
function sharedView(){return `<div class="toolbar"><div class="search-box">${icon('search')}<input placeholder="搜索共享文件"></div><div class="spacer"></div><button class="btn">${icon('filter')}筛选来源</button></div><table class="simple-table"><thead><tr><th>名称</th><th>共享人</th><th>原始位置</th><th>我的权限</th><th>共享时间</th><th class="right">操作</th></tr></thead><tbody>${sharedItems.map(x=>`<tr><td><div class="file-name">${fileVisual(x)}<div class="link-title">${x.name}</div></div></td><td>${x.from}</td><td>${x.source}</td><td><span class="badge blue">${x.perm}</span></td><td>${x.time}</td><td class="right"><button class="btn compact" onclick="toast('正在打开原空间位置')">打开</button></td></tr>`).join('')}</tbody></table>`}
function approvalView(){return `<table class="simple-table"><thead><tr><th>申请事项</th><th>申请人</th><th>目标资源</th><th>申请权限</th><th>提交时间</th><th class="right">操作</th></tr></thead><tbody><tr><td><span class="badge orange">待我审批</span></td><td>赵敏</td><td>智能知识库总体架构方案.pdf</td><td>下载者</td><td>今天 09:06</td><td class="right"><button class="btn compact" onclick="toast('已驳回申请','warning')">驳回</button> <button class="btn primary compact" onclick="toast('已通过权限申请')">通过</button></td></tr><tr><td><span class="badge orange">待我审批</span></td><td>王璐</td><td>集团级模板</td><td>上传者</td><td>昨天 16:20</td><td class="right"><button class="btn compact" onclick="toast('已驳回申请','warning')">驳回</button> <button class="btn primary compact" onclick="toast('已通过权限申请')">通过</button></td></tr><tr><td><span class="badge green">我发起的</span></td><td>张明远</td><td>年度资金计划.xlsx</td><td>预览者</td><td>06-20 10:08</td><td class="right"><span class="badge green">已通过</span></td></tr></tbody></table>`}
function collectionView(){return `<div class="card-body"><div class="collab-grid">${collected.map(x=>`<div class="panel collab-card" style="min-height:150px"><div class="collab-top"><div class="collab-icon">${icon('collect')}</div><div class="collab-main"><div class="collab-name">${x.title}</div><div class="collab-desc">发起人：${x.creator}<br>截止：${x.deadline}</div></div><span class="badge ${x.status==='进行中'?'blue':'green'}">${x.status}</span></div><div class="collab-foot"><span class="meta" style="margin-left:0">提交进度 ${x.progress}</span><button class="btn compact" style="margin-left:auto" onclick="toast('已打开收集任务')">查看任务</button></div></div>`).join('')}</div></div>`}
function shareLinks(){return `${pageHead('安全外链','统一管理对外分享链接及访问安全策略',`<button class="btn primary" onclick="openModal('share',{file:personalFiles[2]})">${icon('plus')}创建外链</button>`)}<div class="panel list-panel"><div class="toolbar"><div class="tabs" style="margin:0;border:0"><button class="tab active">全部外链</button><button class="tab">即将失效</button><button class="tab">已失效</button></div><div class="spacer"></div><div class="search-box">${icon('search')}<input placeholder="搜索外链文件"></div></div><table class="simple-table"><thead><tr><th>文件名称</th><th>提取码</th><th>访问权限</th><th>有效期至</th><th>访问次数</th><th>状态</th><th class="right">操作</th></tr></thead><tbody>${links.map(l=>`<tr><td><div class="link-title">${l.name}</div><div class="link-sub">https://share.example.com/s/${l.id}...</div></td><td><code>${l.code}</code></td><td>${l.perm}</td><td>${l.expire}</td><td>${l.visits}</td><td><span class="status-dot ${l.status==='生效'?'green':'red'}"></span>${l.status}</td><td class="right"><button class="btn compact" onclick="copyLink('${l.id}')">复制链接</button> <button class="btn ghost icon-only compact" onclick="toast('外链设置已打开')">${icon('more')}</button></td></tr>`).join('')}</tbody></table></div>`}

function personalDestinationNodes(parent='',level=0,mode='move'){const current=personalCurrentPath();const selectedFolders=state.selected.map(id=>personalFiles.find(x=>x.id===id)).filter(x=>x?.type==='folder').map(x=>[x.parent,x.name].filter(Boolean).join('/'));return personalFiles.filter(x=>x.type==='folder'&&(x.parent||'')===parent).map(folder=>{const path=[parent,folder.name].filter(Boolean).join('/');const blocked=(mode==='move'&&path===current)||selectedFolders.some(source=>path===source||path.startsWith(source+'/'));const children=personalDestinationNodes(path,level+1,mode);return `<div class="destination-node"><label class="destination-row level-${Math.min(level+1,4)} ${blocked?'is-disabled':''}"><input type="radio" name="destinationTarget" value="personal::${safe(path)}" ${blocked?'disabled':''}><span class="tree-caret ${children?'open':'empty'}">${children?icon('down'):''}</span>${icon('folder')}<span>${safe(folder.name)}</span>${blocked?'<small>不可选择</small>':''}</label>${children?`<div class="destination-children">${children}</div>`:''}</div>`}).join('')}

function copyPersonalEntry(entry,targetParent,nameOverride=''){const originalPath=[entry.parent,entry.name].filter(Boolean).join('/');const copiedName=nameOverride||entry.name;const copy={...entry,id:'copy'+Date.now()+Math.random().toString(36).slice(2,7),name:copiedName,parent:targetParent,modified:'2026-06-23 12:08',favorite:false,activity:'刚刚 · 复制'};personalFiles.push(copy);if(entry.type==='folder'){const copyPath=[targetParent,copiedName].filter(Boolean).join('/');personalFiles.filter(x=>(x.parent||'')===originalPath).slice().forEach(child=>copyPersonalEntry(child,copyPath))}}
function movePersonalEntries(targetParent){const selected=state.selected.map(id=>personalFiles.find(x=>x.id===id)).filter(Boolean);selected.forEach(entry=>{const oldPath=[entry.parent,entry.name].filter(Boolean).join('/');const newPath=[targetParent,entry.name].filter(Boolean).join('/');if(entry.type==='folder'){personalFiles.forEach(child=>{const parent=child.parent||'';if(parent===oldPath||parent.startsWith(oldPath+'/'))child.parent=newPath+parent.slice(oldPath.length)})}entry.parent=targetParent;entry.modified='2026-06-23 12:08';entry.activity='刚刚 · 移动'})}

收藏'}</button>`:''}<button class="menu-item" onclick="state.selected=['${m.id}'];state.menu=null;openModal('tag')">${icon('tag')}设置标签</button>${m.space==='personal'&&f.type==='folder'?`<button class="menu-item" onclick="state.menu=null;openModal('transfer',{id:'${m.id}'})">${icon('transfer')}转移所有权</button>`:''}<button class="menu-item" onclick="state.menu=null;state.detail={id:'${m.id}',space:'${m.space}'};render()">${icon('info')}属性详情</button><div class="menu-sep"></div><button class="menu-item danger" onclick="state.selected=['${m.id}'];state.menu=null;openModal('delete',{space:'${m.space}'})">${icon('trash')}删除</button></div>`}

<script data-authoritative-stage="stage-04">
/* Enterprise space integrated into the unified web prototype. */
(function(){
  if(window.__enterpriseSpaceV4)return;

  function orderedDepartments(){

  };

  };

  const baseCurrentFiles=currentFiles;

    return files.slice().sort((a,b)=>{const av=a[state.sort.key]||'',bv=b[state.sort.key]||'';return state.sort.dir==='asc'?String(av).localeCompare(String(bv),'zh-CN'):String(bv).localeCompare(String(av),'zh-CN')});

  changeDept=function(dept){state.dept=dept;state.folder=[];state.query='';state.enterpriseFilter='all';state.enterpriseTagFilter='all';state.enterpriseFilterOpen=false;state.enterprisePage=1;state.selected=[];state.detail=null;state.menu=null;render()};

  const baseOpenFile=openFile;

    if(space!=='enterprise')return baseOpenFile(id,space);
    const file=findFile(id,'enterprise');if(!file)return;

    else openModal('preview',{file});

  const baseCreateFolder=createFolder;
  createFolder=function(space){
    if(space!=='enterprise')return baseCreateFolder(space);

    if(!name)return toast('请输入文件夹名称','warning');
    if(/[\\/:*?"<>|]/.test(name))return toast('文件夹名称包含不支持的字符','warning');
    const parent=state.folder.join('/');
    if((enterpriseFiles[state.dept]||[]).some(item=>(item.parent||'')===parent&&item.name===name))return toast('当前目录已存在同名内容','warning');
    enterpriseFiles[state.dept].unshift({id:'enterprise-folder-'+Date.now(),type:'folder',name,parent,modified:'2026-06-23 14:30',owner:'张明远',status:'正常',tag:'文件夹'});
    closeModal();toast('文件夹创建成功');render();
  };

  const baseRenameItem=renameItem;
  renameItem=function(id,space){
    if(space!=='enterprise')return baseRenameItem(id,space);
    const file=findFile(id,'enterprise');const value=document.getElementById('renameValue')?.value.trim();
    if(!file||!value)return toast('请输入新的名称','warning');

      const oldPath=[file.parent,file.name].filter(Boolean).join('/');

  window.enterpriseRowClick=function(event,id){

  window.enterpriseActivity=function(file){return `<div class="enterprise-activity-v4">${icon('user')}<span>${safe(file.owner||'文件管理员')}</span></div>`};

  window.enterpriseTable=function(files){
    const rows=files.map(file=>`<tr data-file-id="${file.id}" class="${state.selected.includes(file.id)?'selected':''}" onclick="enterpriseRowClick(event,'${file.id}')" ondblclick="openFile('${file.id}','enterprise')" oncontextmenu="openMenu(event,'${file.id}','enterprise')"><td class="check-col"><input class="check" type="checkbox" ${state.selected.includes(file.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${file.id}',this.checked)"></td><td><div class="file-name">${fileVisual(file)}<div class="file-name-copy"><button class="file-entry-link" onclick="event.stopPropagation();openFile('${file.id}','enterprise')">${safe(file.name)}</button><div class="file-name-meta"><span>${personalFileType(file)}</span></div></div></div></td><td>${enterpriseActivity(file)}</td><td>${enterpriseTag(file)}</td><td>${file.type==='folder'?'—':safe(file.size||'—')}</td><td>${safe(file.modified)}</td><td class="status-cell"><span class="status-dot ${file.status==='正常'?'green':file.status==='受控'?'orange':'red'}"></span>${safe(file.status||'正常')}</td><td class="op-col"><button class="more-btn" aria-label="更多操作" onclick="event.stopPropagation();openMenu(event,'${file.id}','enterprise')">${icon('more')}</button></td></tr>`).join('');

  window.enterpriseGrid=function(files){return `<div class="grid-zone"><div class="file-grid">${files.map(file=>`<div data-file-id="${file.id}" class="file-card ${state.selected.includes(file.id)?'selected':''}" onclick="enterpriseRowClick(event,'${file.id}')" ondblclick="openFile('${file.id}','enterprise')" oncontextmenu="openMenu(event,'${file.id}','enterprise')"><input class="check" type="checkbox" ${state.selected.includes(file.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${file.id}',this.checked)"><button class="more-btn" onclick="event.stopPropagation();openMenu(event,'${file.id}','enterprise')">${icon('more')}</button>${fileVisual(file)}<button class="file-card-name file-entry-link" onclick="event.stopPropagation();openFile('${file.id}','enterprise')">${safe(file.name)}</button><div class="file-card-meta"><span>${file.type==='folder'?'文件夹':safe(file.size||'—')}</span><span>${safe((file.modified||'').slice(5,10))}</span></div><div class="file-card-tags">${enterpriseTag(file)}</div><div class="file-card-access">${enterpriseRole()}</div></div>`).join('')}</div></div>`};

  window.enterpriseFilterPop=function(){
    return `<div class="filter-pop enterprise-filter-pop"><div class="filter-title">搜索条件<button class="btn ghost icon-only" onclick="state.enterpriseFilterOpen=false;render()">${icon('x')}</button></div><div class="form-grid"><div class="field"><label>文件类型</label><select class="select" id="enterpriseFilterType"><option value="all" ${state.enterpriseFilter==='all'?'selected':''}>全部类型</option><option value="folder" ${state.enterpriseFilter==='folder'?'selected':''}>文件夹</option><option value="document" ${state.enterpriseFilter==='document'?'selected':''}>文档</option><option value="img" ${state.enterpriseFilter==='img'?'selected':''}>图片</option><option value="zip" ${state.enterpriseFilter==='zip'?'selected':''}>压缩包</option></select></div><div class="field"><label>标签</label><select class="select" id="enterpriseFilterTag"><option value="all">全部标签</option>${allEnterpriseTags().map(tag=>`<option value="${safe(tag)}" ${state.enterpriseTagFilter===tag?'selected':''}>${safe(tag)}</option>`).join('')}</select></div><div class="field"><label>显示方式</label><div class="view-toggle" style="width:74px"><button class="${state.enterpriseView==='list'?'active':''}" onclick="state.enterpriseView='list';render()">${icon('list')}</button><button class="${state.enterpriseView==='grid'?'active':''}" onclick="state.enterpriseView='grid';render()">${icon('grid')}</button></div></div></div><div class="filter-actions"><button class="btn" onclick="clearEnterpriseFilter()">重置</button><button class="btn primary" onclick="applyEnterpriseFilter()">应用</button></div></div>`;
  };

  window.enterpriseLibraryContext=function(total){
    const group=state.dept==='集团资料库';const isDefault=state.dept===state.enterpriseDefaultDept;

  };

  window.enterprisePathbar=function(total){
    const group=state.dept==='集团资料库';
    const base=group?`<button onclick="goEnterpriseFolder(-1)">${icon('building')}企业空间</button><span class="path-sep">/</span><button class="current" onclick="goEnterpriseFolder(-1)">集团资料库</button>`:`<button onclick="goEnterpriseFolder(-1)">${icon('building')}企业空间</button><span class="path-sep">/</span><span>部门公共资料库</span><span class="path-sep">/</span><button class="current" onclick="goEnterpriseFolder(-1)">${safe(state.dept)}</button>`;
    return `<div class="pathbar personal-pathbar enterprise-pathbar">${state.folder.length?`<button class="path-back" onclick="goEnterpriseFolder(${state.folder.length-2})">${icon('arrowLeft')}返回上一级</button><span class="path-divider"></span>`:''}${base}${state.folder.map((name,index)=>`<span class="path-sep">/</span><button class="${index===state.folder.length-1?'current':''}" onclick="goEnterpriseFolder(${index})">${safe(name)}</button>`).join('')}<span class="path-context">${state.folder.length?'当前文件夹':'公共资料库'}</span><span class="count">${total} 项</span></div>`;
  };

  window.enterprisePageFiles=function(files){const pages=Math.max(1,Math.ceil(files.length/state.enterprisePageSize));state.enterprisePage=Math.min(Math.max(1,state.enterprisePage),pages);const start=(state.enterprisePage-1)*state.enterprisePageSize;return files.slice(start,start+state.enterprisePageSize)};
  window.enterprisePagination=function(total){
    const pages=Math.max(1,Math.ceil(total/state.enterprisePageSize));const start=total?(state.enterprisePage-1)*state.enterprisePageSize+1:0;const end=Math.min(total,state.enterprisePage*state.enterprisePageSize);const nums=[];
    for(let page=1;page<=pages;page++)nums.push(`<button class="page-number ${state.enterprisePage===page?'active':''}" onclick="changeEnterprisePage(${page})">${page}</button>`);

  };

  const baseDetailPane=detailPane;
  detailPane=function(){
    if(!state.detail||state.detail.space!=='enterprise')return baseDetailPane();
    const file=findFile(state.detail.id,'enterprise');if(!file)return'';
    const group=state.dept==='集团资料库';
    const path=`企业空间 / ${group?'集团资料库':'部门公共资料库 / '+state.dept}${file.parent?' / '+file.parent:''}`;
    return `<aside class="detail-pane"><div class="detail-head">属性详情<button class="btn ghost icon-only" onclick="state.detail=null;render()">${icon('x')}</button></div><div class="detail-body"><div class="detail-preview">${fileVisual(file)}<strong>${safe(file.name)}</strong><span class="badge ${file.status==='正常'?'green':'orange'}">${safe(file.status||'正常')}</span></div><div class="info-list"><div class="info-row"><span>文件类型</span><span>${personalFileType(file)}</span></div><div class="info-row"><span>所在位置</span><span>${safe(path)}</span></div><div class="info-row"><span>文件大小</span><span>${safe(file.size||'—')}</span></div><div class="info-row"><span>所属资料库</span><span>${safe(group?'集团资料库':state.dept+'公共资料库')}</span></div><div class="info-row"><span>最近操作人</span><span>${safe(file.owner||'文件管理员')}</span></div><div class="info-row"><span>修改时间</span><span>${safe(file.modified)}</span></div><div class="info-row"><span>权限角色</span><span class="enterprise-detail-role-v4">${icon('shield')}操作者</span></div><div class="info-row"><span>权限来源</span><span>${group?'管理员范围':'部门默认权限'}</span></div><div class="info-row"><span>安全状态</span><span>${safe(file.status||'正常')}</span></div></div><div class="detail-section"><div class="detail-section-title"><span>标签</span></div>${enterpriseTag(file)}</div></div></aside>`;
  };

  enterprise=function(){
    const allFiles=currentFiles('enterprise');const files=enterprisePageFiles(allFiles);const filterActive=state.enterpriseFilter!=='all'||state.enterpriseTagFilter!=='all';const content=state.enterpriseView==='grid'?enterpriseGrid(files):enterpriseTable(files);
    const filterSummary=[state.enterpriseFilter!=='all'?(state.enterpriseFilter==='folder'?'文件夹':state.enterpriseFilter==='document'?'文档':state.enterpriseFilter==='img'?'图片':'压缩包'):'',state.enterpriseTagFilter!=='all'?`标签：${state.enterpriseTagFilter}`:''].filter(Boolean).join('、');
    return `${pageHead('企业空间','组织级文件资产按部门公共资料库统一治理','',`<span class="badge blue">${icon('shield')}当前权限：操作者</span>`)}<div class="panel personal-panel enterprise-panel">${enterpriseLibraryContext(allFiles.length)}<div class="personal-toolbar"><button class="btn primary" onclick="startUpload('enterprise')">${icon('upload')}上传文件</button><button class="btn" onclick="openModal('newFolder',{space:'enterprise'})">${icon('folderPlus')}新建文件夹</button>${enterpriseBulkControl()}<div class="search-box personal-search">${icon('search')}<input value="${safe(state.query)}" placeholder="搜索当前资料库" onkeydown="if(event.key==='Enter'){state.query=this.value;state.enterprisePage=1;state.selected=[];state.detail=null;render()}"><button class="btn ghost icon-only" style="width:26px;height:26px" onclick="state.enterpriseFilterOpen=!state.enterpriseFilterOpen;render()" title="筛选条件">${icon('filter')}</button></div><div class="spacer"></div><div class="view-toggle"><button class="${state.enterpriseView==='list'?'active':''}" onclick="setEnterpriseView('list')" title="列表视图">${icon('list')}</button><button class="${state.enterpriseView==='grid'?'active':''}" onclick="setEnterpriseView('grid')" title="网格视图">${icon('grid')}</button></div></div>${state.enterpriseFilterOpen?enterpriseFilterPop():''}${filterActive?`<div class="filter-summary">当前筛选：<span class="filter-chip">${safe(filterSummary)} <b onclick="clearEnterpriseFilter()">×</b></span><button class="btn text" style="margin-left:auto" onclick="clearEnterpriseFilter()">清除筛选</button></div>`:''}${enterprisePathbar(allFiles.length)}<div class="file-content personal-file-content enterprise-file-content">${state.enterpriseView==='list'?`<div class="table-zone">${content}</div>`:content}${detailPane()}</div>${enterprisePagination(allFiles.length)}</div>`;
  };

  render();
})();

</script>
<script data-authoritative-stage="stage-05">
/* Enterprise space semantic correction: departments own their public libraries. */
(function(){
  if(window.__enterpriseSpaceV9)return;
  window.__enterpriseSpaceV9=true;
  if(typeof state==='undefined'||typeof render!=='function'||typeof sidebar!=='function'||typeof enterprise!=='function')return;

  /* enterprise-space-v9-style consolidated into canonical stylesheet. */

  function hasPublicLibrary(dept){return Object.prototype.hasOwnProperty.call(enterpriseFiles,dept)}
  function departmentNames(){return (depts||[]).filter(dept=>dept!=='集团资料库')}
  function explicitPermission(file){return file?.permissionRole||file?.permission||file?.role||''}
  function permissionSource(file){return file?.permissionSource||file?.sourceType||''}

  let sidebarLayoutFrame=0;
  function normalizeEnterpriseSidebar(){
    cancelAnimationFrame(sidebarLayoutFrame);
    sidebarLayoutFrame=requestAnimationFrame(()=>{
      const sidebarEl=document.querySelector('.sidebar');
      if(!sidebarEl)return;
      const sidebarRect=sidebarEl.getBoundingClientRect();
      document.querySelectorAll('.enterprise-org-v7').forEach(org=>{
        const orgRect=org.getBoundingClientRect();
        const width=Math.max(128,sidebarRect.right-orgRect.left-8);
        org.style.setProperty('width',`${width}px`,'important');
        org.style.setProperty('max-width',`${width}px`,'important');
        org.style.setProperty('overflow','visible','important');
        const list=org.querySelector('.enterprise-dept-list-v7');
        if(list){
          list.style.setProperty('width','100%','important');
          list.style.setProperty('max-width','none','important');
          list.style.setProperty('overflow','visible','important');
        }
      });
      document.querySelectorAll('.enterprise-dept-node-v7').forEach(node=>{
        const rect=node.getBoundingClientRect();
        const width=Math.max(112,sidebarRect.right-rect.left-10);
        node.style.setProperty('width',`${width}px`,'important');
        node.style.setProperty('min-width',`${width}px`,'important');
        node.style.setProperty('max-width',`${width}px`,'important');
        node.style.setProperty('display','flex','important');
        node.style.setProperty('overflow','visible','important');
        const label=node.querySelector('span');
        if(label){
          label.style.setProperty('display','block','important');
          label.style.setProperty('flex','1 1 auto','important');
          label.style.setProperty('width',`${Math.max(84,width-32)}px`,'important');
          label.style.setProperty('min-width','84px','important');
          label.style.setProperty('max-width','none','important');
          label.style.setProperty('overflow','visible','important');
          label.style.setProperty('text-overflow','clip','important');
          label.style.setProperty('white-space','nowrap','important');
        }
      });
    });
  }

  const previousRenderV9=render;
  render=function(){
    previousRenderV9();
    normalizeEnterpriseSidebar();
  };
  window.addEventListener('resize',normalizeEnterpriseSidebar);
  const appRoot=document.getElementById('app');
  if(appRoot)new MutationObserver(normalizeEnterpriseSidebar).observe(appRoot,{childList:true,subtree:true});

  window.enterpriseFileVisual=function(file){
    const map={doc:'vscode-icons:file-type-word',pdf:'vscode-icons:file-type-pdf2',xls:'vscode-icons:file-type-excel',ppt:'vscode-icons:file-type-powerpoint',md:'vscode-icons:file-type-markdown',zip:'material-symbols:folder-zip-rounded',img:'solar:gallery-bold-duotone'};
    if(file.type==='folder')return `<span class="enterprise-file-visual-v8 folder"><iconify-icon icon="solar:folder-bold-duotone" aria-hidden="true"></iconify-icon></span>`;
    const iconName=map[file.type]||'solar:file-bold-duotone';
    const tone=file.type==='zip'?'zip':file.type==='img'?'image':'';
    return `<span class="enterprise-file-visual-v8 ${tone}"><iconify-icon icon="${iconName}" aria-hidden="true"></iconify-icon></span>`;
  };

  window.enterprisePermissionNote=function(file){
    const role=explicitPermission(file);
    if(!role)return'';
    return `<span class="enterprise-permission-note-v8">${icon('shield')}权限：${safe(role)}</span>`;
  };

  sidebar=function(){
    const groups=nav.map(group=>{
      const items=group.items.map(([page,iconName,title])=>{
        const active=state.page===page;
        const relatedBadge=page==='related'?'<span class="trail badge blue">3</span>':'';
        const caret=page==='enterprise'&&active?`<span class="enterprise-nav-caret ${state.enterpriseNavExpanded?'':'collapsed'}">${icon('down')}</span>`:'';
        const action=page==='enterprise'&&active?'toggleEnterpriseNav()':`navigate('${page}')`;
        const base=`<button class="nav-item ${active?'active':''}" onclick="${action}">${icon(iconName)}<span>${title}</span>${relatedBadge}${caret}</button>`;
        if(page!=='enterprise'||!active)return base;
        const departments=departmentNames();
        const departmentRows=departments.map(dept=>{
          const enabled=hasPublicLibrary(dept);
          const selected=state.dept===dept;
          const click=enabled?`changeDept('${dept}')`:`toast('${safe(dept)}尚未创建公共资料库','warning')`;
          return `<button class="enterprise-dept-node-v7 ${selected?'active':''} ${enabled?'':'disabled'}" onclick="${click}" title="${safe(dept)}${enabled?'':'（未创建公共资料库）'}"><iconify-icon icon="solar:folder-security-bold-duotone" aria-hidden="true"></iconify-icon><span>${safe(dept)}</span></button>`;
        }).join('');
        return `${base}<div class="enterprise-org-v7 ${state.enterpriseNavExpanded?'':'collapsed'}"><button class="enterprise-org-root-v7 ${state.dept==='集团资料库'?'active':''}" onclick="changeDept('集团资料库')">${icon('building')}<span>集团资料库</span></button><div class="enterprise-dept-list-v7">${departmentRows}</div></div>`;
      }).join('');

    if(!panel||panel.dataset.workbenchRecent==='true')return;
    const table=panel.querySelector('.file-table');
    if(!table)return;
    const sourceHead=table.querySelector('th.owner-col');
    if(sourceHead)sourceHead.textContent='来源';
    table.querySelectorAll('tbody tr').forEach((row,index)=>{
      const sourceCell=row.querySelector('td.owner-col');
      if(!sourceCell)return;
      const fileName=(row.querySelector('.file-name-title')?.textContent||'').trim();
      const enterprise=/智能知识库总体架构方案|架构方案/.test(fileName)||index>=3;
      sourceCell.innerHTML=`<span class="wb-source-pill ${enterprise?'enterprise':''}">${enterprise?'企业空间':'个人空间'}</span>`;
    });
    panel.dataset.workbenchRecent='true';
  }

  function syncWorkbench(){
    const title=(document.querySelector('.page-title')?.textContent||'').trim();
    const active=title==='工作台';
    document.body.classList.toggle('workbench-v4',active);
    if(!active)return;
    ensurePremiumMotionStyles();
    document.querySelector('.page-head .page-actions')?.remove();
    enhanceRecentTable();
    document.querySelectorAll('.stats-grid .stat-card').forEach((card,index)=>{
      const label=(card.querySelector('.stat-top span')?.textContent||'').trim();
      const route=routes[label];
      if(!route||card.dataset.workbenchV4==='true')return;
      card.dataset.workbenchV4='true';
      card.style.setProperty('--card-index',String(index));
      card.classList.add('wb-stat-enter');
      card.tabIndex=0;
      card.setAttribute('role','button');
      card.setAttribute('aria-label','打开'+label);
      const open=()=>{if(typeof window.navigate==='function')window.navigate(route)};
      card.addEventListener('click',open);
      card.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();open();}});
      attachMotion(card);
      animateNumber(card.querySelector('.stat-number'));
    });
  }

  const root=document.getElementById('app');
  if(root)new MutationObserver(syncWorkbench).observe(root,{childList:true,subtree:true});
  ensureAdminDeptV3();
  ensureAdminDeptV11();
  syncWorkbench();
})();

</script>

  window.collabSubmitSpace=()=>{const name=document.getElementById('newCollabName').value.trim();if(!name)return toast('请输入空间名称','warning');const id='c'+Date.now();collabs.unshift({id,name,desc:document.getElementById('newCollabDesc').value.trim()||'团队协作文件空间。',role:'群主',owner:CURRENT,members:['张'],more:0,files:0,updated:'刚刚',tags:['新建'],archived:false,defaultRole:document.getElementById('newCollabRole').value});fileStore[id]=[];memberStore[id]=[[CURRENT,'研发中心','群主']];activityStore[id]=[[CURRENT,'创建了协作空间','刚刚','setting']];document.querySelector('.collab-dialog-layer').remove();toast('协作空间创建成功');render()};

  function spaceCard(s){const m=(memberStore[s.id]||[]).length||s.members.length+s.more;return `<article class="collab-space-card" onclick="collabOpen('${s.id}')"><div class="collab-space-head"><div class="collab-space-icon">${icon(s.archived?'archive':'users')}</div><div><strong>${safe(s.name)}</strong><p>${safe(s.desc)}</p></div><button onclick="event.stopPropagation();collabSpaceMenu(event,'${s.id}')">${icon('more')}</button></div><div class="collab-space-tags"><span class="badge blue">${safe(s.role)}</span>${(s.tags||[]).map(t=>`<span class="badge">${safe(t)}</span>`).join('')}</div><div class="collab-space-foot"><span>${icon('users')} ${m} 人</span><span>${icon('folder')} ${(fileStore[s.id]||[]).length} 项</span><span>${icon('clock')} ${safe(s.updated)}</span><b>进入空间 ${icon('chevron')}</b></div></article>`}

  function fileRow(f){const selected=state.selected.includes(f.id);return `<tr class="${selected?'selected':''}"><td><input type="checkbox" ${selected?'checked':''} onchange="collabToggle('${f.id}')"></td><td><button class="collab-file-name" onclick="${f.type==='folder'?`collabOpenFolder('${f.id}')`:`collabPreview('${f.id}')`}">${fileVisual(f)}<span><b>${safe(f.name)}</b><small>${safe(f.tag||'未分类')}</small></span></button></td><td>${safe(f.size||'—')}</td><td>${safe(f.owner)}</td><td>${safe(f.modified)}</td><td><span class="collab-permission">${safe(f.permission||'编辑者')}</span></td><td><button class="collab-row-more" onclick="collabFileMenu(event,'${f.id}')">${icon('more')}</button></td></tr>`}

  window.collabUploadMenu=event=>menu(event,`<button onclick="collabUpload('file')">${icon('upload')}上传文件</button><button onclick="collabUpload('folder')">${icon('folderPlus')}上传文件夹</button>`);

  window.collabFileInfo=id=>{const f=files().find(x=>x.id===id);document.querySelector('.collab-pop')?.remove();dialog('文件属性',`<div class="collab-info"><div>${fileVisual(f)}<strong>${safe(f.name)}</strong></div><p><span>所在位置</span><b>${safe(activeSpace().name)} / ${safe(path()||'根目录')}</b></p><p><span>文件大小</span><b>${safe(f.size||'—')}</b></p><p><span>创建人</span><b>${safe(f.owner)}</b></p><p><span>修改时间</span><b>${safe(f.modified)}</b></p><p><span>我的权限</span><b>${safe(f.permission)}</b></p></div>`)};

  window.collabBatchCopy=()=>{const copies=files().filter(f=>state.selected.includes(f.id)).map((f,i)=>({...f,id:'copy'+Date.now()+i,name:f.name.replace(/(\.[^.]+)?$/,m=>` - 副本${m||''}`),modified:finalNow(),owner:CURRENT}));files().unshift(...copies);addActivity(`复制了 ${copies.length} 项文件`);state.selected=[];toast('复制完成');render()};
  window.collabBatchMove=()=>dialog('移动到',`<div class="collab-destination"><button onclick="collabMoveTo('')">${icon('folder')}空间根目录</button>${files().filter(f=>f.type==='folder'&&(f.parent||'')==='').map(f=>`<button onclick="collabMoveTo('${safe(f.name)}')">${icon('folder')}${safe(f.name)}</button>`).join('')}</div>`,`<button class="btn" onclick="this.closest('.collab-dialog-layer').remove()">取消</button>`);
  window.collabMoveTo=target=>{files().filter(f=>state.selected.includes(f.id)).forEach(f=>f.parent=target);addActivity(`移动了 ${state.selected.length} 项文件`);state.selected=[];document.querySelector('.collab-dialog-layer').remove();toast('移动完成');render()};
  window.collabBatchDelete=()=>{const count=state.selected.length;fileStore[state.collabDetail]=files().filter(f=>!state.selected.includes(f.id));state.selected=[];addActivity(`删除了 ${count} 项文件`);toast('已移至误删恢复','warning');render()};

  function collabActivityPage(){const data=(activityStore[state.collabDetail]||[]).filter(a=>state.collabActivityFilter==='all'||a[3]===state.collabActivityFilter);return `<div class="collab-activity-toolbar"><button class="${state.collabActivityFilter==='all'?'active':''}" onclick="state.collabActivityFilter='all';render()">全部</button><button class="${state.collabActivityFilter==='file'?'active':''}" onclick="state.collabActivityFilter='file';render()">文件动态</button><button class="${state.collabActivityFilter==='member'?'active':''}" onclick="state.collabActivityFilter='member';render()">成员动态</button></div><div class="collab-activity-list">${data.map(a=>`<article><i>${safe(a[0].slice(0,1))}</i><div><b>${safe(a[0])}</b><p>${safe(a[1])}</p><span>${safe(a[2])}</span></div></article>`).join('')||'<div class="collab-empty-files">暂无动态</div>'}</div>`}
  function collabSettingsPage(){const s=activeSpace();return `<div class="collab-settings"><section><h3>基本信息</h3><label class="field"><span>空间名称</span><input class="input" id="settingName" value="${safe(s.name)}"></label><label class="field"><span>空间说明</span><textarea class="textarea" id="settingDesc">${safe(s.desc)}</textarea></label><button class="btn primary" onclick="collabSaveSettings()">保存修改</button></section><section><h3>默认权限</h3><label class="field"><span>新成员默认角色</span><select class="select" id="settingRole"><option ${s.defaultRole==='编辑者'?'selected':''}>编辑者</option><option ${s.defaultRole==='下载者'?'selected':''}>下载者</option><option ${s.defaultRole==='预览者'?'selected':''}>预览者</option></select></label><p>${safe(roleText[s.defaultRole||'编辑者'])}</p></section><section class="danger-zone"><h3>空间状态</h3><p>归档后空间变为只读；解散后空间将被移除。</p><button class="btn" onclick="collabToggleArchive('${s.id}')">${s.archived?'恢复空间':'归档空间'}</button><button class="btn danger" onclick="collabDissolve()">解散空间</button></section></div>`}
  window.collabSaveSettings=()=>{const s=activeSpace();s.name=document.getElementById('settingName').value.trim()||s.name;s.desc=document.getElementById('settingDesc').value.trim();s.defaultRole=document.getElementById('settingRole').value;addActivity('更新了空间设置','setting');toast('空间设置已保存');render()};
  window.collabDissolve=()=>dialog('解散协作空间',`<div class="notice danger-notice">解散后不可恢复，请输入空间名称“${safe(activeSpace().name)}”确认。</div><input class="input" id="dissolveName" placeholder="请输入完整空间名称">`,`<button class="btn" onclick="this.closest('.collab-dialog-layer').remove()">取消</button><button class="btn danger" onclick="collabConfirmDissolve()">确认解散</button>`);
  window.collabConfirmDissolve=()=>{if(document.getElementById('dissolveName').value!==activeSpace().name)return toast('空间名称不一致','warning');const id=state.collabDetail;collabs.splice(collabs.findIndex(x=>x.id===id),1);delete fileStore[id];delete memberStore[id];delete activityStore[id];state.collabDetail=null;document.querySelector('.collab-dialog-layer').remove();toast('协作空间已解散','warning');render()};

  window.collabMembersDialog=()=>{const list=membersOf().filter(m=>!state.collabMemberQuery||`${m[0]} ${m[1]}`.includes(state.collabMemberQuery));dialog('成员管理',`<div class="collab-member-tools"><div class="search-box">${icon('search')}<input placeholder="搜索姓名或部门" oninput="state.collabMemberQuery=this.value;collabMembersDialog()"></div><button class="btn primary" ${writable()?'':'disabled'} onclick="collabInviteDialog()">${icon('plus')}邀请成员</button></div><table class="collab-member-table"><thead><tr><th>成员</th><th>部门</th><th>角色</th><th>操作</th></tr></thead><tbody>${list.map(m=>`<tr><td><i>${safe(m[0].slice(0,1))}</i><b>${safe(m[0])}</b></td><td>${safe(m[1])}</td><td><select class="select" ${m[2]==='群主'||!writable()?'disabled':''} onchange="collabChangeRole('${safe(m[0])}',this.value)"><option ${m[2]==='管理员'?'selected':''}>管理员</option><option ${m[2]==='编辑者'?'selected':''}>编辑者</option><option ${m[2]==='下载者'?'selected':''}>下载者</option><option ${m[2]==='预览者'?'selected':''}>预览者</option></select></td><td>${m[2]==='群主'?'<span>创建者</span>':`<button ${writable()?'':'disabled'} onclick="collabRemoveMember('${safe(m[0])}')">移除</button>`}</td></tr>`).join('')}</tbody></table>`,`<button class="btn primary" onclick="this.closest('.collab-dialog-layer').remove()">完成</button>`)};
  window.collabChangeRole=(name,role)=>{const m=membersOf().find(x=>x[0]===name);m[2]=role;addActivity(`将${name}的角色调整为${role}`,'member');toast('成员角色已更新')};
  window.collabRemoveMember=name=>{const list=membersOf();list.splice(list.findIndex(x=>x[0]===name),1);addActivity(`移除了成员${name}`,'member');toast('成员已移除','warning');collabMembersDialog();render()};
  window.collabInviteDialog=()=>dialog('邀请成员',`<div class="form-grid"><label class="field"><span>成员姓名</span><input class="input" id="inviteName" placeholder="输入姓名"></label><label class="field"><span>所属部门</span><select class="select" id="inviteDept"><option>研发中心</option><option>产品设计部</option><option>质量保障部</option><option>综合管理部</option></select></label><label class="field"><span>空间角色</span><select class="select" id="inviteRole"><option>编辑者</option><option>下载者</option><option>预览者</option></select></label></div>`,`<button class="btn" onclick="this.closest('.collab-dialog-layer').remove()">取消</button><button class="btn primary" onclick="collabSubmitInvite()">发送邀请</button>`);
  window.collabSubmitInvite=()=>{const name=document.getElementById('inviteName').value.trim();if(!name)return toast('请输入成员姓名','warning');membersOf().push([name,document.getElementById('inviteDept').value,document.getElementById('inviteRole').value]);addActivity(`邀请${name}加入空间`,'member');document.querySelector('.collab-dialog-layer').remove();toast('邀请已发送');render()};

  if(state.page==='collaboration')render();

</script>
<script data-authoritative-stage="stage-11">
(()=>{
  const closeDialog=()=>document.querySelector('.collab-dialog-layer')?.remove();
  const activeFiles=()=>window.__collabFileStore?.[state.collabDetail]||[];
  const activeMembers=()=>window.__collabMemberStore?.[state.collabDetail]||[];
  const currentSpace=()=>collabs.find(item=>item.id===state.collabDetail);
  const showDialog=(title,body,footer)=>{
    closeDialog();
    const layer=document.createElement('div');
    layer.className='collab-dialog-layer';
    layer.innerHTML=`<section class="collab-dialog"><header><strong>${safe(title)}</strong><button onclick="this.closest('.collab-dialog-layer').remove()">${icon('x')}</button></header><div class="collab-dialog-body">${body}</div><footer>${footer}</footer></section>`;
    layer.addEventListener('click',event=>{if(event.target===layer)layer.remove()});
    document.body.appendChild(layer);
  };

  window.collabRenameFile=id=>{
    document.querySelector('.collab-pop')?.remove();
    const file=activeFiles().find(item=>item.id===id);
    if(!file)return;
    showDialog('重命名',`<label class="field"><span>新名称</span><input class="input" id="collabFileRename" value="${safe(file.name)}"></label>`,`<button class="btn" onclick="this.closest('.collab-dialog-layer').remove()">取消</button><button class="btn primary" onclick="collabSubmitFileRename('${id}')">保存</button>`);
    requestAnimationFrame(()=>document.getElementById('collabFileRename')?.select());
  };

  window.collabSubmitFileRename=id=>{
    const value=document.getElementById('collabFileRename')?.value.trim();
    if(!value)return toast('请输入文件名称','warning');
    const file=activeFiles().find(item=>item.id===id);
    if(!file)return;
    file.name=value;
    file.modified=new Date().toLocaleString('zh-CN',{hour12:false}).replaceAll('/','-');
    const activity=window.__collabActivityStore?.[state.collabDetail];
    if(activity)activity.unshift(['张明远',`重命名了文件为“${value}”`,'刚刚','file']);
    closeDialog();toast('名称已更新');render();
  };

  window.collabMembersDialog=()=>{
    const list=activeMembers();
    const readonly=Boolean(currentSpace()?.archived);
    showDialog('成员管理',`<div class="collab-member-tools"><div class="search-box">${icon('search')}<input id="collabMemberSearch" placeholder="搜索姓名或部门" oninput="collabFilterMembers(this.value)"></div><button class="btn primary" ${readonly?'disabled':''} onclick="collabInviteDialog()">${icon('plus')}邀请成员</button></div><table class="collab-member-table"><thead><tr><th>成员</th><th>部门</th><th>角色</th><th>操作</th></tr></thead><tbody>${list.map(member=>`<tr data-member-key="${safe(`${member[0]} ${member[1]}`)}"><td><i>${safe(member[0].slice(0,1))}</i><b>${safe(member[0])}</b></td><td>${safe(member[1])}</td><td><select class="select" ${member[2]==='群主'||readonly?'disabled':''} onchange="collabChangeRole('${safe(member[0])}',this.value)"><option ${member[2]==='管理员'?'selected':''}>管理员</option><option ${member[2]==='编辑者'?'selected':''}>编辑者</option><option ${member[2]==='下载者'?'selected':''}>下载者</option><option ${member[2]==='预览者'?'selected':''}>预览者</option></select></td><td>${member[2]==='群主'?'<span>创建者</span>':`<button ${readonly?'disabled':''} onclick="collabRemoveMember('${safe(member[0])}')">移除</button>`}</td></tr>`).join('')}</tbody></table>`,`<button class="btn primary" onclick="this.closest('.collab-dialog-layer').remove()">完成</button>`);
    requestAnimationFrame(()=>document.getElementById('collabMemberSearch')?.focus());
  };

  window.collabFilterMembers=value=>{
    const query=value.trim().toLowerCase();
    document.querySelectorAll('.collab-member-table tbody tr').forEach(row=>{
      row.hidden=Boolean(query)&&!row.dataset.memberKey.toLowerCase().includes(query);
    });
  };
  /* collaboration v2-v6 resources are bundled below. */
})();

</script>
<script data-authoritative-stage="stage-12">
(()=>{
  if(window.__collaborationSpaceV2Loaded)return;
  window.__collaborationSpaceV2Loaded=true;

  const CURRENT='张明远';
  const toneNames=['sky','orange','violet','green','rose','amber','cyan'];
  const toneOf=name=>{
    let sum=0;
    for(const ch of String(name||''))sum=(sum+ch.charCodeAt(0))%toneNames.length;
    return `tone-${toneNames[sum]}`;
  };
  const activeSpace=()=>collabs.find(item=>item.id===state.collabDetail);
  const fileStore=window.__collabFileStore||{};
  const memberStore=window.__collabMemberStore||{};
  const activityStore=window.__collabActivityStore||{};
  const spaceFiles=()=>fileStore[state.collabDetail]||[];
  const spaceMembers=()=>memberStore[state.collabDetail]||[];
  const currentPath=()=>Array.isArray(state.collabFolder)?state.collabFolder.join('/'):'';

  Object.assign(state,{
    collabListQuery:state.collabListQuery||'',
    collabFileQuery:state.collabFileQuery||'',
    collabFolder:Array.isArray(state.collabFolder)?state.collabFolder:[],
    collabFileSort:state.collabFileSort||'modified',

    collabInviteDept:state.collabInviteDept||'全部成员',
    collabInviteSearch:state.collabInviteSearch||'',

    collabInviteRole:state.collabInviteRole||'编辑者'
  });

  const directory=[
    {name:'周凯',title:'技术架构',dept:'研发中心'},
    {name:'刘浩',title:'技术开发岗',dept:'研发中心'},
    {name:'许欣',title:'产品设计',dept:'产品设计部'},
    {name:'赵敏',title:'测试工程师',dept:'质量保障部'},
    {name:'李晓华',title:'管理员',dept:'综合管理部'},
    {name:'王璐',title:'综合事务',dept:'综合管理部'},
    {name:'唐楠',title:'运营专员',dept:'运营管理部'},
    {name:'罗毅',title:'规划经理',dept:'运营管理部'},
    {name:'陈洁',title:'财务经理',dept:'综合管理部'},
    {name:'何勇',title:'预算专员',dept:'综合管理部'}
  ];

  const departments=['全部成员','研发中心','产品设计部','质量保障部','综合管理部','运营管理部'];

  function mountLayer(className,html){
    document.querySelector('.collab-v2-layer')?.remove();
    const layer=document.createElement('div');
    layer.className=`collab-v2-layer ${className||''}`;
    layer.innerHTML=html;
    layer.addEventListener('click',event=>{if(event.target===layer)layer.remove()});
    document.body.appendChild(layer);
    return layer;
  }

  function openPop(event,items){
    document.querySelector('.collab-v2-pop')?.remove();
    const pop=document.createElement('div');
    pop.className='collab-v2-pop';
    pop.innerHTML=items;
    document.body.appendChild(pop);
    const rect=event.currentTarget.getBoundingClientRect();
    pop.style.left=`${Math.min(innerWidth-198,Math.max(12,rect.right-184))}px`;
    pop.style.top=`${Math.min(innerHeight-pop.offsetHeight-12,rect.bottom+6)}px`;
    setTimeout(()=>document.addEventListener('click',()=>pop.remove(),{once:true}),0);
  }

  function memberCount(space){
    return (memberStore[space.id]||[]).length||(space.members?.length||0)+(space.more||0);
  }

  function spaceTone(index){return toneNames[index%toneNames.length]}

    return `<article class="collab-v2-space-card space-tone-${spaceTone(index)}" onclick="collabOpen('${space.id}')">
      <div class="collab-v2-space-card-head">

          <strong>${safe(space.name)}</strong>
          <p>${safe(space.desc)}</p>

      </div>

        <span>${icon('users')} ${memberCount(space)} 人</span>
        <span>${icon('folder')} ${(fileStore[space.id]||[]).filter(file=>(file.parent||'')==='').length} 项</span>
        <span>${icon('clock')} ${safe(space.updated)}</span>
        <b>进入空间 ${icon('chevron')}</b>

  window.collaboration=function(){
    if(state.collabDetail)return collabDetailPage();
    const query=(state.collabListQuery||'').trim().toLowerCase();
    const list=collabs.filter(space=>{
      const tabMatch=state.collabTab==='archived'
        ?space.archived
        :!space.archived&&(state.collabTab==='all'||state.collabTab==='created'&&space.owner===CURRENT||state.collabTab==='joined'&&space.owner!==CURRENT);

      return tabMatch&&searchMatch;

    return `<section class="page collaboration-page collab-home-v2">

      <div class="collab-v2-home-toolbar">

    </section>`;

  function memberSide(){
    const members=spaceMembers();
    return `<aside class="collab-v2-member-side">
      <header>
        <div><strong>空间成员</strong><span>${members.length} 人</span></div>

        ${members.map(member=>`<article>
          <i class="${toneOf(member[0])}">${safe(member[0].slice(0,1))}</i>

          <em>${safe(member[2])}</em>

      <footer><button class="btn" ${writable()?'':'disabled'} onclick="collabInviteDialog()">${icon('plus')}邀请同事加入</button></footer>
    </aside>`;

  window.collabDetailPage=function(){
    const space=activeSpace();
    if(!space){state.collabDetail=null;return collaboration()}
    const self=spaceMembers().find(member=>member[0]===CURRENT);
    return `<section class="page collaboration-page collab-detail-v2">
      <div class="collab-v2-workspace">
        <header class="collab-v2-banner">
          <button class="collab-v2-back" onclick="collabBack()">${icon('arrowLeft')}</button>
          <div class="collab-v2-space-icon tone-sky">${icon(space.archived?'archive':'users')}</div>
          <div class="collab-v2-banner-copy">
            <h2>${safe(space.name)} ${space.archived?'<span class="badge orange">已归档</span>':''}</h2>
            <p>${safe(space.desc)} · 群主：${safe(space.owner)} · 我的角色：${safe(self?.[2]||space.role)}</p>
