<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDG知识库｜管理中心</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#fff;color:#315a84;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #d5e9ff;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(23,105,255,.09)}.loader strong{display:block;color:#12345d;margin-bottom:7px}.loader small{color:#5f80a0;line-height:1.6}
</style>
</head>
<body>
<div class="loader"><strong>正在进入管理中心</strong><small id="routeHint">正在读取本地模块</small></div>
<script>
(()=>{
  const query=new URLSearchParams(window.location.search);
  const section=String(window.location.hash||'').replace('#','');
  const isAdmin=query.get('console')==='admin';
  let target='admin-member-local.html?console=admin#member';
  let label='成员管理';

  if(isAdmin&&(section==='dept'||section==='audit')){
    target='admin-dept-local.html'+window.location.search+window.location.hash;
    label=section==='audit'?'治理与审计':'部门管理';
  }else if(isAdmin&&(section==='grant'||section==='security')){
    target='admin-grant-local.html'+window.location.search+window.location.hash;
    label=section==='security'?'安全配置':'管理员设置';
  }else if(isAdmin&&section==='member'){
    target='admin-member-local.html'+window.location.search+window.location.hash;
  }

  const hint=document.getElementById('routeHint');
  if(hint)hint.textContent=`正在进入本地${label}页面`;
  window.location.replace(target);
})();
</script>
</body>
</html>
