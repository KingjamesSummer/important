<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDG知识库｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#fff;color:#315a84;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #d5e9ff;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(23,105,255,.09)}.loader strong{display:block;color:#12345d;margin-bottom:7px}.loader small{color:#5f80a0;line-height:1.6}
</style>
</head>
<body>
<div class="loader"><strong>正在载入 GDG知识库原型…</strong><small>正在加载成员管理工作台</small></div>
<script>
(async()=>{
  const query=new URLSearchParams(window.location.search);
  const section=String(window.location.hash||'').replace('#','');
  const localDepartment=query.get('console')==='admin'&&(!section||section==='dept'||section==='audit');
  if(window.location.protocol==='file:'&&localDepartment){
    window.location.replace('admin-dept-local.html'+window.location.search+window.location.hash);
    return;
  }
  if(window.location.protocol==='file:'){
    const safePreview=new URL('https://cdn.jsdelivr.net/gh/KingjamesSummer/important@main/web-prototype.html');
    query.forEach((value,key)=>safePreview.searchParams.append(key,value));
    safePreview.searchParams.set('_memberLocal','20260624-1');
    safePreview.hash=window.location.hash;
    const hint=document.querySelector('.loader small');
    if(hint)hint.textContent='正在切换到 HTTPS 安全预览，避免本地文件跨域限制';
    window.location.replace(safePreview.href);
    return;
  }

  const revision='971ebd67af097c2581fbe22d60be6df7fa8bc801';
  const sources=[
    `https://cdn.jsdelivr.net/gh/KingjamesSummer/important@${revision}/web-prototype.html`,
    `https://raw.githubusercontent.com/KingjamesSummer/important/${revision}/web-prototype.html`
  ];
  let source='';
  for(const url of sources){
    try{
      const response=await fetch(url,{cache:'no-store'});
      if(response.ok){source=await response.text();break}
    }catch(error){}
  }
  if(!source)throw new Error('管理员设置基础版本加载失败');

  const payloadRevision='a7268de8fbd120a5d0947855bd2e7195e4d67a1b';
  const payloadNames=[1,2,3,4,5,6].map(index=>`admin-member-console-v12.part${String(index).padStart(2,'0')}.txt`);
  const loadPayloadPart=async name=>{
    const urls=[
      `assets/${name}`,
      `https://cdn.jsdelivr.net/gh/KingjamesSummer/important@${payloadRevision}/assets/${name}`,
      `https://raw.githubusercontent.com/KingjamesSummer/important/${payloadRevision}/assets/${name}`
    ];
    for(const url of urls){
      try{
        const response=await fetch(url,{cache:'no-store'});
        if(response.ok)return (await response.text()).trim();
      }catch(error){}
    }
    throw new Error(`成员管理资源加载失败：${name}`);
  };
  const memberBase64=(await Promise.all(payloadNames.map(loadPayloadPart))).join('');
  const memberCompressed=Uint8Array.from(atob(memberBase64),char=>char.charCodeAt(0));
  const memberStream=new Blob([memberCompressed]).stream().pipeThrough(new DecompressionStream('gzip'));
  const memberPatch=await new Response(memberStream).text();
  const memberSeparator='/*__MEMBER_V12_SCRIPT__*/';
  const memberSplitAt=memberPatch.indexOf(memberSeparator);
  if(memberSplitAt<0)throw new Error('成员管理资源结构不完整');
  const memberStyles=memberPatch.slice(0,memberSplitAt);
  const memberScriptSource=memberPatch.slice(memberSplitAt+memberSeparator.length);
  const memberScriptTag='<scr'+'ipt>'+memberScriptSource.replace(/<\/script/gi,'<\\/script')+'</scr'+'ipt>';
  const adminWorkspaceTag='<scr'+'ipt src="assets/admin-grant-workspace.js?v=20260624"></scr'+'ipt>';

  const loadCheck="  if(!source)throw new Error('检索模块基础版本加载失败');";
  const versionLine="  source=source.split('assets/admin-grant-polish-v2.js?v=2').join('assets/admin-grant-polish-v2.js?v=3');";
  const enterpriseLine="  source=source.replace(/assets\\/enterprise-space-v2\\.js\\?v=\\d+/g,'assets/enterprise-space-bundle-v1.js?v=1');";
  const deptVersionLine="  source=source.split('assets/admin-dept-console-v12.js?v=3').join('assets/admin-dept-console-v12.js?v=4');";
  if(!source.includes(loadCheck))throw new Error('管理员设置脚本挂载点不兼容');
  source=source.replace(loadCheck,loadCheck+'\n'+versionLine+'\n'+enterpriseLine+'\n'+deptVersionLine);

  if(!source.includes('</head>')||!source.includes('</body>'))throw new Error('成员管理挂载点不兼容');
  source=source.replace('</head>',memberStyles+'</head>');
  source=source.replace('</body>',adminWorkspaceTag+memberScriptTag+'</body>');

  document.open();
  document.write(source);
  document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
