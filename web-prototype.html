function motionAllowed(){return !window.matchMedia('(prefers-reduced-motion: reduce)').matches}
function animatePage(){
  if(!window.anime||!motionAllowed())return;
  requestAnimationFrame(()=>{
    const page=document.querySelector('.page');
    if(page)anime({targets:page,opacity:[0,1],translateY:[7,0],duration:360,easing:'easeOutCubic'});
    const cards=document.querySelectorAll('.stat-card,.quick,.collab-card,.file-card');
    if(cards.length)anime({targets:cards,opacity:[0,1],translateY:[6,0],delay:anime.stagger(22,{start:35}),duration:320,easing:'easeOutCubic'});
  });
}
function animateOverlay(){
  if(!window.anime||!motionAllowed())return;
  requestAnimationFrame(()=>{
    const layer=document.querySelector('.modal-layer,.drawer-layer');
    const modal=document.querySelector('.modal');
    const drawer=document.querySelector('.drawer');
    const menu=document.querySelector('.menu-pop');
    if(layer)anime({targets:layer,opacity:[0,1],duration:170,easing:'linear'});
    if(modal)anime({targets:modal,opacity:[0,1],scale:[.975,1],translateY:[8,0],duration:250,easing:'easeOutCubic'});
    if(drawer)anime({targets:drawer,translateX:['100%',0],duration:280,easing:'easeOutCubic'});
    if(menu)anime({targets:menu,opacity:[0,1],scale:[.97,1],translateY:[-3,0],duration:170,easing:'easeOutCubic'});
  });
}

function selectionBar(space){const count=state.selected.length;if(space!=='personal'){if(!count)return'';return `<div class="selection-bar"><strong>已选择 ${count} 项</strong><button class="btn compact" onclick="toast('已加入 '+count+' 个下载任务')">${icon('download')}下载</button><button class="btn compact" onclick="openModal('destination',{space,mode:'move'})">${icon('move')}移动</button><button class="btn compact" onclick="openModal('destination',{space,mode:'copy'})">${icon('copy')}复制到</button><button class="btn compact" onclick="openModal('delete',{space})">${icon('trash')}删除</button><button class="btn compact" onclick="showSelectedDetail()">${icon('info')}详情</button><div class="spacer"></div><button class="btn ghost icon-only compact" onclick="clearSelection()">${icon('x')}</button></div>`}const has=count>0;const one=count===1;const disabled=has?'':'disabled';const oneDisabled=one?'':'disabled';return `<div class="selection-bar static-selection-bar" data-space="personal"><strong class="selection-count">${has?`已选择 ${count} 项`:'未选择文件'}</strong><button class="btn compact action-download" ${disabled} onclick="toast('已加入 '+state.selected.length+' 个下载任务')">${icon('download')}下载</button><button class="btn compact action-move" ${disabled} onclick="openModal('destination',{space:'personal',mode:'move'})">${icon('move')}移动</button><button class="btn compact action-copy" ${disabled} onclick="openModal('destination',{space:'personal',mode:'copy'})">${icon('copy')}复制到</button><button class="btn compact action-favorite" ${disabled} onclick="toggleFavoriteSelected()">${icon('star')}收藏</button><button class="btn compact action-tag" ${disabled} onclick="openModal('tag')">${icon('tag')}标签</button><button class="btn compact action-delete" ${disabled} onclick="openModal('delete',{space:'personal'})">${icon('trash')}删除</button><button class="btn compact action-detail" ${oneDisabled} onclick="showSelectedDetail()">${icon('info')}详情</button><div class="spacer"></div><button class="btn ghost icon-only compact action-clear" ${disabled} title="取消选择" onclick="clearSelection()">${icon('x')}</button></div>`}
function fileTable(files,opt={}){const compact=opt.compact;return `<table class="file-table"><thead><tr><th class="check-col"><input class="check" type="checkbox" ${state.selected.length&&state.selected.length===files.length?'checked':''} onchange="toggleAll(this.checked,${JSON.stringify(files.map(x=>x.id)).replace(/"/g,'&quot;')})"></th><th class="name-col"><span class="sort-head" onclick="sortBy('name')">名称${sortArrows('name')}</span></th><th class="size-col"><span class="sort-head" onclick="sortBy('size')">大小${sortArrows('size')}</span></th>${opt.owner?'<th class="owner-col">创建人</th>':''}<th class="time-col"><span class="sort-head" onclick="sortBy('modified')">修改时间${sortArrows('modified')}</span></th>${compact?'':'<th class="status-col">状态</th><th class="op-col"></th>'}</tr></thead><tbody>${files.map(f=>`<tr class="${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','${opt.space||'personal'}')" ondblclick="openFile('${f.id}','${opt.space||'personal'}')"><td class="check-col"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"></td><td><div class="file-name">${fileVisual(f)}<div class="file-name-copy"><div class="file-name-title">${safe(f.name)}</div><div class="file-name-meta">${f.tag?`<span class="badge blue">${safe(f.tag)}</span>`:''}${f.favorite?'<span style="color:#f59e0b">★</span>':''}</div></div></div></td><td>${f.type==='folder'?'—':safe(f.size||'—')}</td>${opt.owner?`<td class="owner-col">${safe(f.owner||'张明远')}</td>`:''}<td>${safe(f.modified)}</td>${compact?'':`<td><span class="status-dot ${f.status==='正常'?'green':f.status==='受控'?'orange':'red'}"></span>${safe(f.status||'正常')}</td><td class="op-col"><button class="more-btn" onclick="event.stopPropagation();openMenu(event,'${f.id}','${opt.space||'personal'}')">${icon('more')}</button></td>`}</tr>`).join('')||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">${icon('search')}</div><strong>没有找到匹配内容</strong><p>尝试清除筛选条件或更换关键词</p></div></td></tr>`}</tbody></table>`}
function sortArrows(k){return sortMark(k)}
function sortMark(k){const active=state.sort.key===k;return `<span class="sort-mark ${active?state.sort.dir:'idle'}">${icon('down')}</span>`}
function sortBy(k){if(state.sort.key===k)state.sort.dir=state.sort.dir==='asc'?'desc':'asc';else{state.sort.key=k;state.sort.dir='asc'}render()}
function rowClick(e,id,space){if(e.target.closest('button,input'))return;if(space!=='personal'){state.detail={id,space};render();return}if(e.ctrlKey||e.metaKey){state.selected=state.selected.includes(id)?state.selected.filter(x=>x!==id):[...state.selected,id]}else{state.selected=[id]}state.detail=null;syncPersonalSelection()}
function openFile(id,space){const f=findFile(id,space);if(!f)return;if(f.type==='folder'){state.folder.push(f.name);toast(`已进入文件夹「${f.name}」`);render()}else openModal('preview',{file:f})}
function findFile(id,space){if(space==='enterprise')return (enterpriseFiles[state.dept]||[]).find(x=>x.id===id);if(space==='collab')return collabFiles.find(x=>x.id===id);return personalFiles.find(x=>x.id===id)}
function toggleOne(id,on){if(on&&!state.selected.includes(id))state.selected.push(id);if(!on)state.selected=state.selected.filter(x=>x!==id);if(state.page==='personal')syncPersonalSelection();else render()}
function toggleAll(on,ids){state.selected=on?ids:[];if(state.page==='personal')syncPersonalSelection();else render()}
function clearSelection(){state.selected=[];state.detail=null;if(state.page==='personal')syncPersonalSelection();else render()}
function syncPersonalSelection(){const ids=new Set(state.selected);document.querySelectorAll('.personal-file-table tbody tr[data-file-id],.file-card[data-file-id]').forEach(el=>{const selected=ids.has(el.dataset.fileId);el.classList.toggle('selected',selected);const check=el.querySelector('.check');if(check)check.checked=selected});const all=document.querySelector('.personal-file-table thead .check');if(all){const rows=[...document.querySelectorAll('.personal-file-table tbody tr[data-file-id]')];all.checked=rows.length>0&&rows.every(row=>ids.has(row.dataset.fileId));all.indeterminate=ids.size>0&&!all.checked}const bar=document.querySelector('.static-selection-bar');if(!bar)return;const count=ids.size;const label=bar.querySelector('.selection-count');if(label)label.textContent=count?`已选择 ${count} 项`:'未选择文件';bar.querySelectorAll('.action-download,.action-move,.action-copy,.action-favorite,.action-tag,.action-delete,.action-clear').forEach(btn=>btn.disabled=count===0);const detail=bar.querySelector('.action-detail');if(detail)detail.disabled=count!==1}
function showSelectedDetail(){if(state.selected.length===1){const space=state.page==='enterprise'?'enterprise':state.page==='collaboration'?'collab':'personal';state.detail={id:state.selected[0],space};render()}else toast('请选择单个文件查看详情','warning')}
function detailPane(){if(!state.detail)return'';const f=findFile(state.detail.id,state.detail.space);if(!f)return'';const isPersonal=state.detail.space==='personal';return `<aside class="detail-pane"><div class="detail-head">${isPersonal?'属性详情':'文件详情'}<button class="btn ghost icon-only" onclick="state.detail=null;render()">${icon('x')}</button></div><div class="detail-body"><div class="detail-preview">${fileVisual(f)}<strong>${safe(f.name)}</strong><span class="badge ${f.status==='正常'?'green':'orange'}">${safe(f.status||'正常')}</span></div><div class="info-list"><div class="info-row"><span>文件类型</span><span>${f.type==='folder'?'文件夹':f.type.toUpperCase()+' 文件'}</span></div><div class="info-row"><span>所在位置</span><span>${state.detail.space==='enterprise'?'企业空间 / '+state.dept:state.detail.space==='collab'?'协作空间':'个人空间'}</span></div><div class="info-row"><span>文件大小</span><span>${safe(f.size||'—')}</span></div><div class="info-row"><span>修改时间</span><span>${safe(f.modified)}</span></div><div class="info-row"><span>所有者</span><span>${safe(f.owner||'张明远（本人）')}</span></div><div class="info-row"><span>标签</span><span>${safe(f.tag||'暂无')}</span></div></div>${isPersonal?'':`<div class="detail-actions"><button class="btn" onclick="openModal('preview',{file:findFile('${f.id}','${state.detail.space}')})">${icon('eye')}预览</button><button class="btn" onclick="openModal('share',{file:findFile('${f.id}','${state.detail.space}')})">${icon('link')}分享</button></div>`}</div></aside>`}
function personalFileTable(files){return `<table class="file-table personal-file-table"><colgroup><col class="personal-check-col"><col class="personal-name-col"><col class="personal-tag-col"><col class="personal-size-col"><col class="personal-time-col"><col class="personal-status-col"><col class="personal-op-col"></colgroup><thead><tr><th class="check-col"><input class="check" type="checkbox" ${state.selected.length&&state.selected.length===files.length?'checked':''} onchange="toggleAll(this.checked,${JSON.stringify(files.map(x=>x.id)).replace(/"/g,'&quot;')})"></th><th><span class="sort-head" onclick="sortBy('name')">名称${sortMark('name')}</span></th><th>标签</th><th><span class="sort-head" onclick="sortBy('size')">大小${sortMark('size')}</span></th><th><span class="sort-head" onclick="sortBy('modified')">修改时间${sortMark('modified')}</span></th><th>状态</th><th class="op-col"></th></tr></thead><tbody>${files.map(f=>`<tr data-file-id="${f.id}" class="${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','personal')" ondblclick="openFile('${f.id}','personal')" oncontextmenu="openMenu(event,'${f.id}','personal')"><td class="check-col"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"></td><td><div class="file-name">${fileVisual(f)}<div class="file-name-copy"><div class="file-name-title">${safe(f.name)}</div>${f.favorite?'<div class="file-name-meta"><span class="favorite-note">★ 已收藏</span></div>':''}</div></div></td><td><span class="personal-tag">${safe(f.tag||'未分类')}</span></td><td>${f.type==='folder'?'—':safe(f.size||'—')}</td><td>${safe(f.modified)}</td><td><span class="status-dot ${f.status==='正常'?'green':f.status==='受控'?'orange':'red'}"></span>${safe(f.status||'正常')}</td><td class="op-col"><button class="more-btn" aria-label="更多操作" onclick="event.stopPropagation();openMenu(event,'${f.id}','personal')">${icon('more')}</button></td></tr>`).join('')||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">${icon('search')}</div><strong>没有找到匹配内容</strong><p>尝试清除筛选条件或更换关键词</p></div></td></tr>`}</tbody></table>`}
function personal(){const files=currentFiles('personal');const filtersActive=state.filters.type!=='all'||state.filters.tag!=='all';return `${pageHead('个人空间','存放个人工作文件与临时资料，默认仅本人可见','',`<span class="badge blue">${icon('lock','icon')}本人可见</span>`)}<div class="tabs personal-tabs"><button class="tab ${state.personalTab==='all'?'active':''}" onclick="setPersonalTab('all')">全部文件</button><button class="tab ${state.personalTab==='recent'?'active':''}" onclick="setPersonalTab('recent')">最近使用</button><button class="tab ${state.personalTab==='favorites'?'active':''}" onclick="setPersonalTab('favorites')">我的收藏</button></div><div class="panel personal-panel" style="position:relative"><div class="personal-toolbar"><div class="upload-split"><button class="btn primary upload-main" onclick="startUpload('personal')">${icon('upload')}上传文件</button><button class="btn primary upload-caret" aria-label="更多上传方式" aria-expanded="${state.personalUploadOpen}" onclick="event.stopPropagation();state.personalUploadOpen=!state.personalUploadOpen;state.profileOpen=false;render()">${icon('down')}</button>${state.personalUploadOpen?`<div class="upload-method-pop" onclick="event.stopPropagation()"><button onclick="state.personalUploadOpen=false;startUpload('personal')">${icon('upload')}<span class="upload-option-copy"><strong>上传文件</strong><small>支持多选</small></span></button><button onclick="state.personalUploadOpen=false;startFolderUpload()">${icon('folder')}<span class="upload-option-copy"><strong>上传文件夹</strong><small>保留目录结构</small></span></button></div>`:''}</div><button class="btn" onclick="openModal('newFolder',{space:'personal'})">${icon('folderPlus')}新建文件夹</button><div class="search-box personal-search">${icon('search')}<input value="${safe(state.query)}" placeholder="搜索当前目录" onkeydown="if(event.key==='Enter'){state.query=this.value;render()}"><button class="btn ghost icon-only" style="width:26px;height:26px" onclick="state.filterOpen=!state.filterOpen;state.personalUploadOpen=false;render()" title="筛选条件">${icon('filter')}</button></div><div class="spacer"></div><div class="view-toggle"><button class="${state.view==='list'?'active':''}" onclick="state.view='list';render()" title="列表视图">${icon('list')}</button><button class="${state.view==='grid'?'active':''}" onclick="state.view='grid';render()" title="网格视图">${icon('grid')}</button></div></div>${state.filterOpen?filterPop():''}${filtersActive?`<div class="filter-summary">当前筛选：${state.filters.type!=='all'?`<span class="filter-chip">${state.filters.type.toUpperCase()} <b onclick="state.filters.type='all';render()">×</b></span>`:''}${state.filters.tag!=='all'?`<span class="filter-chip">${state.filters.tag} <b onclick="state.filters.tag='all';render()">×</b></span>`:''}<button class="btn text" style="margin-left:auto" onclick="clearFilters()">清除筛选</button></div>`:''}${selectionBar('personal')}<div class="pathbar personal-pathbar"><button>个人空间</button><span class="path-hint">根目录</span><span class="count">${files.length} 项</span></div><div class="file-content">${state.view==='list'?`<div class="table-zone">${personalFileTable(files)}</div>`:personalGrid(files)}${detailPane()}</div></div>`}
function setPersonalTab(t){state.personalTab=t;state.selected=[];state.detail=null;render()}
function filterPop(){return `<div class="filter-pop"><div class="filter-title">搜索条件<button class="btn ghost icon-only" onclick="state.filterOpen=false;render()">${icon('x')}</button></div><div class="form-grid"><div class="field"><label>文件类型</label><select class="select" id="filterType"><option value="all" ${state.filters.type==='all'?'selected':''}>全部类型</option><option value="doc">Word 文档</option><option value="pdf">PDF 文件</option><option value="xls">Excel 表格</option><option value="ppt">演示文稿</option><option value="img">图片</option></select></div><div class="field"><label>标签</label><select class="select" id="filterTag"><option value="all">全部标签</option>${['项目','计划','调研','任务','汇报','设计','技术','临时'].map(x=>`<option value="${x}" ${state.filters.tag===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>显示方式</label><div class="view-toggle" style="width:74px"><button class="${state.view==='list'?'active':''}" onclick="state.view='list';render()">${icon('list')}</button><button class="${state.view==='grid'?'active':''}" onclick="state.view='grid';render()">${icon('grid')}</button></div></div></div><div class="filter-actions"><button class="btn" onclick="clearFilters()">重置</button><button class="btn primary" onclick="applyFilters()">应用</button></div></div>`}
function applyFilters(){state.filters.type=document.getElementById('filterType').value;state.filters.tag=document.getElementById('filterTag').value;state.filterOpen=false;render()}
function clearFilters(){state.filters={type:'all',tag:'all'};state.filterOpen=false;render()}
function personalGrid(files){return `<div class="grid-zone"><div class="file-grid">${files.map(f=>`<div data-file-id="${f.id}" class="file-card ${state.selected.includes(f.id)?'selected':''}" onclick="rowClick(event,'${f.id}','personal')" ondblclick="openFile('${f.id}','personal')" oncontextmenu="openMenu(event,'${f.id}','personal')"><input class="check" type="checkbox" ${state.selected.includes(f.id)?'checked':''} onclick="event.stopPropagation();toggleOne('${f.id}',this.checked)"><button class="more-btn" onclick="event.stopPropagation();openMenu(event,'${f.id}','personal')">${icon('more')}</button>${fileVisual(f)}<div class="file-card-name">${safe(f.name)}</div><div class="file-card-meta"><span>${safe(f.size||'—')}</span><span>${safe(f.modified.slice(5,10))}</span></div></div>`).join('')}</div></div>`}
function collaboration(){if(state.collabDetail)return collabDetailPage();let list=collabs.filter(c=>state.collabTab==='archived'?c.archived:!c.archived&&(state.collabTab==='all'||state.collabTab==='created'&&c.owner==='张明远'||state.collabTab==='joined'&&c.owner!=='张明远'));return `${pageHead('协作空间','面向项目和跨部门团队的群组协作文件空间',`<button class="btn primary" onclick="openModal('createCollab')">${icon('plus')}新建协作空间</button>`)}<div class="collab-layout"><div class="collab-toolbar"><div class="tabs" style="margin:0;flex:1"><button class="tab ${state.collabTab==='all'?'active':''}" onclick="setCollabTab('all')">全部</button><button class="tab ${state.collabTab==='created'?'active':''}" onclick="setCollabTab('created')">我创建的</button><button class="tab ${state.collabTab==='joined'?'active':''}" onclick="setCollabTab('joined')">我加入的</button><button class="tab ${state.collabTab==='archived'?'active':''}" onclick="setCollabTab('archived')">已归档</button></div><div class="search-box">${icon('search')}<input placeholder="搜索协作空间"></div></div><div class="collab-grid">${list.map(c=>collabCard(c)).join('')||`<div class="panel empty" style="grid-column:1/-1"><div class="empty-icon">${icon('archive')}</div><strong>暂无协作空间</strong><p>当前分类下没有可显示的协作空间</p></div>`}</div></div>`}
function setCollabTab(t){state.collabTab=t;render()}
function collabCard(c){return `<article class="panel collab-card ${c.archived?'archived':''}" onclick="openCollab('${c.id}')"><div class="collab-top"><div class="collab-icon">${icon(c.archived?'archive':'users')}</div><div class="collab-main"><div class="collab-name">${safe(c.name)}</div><div class="collab-desc">${safe(c.desc)}</div></div><button class="more-btn collab-more" style="opacity:1" onclick="event.stopPropagation();openCollabMenu(event,'${c.id}')">${icon('more')}</button></div><div class="collab-tags"><span class="badge blue">${safe(c.role)}</span>${c.tags.map(x=>`<span class="badge ${c.archived?'':'green'}">${safe(x)}</span>`).join('')}</div><div class="collab-foot"><div class="avatar-stack">${c.members.map(x=>`<span class="mini-avatar">${x}</span>`).join('')}</div><span class="member-more">+${c.more} 成员</span><span class="meta">${icon('clock')} ${safe(c.updated)}</span></div><div class="card-actions"><button class="btn compact" onclick="event.stopPropagation();openCollab('${c.id}')">进入空间</button></div></article>`}
function openCollab(id){state.collabDetail=id;state.collabDetailTab='files';state.selected=[];state.detail=null;render()}
function collabDetailPage(){const c=collabs.find(x=>x.id===state.collabDetail);return `<div class="panel detail-banner"><button class="back-btn" onclick="state.collabDetail=null;render()">${icon('arrowLeft')}</button><div class="collab-icon">${icon(c.archived?'archive':'users')}</div><div class="detail-banner-main"><h2>${safe(c.name)} ${c.archived?'<span class="badge orange">只读归档</span>':''}</h2><p>${safe(c.desc)} · 群主：${safe(c.owner)}</p></div><div class="page-actions"><button class="btn" onclick="openModal('members',{collab:c})">${icon('users')}成员管理</button><button class="btn" onclick="openModal('invite',{collab:c})">${icon('plus')}邀请成员</button><button class="btn icon-only" onclick="openCollabMenu(event,'${c.id}')">${icon('more')}</button></div></div><div class="collab-detail-grid"><div class="panel personal-panel"><div class="segment-tabs"><button class="${state.collabDetailTab==='files'?'active':''}" onclick="state.collabDetailTab='files';render()">文件</button><button class="${state.collabDetailTab==='activity'?'active':''}" onclick="state.collabDetailTab='activity';render()">动态</button><button class="${state.collabDetailTab==='settings'?'active':''}" onclick="state.collabDetailTab='settings';render()">空间设置</button></div>${state.collabDetailTab==='files'?collabFilesView(c):state.collabDetailTab==='activity'?collabActivity():collabSettings(c)}</div><aside class="panel member-panel"><div class="card-head"><div><div class="panel-title">空间成员</div><div class="panel-subtitle">共 ${members.length+4} 人</div></div><button class="btn text right" onclick="openModal('members',{collab:c})">管理</button></div><div class="member-list">${members.map(m=>`<div class="member-row"><div class="person-avatar">${m.initial}</div><div class="member-info"><strong>${m.name}</strong><span>${m.dept}</span></div><span class="badge ${m.role==='群主'?'blue':''}">${m.role}</span></div>`).join('')}</div></aside></div>`}
function collabFilesView(c){return `<div class="personal-toolbar"><button class="btn primary" ${c.archived?'disabled':''} onclick="startUpload('collab')">${icon('upload')}上传</button><button class="btn" ${c.archived?'disabled':''} onclick="openModal('newFolder',{space:'collab'})">${icon('folderPlus')}新建文件夹</button><div class="spacer"></div><div class="search-box">${icon('search')}<input placeholder="搜索空间文件"></div></div>${selectionBar('collab')}<div class="pathbar"><button>${safe(c.name)}</button><span class="count">${collabFiles.length} 项</span></div><div class="file-content"><div class="table-zone">${fileTable(collabFiles,{owner:true,space:'collab'})}</div>${detailPane()}</div>`}
function collabActivity(){return `<div class="card-body" style="padding-top:8px">${[['许欣','上传了 3 个交互原型文件','今天 09:42'],['周凯','更新了《系统架构评审材料.pdf》','昨天 16:22'],['张明远','将赵敏的角色调整为预览者','06-21 11:08'],['刘浩','新建文件夹「03 开发交付」','06-20 18:31']].map(x=>`<div class="activity"><div class="activity-avatar">${x[0][0]}</div><div class="activity-main"><b>${x[0]}</b> ${x[1]}<span>${x[2]}</span></div></div>`).join('')}</div>`}
function collabSettings(c){return `<div class="card-body"><div class="form-grid" style="max-width:620px"><div class="field"><label>空间名称</label><input class="input" value="${safe(c.name)}"></div><div class="field"><label>空间说明</label><textarea class="textarea">${safe(c.desc)}</textarea></div><div class="form-row"><div class="field"><label>默认文件角色</label><select class="select"><option>编辑者</option><option>下载者</option><option>预览者</option></select></div><div class="field"><label>空间状态</label><select class="select"><option>${c.archived?'已归档':'正常使用'}</option></select></div></div><div><button class="btn primary" onclick="toast('空间设置已保存')">保存设置</button></div><div class="notice ${c.archived?'':'danger-notice'}">${c.archived?'归档空间处于只读状态。恢复后成员才可以继续上传和修改文件。':'归档后空间将变为只读，成员仍可查看和下载；解散操作不可恢复。'}</div><div style="display:flex;gap:8px"><button class="btn" onclick="archiveCollab('${c.id}')">${c.archived?'恢复空间':'归档空间'}</button><button class="btn danger" onclick="openModal('dissolve',{collab:c})">解散空间</button></div></div></div>`}

置':'岗位','我的权限':'空间状态','共享时间':'最近登录'}[m])).replace(/李晓华|许欣|周凯/g,'研发中心')}`;if(state.adminTab==='grant')return `<div class="admin-head"><h3>管理员设置</h3><button class="btn primary" style="margin-left:auto" onclick="openModal('createAdmin')">${icon('plus')}添加管理员</button></div><div class="notice" style="margin-bottom:13px">支持系统管理员、分级管理员、部门负责人和文件管理员。分级管理员只能治理授权公司或部门范围。</div><table class="simple-table panel"><thead><tr><th>管理员</th><th>管理员类型</th><th>管辖范围</th><th>授权能力</th><th>状态</th><th class="right">操作</th></tr></thead><tbody><tr><td>李晓华</td><td>系统管理员</td><td>全集团</td><td>组织、成员、配置、审计</td><td><span class="status-dot green"></span>生效</td><td class="right"><button class="btn compact">编辑</button></td></tr><tr><td>周凯</td><td>分级管理员</td><td>研发中心、产品设计部</td><td>成员、资料库、报表</td><td><span class="status-dot green"></span>生效</td><td class="right"><button class="btn compact">编辑</button></td></tr></tbody></table>`;if(state.adminTab==='stats')return `<div class="admin-head"><h3>统计报表</h3><button class="btn" style="margin-left:auto">导出报表</button></div><div class="stats-grid"><div class="panel stat-card blue"><div class="stat-top"><span>总存储量</span>${icon('chart')}</div><div class="stat-number">2.48 TB</div><div class="stat-note">较上月增长 8.2%</div></div><div class="panel stat-card"><div class="stat-top"><span>文件总数</span>${icon('folder')}</div><div class="stat-number">68,421</div><div class="stat-note">本月新增 4,582</div></div><div class="panel stat-card green"><div class="stat-top"><span>活跃成员</span>${icon('users')}</div><div class="stat-number">241</div><div class="stat-note">活跃率 84.3%</div></div><div class="panel stat-card orange"><div class="stat-top"><span>本月外链访问</span>${icon('link')}</div><div class="stat-number">1,862</div><div class="stat-note">异常访问 3 次</div></div></div><div class="panel" style="height:340px;padding:20px"><div class="panel-title">近 30 天存储趋势</div><div style="height:250px;display:flex;align-items:end;gap:12px;padding-top:30px">${[34,42,38,56,49,62,66,58,74,72,81,78].map((h,i)=>`<div style="flex:1;height:${h}%;background:${i===11?'#2563eb':'#dbeafe'};border-radius:5px 5px 0 0;position:relative"><span style="position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10px;color:#94a3b8">${i+1}</span></div>`).join('')}</div></div>`;return `<div class="admin-head"><h3>安全配置</h3><button class="btn primary" style="margin-left:auto" onclick="toast('安全策略已保存')">保存配置</button></div><div class="panel" style="padding:18px;max-width:760px"><div class="form-grid"><div class="form-row"><div class="field"><label>外链最长有效期</label><select class="select"><option>30 天</option><option>7 天</option><option>永久</option></select></div><div class="field"><label>回收站保留期</label><select class="select"><option>30 天</option><option>60 天</option><option>90 天</option></select></div></div><div class="field"><label>预览水印</label><select class="select"><option>开启：姓名 + 账号 + 时间</option><option>仅姓名</option><option>关闭</option></select></div><div class="field"><label>文件安全扫描</label><select class="select"><option>上传完成后自动扫描</option><option>仅扫描外部文件</option></select></div><div class="notice">安全扫描、外链访问、管理员访问和彻底删除均应记录完整审计日志。</div></div></div>`}
function destinationTree(){const node=(value,label,level=0,kind='folder',children='')=>`<div class="destination-node"><label class="destination-row level-${level}"><input type="radio" name="destinationTarget" value="${safe(value)}"><span class="tree-caret ${children?'open':'empty'}">${children?icon('down'):''}</span>${icon(kind)}<span>${safe(label)}</span></label>${children?`<div class="destination-children">${children}</div>`:''}</div>`;const personal=node('个人空间 / 我的项目资料 / 需求文档','需求文档',2)+node('个人空间 / 我的项目资料 / 评审材料','评审材料',2);const project=node('个人空间 / 我的项目资料','我的项目资料',1,'folder',personal);const personalRoot=node('个人空间','个人空间',0,'home',project+node('个人空间 / 临时文件','临时文件',1));const enterprise=node('企业空间 / 研发中心 / 技术方案','技术方案',2)+node('企业空间 / 研发中心 / 交付文档','交付文档',2);const enterpriseRoot=node('企业空间','企业空间',0,'building',node('企业空间 / 研发中心','研发中心',1,'folder',enterprise));const collabRoot=node('协作空间','协作空间',0,'users',node('协作空间 / 智能知识库一期项目','智能知识库一期项目',1));return `<div class="destination-tree">${personalRoot}${enterpriseRoot}${collabRoot}</div>`}
function completeDestination(mode,space){const target=document.querySelector('input[name="destinationTarget"]:checked')?.value;if(!target)return toast('请选择目标文件夹','warning');const count=state.selected.length;if(mode==='copy')copySelectedToTarget(space,target);else{state.selected=[];closeModal();syncPersonalSelection();toast(`已将 ${count} 项移动到“${target}”`)} }

function closeModal(){state.modal=null;renderOverlays()}
function modalContent(){if(!state.modal)return'';const {type,payload}=state.modal;let title='',body='',foot='',wide=false;if(type==='newFolder'){title='新建文件夹';body=`<div class="field"><label>文件夹名称</label><input class="input" id="folderName" placeholder="请输入文件夹名称" autofocus></div><p class="help">名称不能包含 \\ / : * ? &quot; &lt; &gt; | 等特殊字符。</p>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="createFolder('${payload.space||'personal'}')">创建</button>`}else if(type==='rename'){const f=findFile(payload.id,payload.space);title='重命名';body=`<div class="field"><label>新名称</label><input class="input" id="renameValue" value="${safe(f?.name||'')}" autofocus></div><p class="help">请保留正确的文件扩展名，名称不能包含特殊字符。</p>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="renameItem('${payload.id}','${payload.space}')">保存</button>`}else if(type==='transfer'){const f=personalFiles.find(x=>x.id===payload.id);title='转移文件夹所有权';body=`<div class="notice" style="margin-bottom:14px">转移后，“<b>${safe(f?.name||'')}</b>”及其子项将从你的个人空间移除，接收人获得所有权。</div><div class="field"><label>接收成员</label><select class="select" id="transferMember"><option value="">请选择成员</option><option>李晓华</option><option>周凯</option><option>许欣</option></select></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn danger" onclick="transferItem('${payload.id}')">确认转移</button>`}else if(type==='share'){const f=payload.file||personalFiles[2];title='创建安全外链';body=`<div class="notice" style="margin-bottom:14px">正在分享：<b>${safe(f.name)}</b></div><div class="form-grid"><div class="form-row"><div class="field"><label>有效期</label><select class="select" id="shareExpire"><option>7 天</option><option>30 天</option><option>永久有效</option></select></div><div class="field"><label>访问权限</label><select class="select"><option>预览和下载</option><option>仅预览</option></select></div></div><div class="field"><label>提取码</label><div style="display:flex;gap:8px"><input class="input" id="shareCode" value="${Math.random().toString(36).slice(2,6).toUpperCase()}"><button class="btn" onclick="document.getElementById('shareCode').value=Math.random().toString(36).slice(2,6).toUpperCase()">随机生成</button></div></div><div class="field"><label>访问限制</label><select class="select"><option>任何获得链接的人</option><option>仅企业成员</option></select></div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="createShare('${safe(f.name)}')">创建外链</button>`}else if(type==='preview'){const f=payload.file;title=`预览：${safe(f.name)}`;wide=true;body=`<div class="preview-stage"><div class="preview-paper"><h2>${safe(f.name.replace(/\.[^.]+$/,''))}</h2><div class="preview-line"></div><div class="preview-line"></div><div class="preview-line short"></div><div class="preview-line"></div><div class="preview-line" style="margin-top:34px"></div><div class="preview-line short"></div></div><div class="watermark">${Array(18).fill('<span>张明远 · 2026-06-23</span>').join('')}</div></div>`;foot=`<button class="btn" onclick="toast('已开始下载文件')">${icon('download')}下载</button><button class="btn primary" onclick="closeModal()">关闭预览</button>`}else if(type==='createCollab'){title='新建协作空间';body=`<div class="form-grid"><div class="field"><label>空间名称 <span style="color:var(--danger)">*</span></label><input class="input" id="collabName" placeholder="例如：智能知识库二期项目"></div><div class="field"><label>空间说明</label><textarea class="textarea" id="collabDesc" placeholder="简要说明协作目标和资料范围"></textarea></div><div class="form-row"><div class="field"><label>默认文件角色</label><select class="select"><option>编辑者</option><option>下载者</option><option>预览者</option><option>上传者</option></select></div><div class="field"><label>空间标签</label><input class="input" placeholder="例如：重点项目"></div></div><div class="notice">当前阶段仅支持邀请同一租户内成员，创建者自动成为群主。</div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="createCollab()">创建空间</button>`}else if(type==='invite'){title=`邀请成员 - ${safe(payload.collab.name)}`;body=`<div class="form-grid"><div class="field"><label>选择成员</label><input class="input" placeholder="输入姓名、账号或部门搜索"><div style="margin-top:9px;border:1px solid var(--line);border-radius:8px;overflow:hidden">${['赵敏 · 质量保障部','王璐 · 综合管理部','唐楠 · 运营管理部'].map((x,i)=>`<label style="height:44px;display:flex;align-items:center;gap:9px;padding:0 11px;border-bottom:${i<2?'1px solid var(--line-soft)':'0'}"><input class="check" type="checkbox">${x}</label>`).join('')}</div></div><div class="field"><label>成员角色</label><select class="select"><option>编辑者</option><option>下载者</option><option>预览者</option><option>上传者</option></select></div><div class="notice">成员加入后会收到消息通知，角色权限不能超过邀请人的现有权限。</div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="closeModal();toast('邀请已发送')">发送邀请</button>`}else if(type==='members'){title=`成员管理 - ${safe(payload.collab.name)}`;wide=true;body=`<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn primary" onclick="closeModal();openModal('invite',{collab:collabs.find(x=>x.id==='${payload.collab.id}')})">${icon('plus')}邀请成员</button><button class="btn" onclick="toast('内部邀请链接已复制')">${icon('link')}生成邀请链接</button></div><table class="simple-table" style="border:1px solid var(--line);border-radius:8px;overflow:hidden"><thead><tr><th>成员</th><th>部门</th><th>角色</th><th>加入时间</th><th class="right">操作</th></tr></thead><tbody>${members.map((m,i)=>`<tr><td><div class="file-name"><div class="person-avatar">${m.initial}</div><b>${m.name}</b></div></td><td>${m.dept}</td><td><span class="badge ${i===0?'blue':''}">${m.role}</span></td><td>2026-06-${10+i}</td><td class="right">${i===0?'<span style="color:var(--muted)">创建者</span>':'<button class="btn compact">调整角色</button> <button class="btn ghost compact" style="color:var(--danger)">移除</button>'}</td></tr>`).join('')}</tbody></table>`;foot=`<button class="btn primary" onclick="closeModal()">完成</button>`}else if(type==='delete'){title='确认删除';body=`<div class="danger-notice notice">确定删除已选择的 ${state.selected.length} 项内容吗？删除后将进入“误删恢复”，默认保留 30 天。</div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn danger" onclick="deleteSelected('${payload.space||'personal'}')">删除</button>`}else if(type==='tag'){title='设置标签';body=`<div class="field"><label>选择或输入标签</label><input class="input" id="newTag" placeholder="例如：重点、待评审、归档"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">${['重点','待评审','项目','设计','交付'].map(x=>`<button class="badge blue" style="border:0" onclick="document.getElementById('newTag').value='${x}'">${x}</button>`).join('')}</div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="applyTag()">保存标签</button>`}else if(type==='destination'){const mode=payload.mode||'move';title=mode==='copy'?'复制到':'移动到';body=`<div class="destination-picker-head"><span>选择目标文件夹</span><small>${state.selected.length} 项内容</small></div>${destinationTree()}<div class="notice destination-notice">仅显示你有权限写入的目录；当前目录及其子目录不可作为移动目标。</div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="completeDestination('${mode}','${payload.space||'personal'}')">${mode==='copy'?'复制到此处':'移动到此处'}</button>`}else if(type==='createCollect'){title='新建文件收集';body=`<div class="form-grid"><div class="field"><label>收集任务名称</label><input class="input" id="collectTitle" placeholder="例如：上半年工作总结材料"></div><div class="field"><label>提交说明</label><textarea class="textarea" placeholder="说明需要提交的文件内容和格式"></textarea></div><div class="form-row"><div class="field"><label>截止时间</label><input class="input" type="datetime-local" value="2026-06-28T18:00"></div><div class="field"><label>保存位置</label><select class="select"><option>个人空间 / 我的项目资料</option><option>研发中心 / 项目资料</option></select></div></div><div class="field"><label>提交成员</label><input class="input" placeholder="选择成员或部门"></div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="createCollect()">创建收集</button>`}else if(type==='dissolve'){title='解散协作空间';body=`<div class="danger-notice notice">解散后空间将不可恢复。请确认文件处置策略并输入空间名称完成验证。</div><div class="field" style="margin-top:14px"><label>请输入“${safe(payload.collab.name)}”</label><input class="input" id="dissolveName"></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn danger" onclick="dissolveCollab('${payload.collab.id}','${safe(payload.collab.name)}')">确认解散</button>`}else if(type==='globalSearch'){title='全局搜索';wide=true;body=`<div class="search-box" style="width:100%;height:44px">${icon('search')}<input id="globalSearchInput" placeholder="搜索文件名称、内容、成员或标签" autofocus onkeydown="if(event.key==='Enter')toast('已搜索：'+this.value)"></div><div style="margin-top:18px"><div class="panel-title">最近搜索</div><div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">${['架构方案','验收清单','周例会汇报','运营分析'].map(x=>`<button class="badge" style="border:0" onclick="document.getElementById('globalSearchInput').value='${x}'">${x}</button>`).join('')}</div></div><div style="margin-top:20px"><div class="panel-title">搜索范围</div><div style="display:flex;gap:8px;margin-top:10px"><label><input class="check" type="checkbox" checked> 企业空间</label><label><input class="check" type="checkbox" checked> 个人空间</label><label><input class="check" type="checkbox" checked> 协作空间</label></div></div>`;foot=`<button class="btn" onclick="closeModal()">关闭</button><button class="btn primary" onclick="toast('正在执行全局搜索')">搜索</button>`}else{title=type==='createDept'?'新建部门':type==='createMember'?'添加成员':'添加管理员';body=`<div class="form-grid"><div class="field"><label>名称</label><input class="input" placeholder="请输入名称"></div><div class="field"><label>所属范围</label><select class="select"><option>研发中心</option><option>集团资料库</option></select></div><div class="notice">原型仅演示交互流程，提交后将模拟创建成功。</div></div>`;foot=`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="closeModal();toast('创建成功')">确定</button>`}return `<div class="modal-layer" onclick="if(event.target===this)closeModal()"><div class="modal ${wide?'wide':''}"><div class="modal-head">${title}<button class="btn ghost icon-only" onclick="closeModal()">${icon('x')}</button></div><div class="modal-body">${body}</div><div class="modal-foot">${foot}</div></div></div>`}
function renderOverlays(){const root=document.getElementById('overlayRoot');if(!root)return;root.innerHTML=`${state.modal?modalContent():''}${state.menu?menuContent():''}${state.uploads.length?uploadPanel():''}<div class="toast-wrap">${state.toasts.map(t=>`<div class="toast ${t.type}"><span class="toast-icon">${icon(t.type==='success'?'check':t.type==='warning'?'alert':'x')}</span><span>${safe(t.msg)}</span></div>`).join('')}</div>`;if(state.modal||state.menu)animateOverlay()}
function createFolder(space){const name=document.getElementById('folderName')?.value.trim();if(!name)return toast('请输入文件夹名称','warning');const f={id:'new'+Date.now(),type:'folder',name,modified:'2026-06-23 10:30',owner:'张明远',status:'正常',tag:''};if(space==='enterprise')enterpriseFiles[state.dept].unshift(f);else if(space==='collab')collabFiles.unshift(f);else personalFiles.unshift({...f,favorite:false});closeModal();toast('文件夹创建成功');render()}
function createShare(name){links.unshift({id:'l'+Date.now(),name,code:document.getElementById('shareCode').value,perm:'预览、下载',expire:'2026-07-23',visits:0,status:'生效'});closeModal();toast('安全外链已创建并复制')}
function createCollab(){const name=document.getElementById('collabName')?.value.trim();if(!name)return toast('请输入空间名称','warning');collabs.unshift({id:'c'+Date.now(),name,desc:document.getElementById('collabDesc').value||'新的项目协作空间',role:'群主',owner:'张明远',members:['张'],more:0,files:0,updated:'刚刚',tags:['新建'],archived:false});closeModal();toast('协作空间创建成功');render()}
function createCollect(){const title=document.getElementById('collectTitle')?.value.trim();if(!title)return toast('请输入收集任务名称','warning');collected.unshift({title,creator:'张明远',deadline:'2026-06-28 18:00',progress:'0 / 0',status:'进行中'});closeModal();toast('文件收集任务创建成功');render()}
function deleteSelected(space){let removed=[];if(space==='personal'){removed=personalFiles.filter(x=>state.selected.includes(x.id));personalFiles=personalFiles.filter(x=>!state.selected.includes(x.id))}else if(space==='enterprise'){removed=enterpriseFiles[state.dept].filter(x=>state.selected.includes(x.id));enterpriseFiles[state.dept]=enterpriseFiles[state.dept].filter(x=>!state.selected.includes(x.id))}removed.forEach(x=>recycle.unshift({id:'r'+Date.now()+Math.random(),name:x.name,path:space==='personal'?'个人空间':'企业空间 / '+state.dept,deleted:'2026-06-23 10:30',expire:'剩余 30 天',size:x.size||'—',type:x.type}));state.selected=[];state.detail=null;closeModal();toast('已移入误删恢复');render()}
function applyTag(){const tag=document.getElementById('newTag')?.value.trim();if(!tag)return toast('请输入标签','warning');personalFiles.forEach(x=>{if(state.selected.includes(x.id))x.tag=tag});closeModal();toast('标签已更新');render()}
function toggleFavoriteSelected(){personalFiles.forEach(x=>{if(state.selected.includes(x.id))x.favorite=!x.favorite});toast('收藏状态已更新');render()}
function startFolderUpload(){state.uploads=[{id:Date.now(),name:'项目资料文件夹',pct:0,speed:'正在扫描目录',space:'personal'}];renderOverlays();let timer=setInterval(()=>{const u=state.uploads[0];if(!u){clearInterval(timer);return}u.pct=Math.min(100,u.pct+18);u.speed=u.pct<100?'正在上传目录文件':'已完成';renderOverlays();if(u.pct>=100){clearInterval(timer);setTimeout(()=>{state.uploads=[];renderOverlays();toast('文件夹上传完成，目录结构已保留')},700)}},360)}
function renameItem(id,space){const f=findFile(id,space);const value=document.getElementById('renameValue')?.value.trim();if(!f||!value)return toast('请输入新的名称','warning');f.name=value;closeModal();toast('名称已更新');render()}
function copyItem(id,space){const f=findFile(id,space);if(!f)return;const copy={...f,id:'copy'+Date.now(),name:f.name.replace(/(\.[^.]+)?$/,m=>` - 副本${m||''}`),modified:'2026-06-23 11:36'};if(space==='enterprise')enterpriseFiles[state.dept].unshift(copy);else if(space==='collab')collabFiles.unshift(copy);else personalFiles.unshift({...copy,favorite:false});toast('已创建副本');render()}
function toggleFavoriteItem(id){const f=personalFiles.find(x=>x.id===id);if(!f)return;f.favorite=!f.favorite;toast(f.favorite?'已添加到我的收藏':'已取消收藏');render()}
function transferItem(id){const f=personalFiles.find(x=>x.id===id);const member=document.getElementById('transferMember')?.value;if(!f||!member)return toast('请选择接收成员','warning');personalFiles=personalFiles.filter(x=>x.id!==id);state.detail=null;closeModal();toast(`“${f.name}”已转移给${member}`);render()}
function startUpload(space){const names=['项目补充说明.docx','界面评审截图.png'];state.uploads=names.map((n,i)=>({id:Date.now()+i,name:n,pct:i?8:0,speed:'0 KB/s',space}));renderOverlays();const timer=setInterval(()=>{let done=true;state.uploads.forEach(u=>{if(u.pct<100){u.pct=Math.min(100,u.pct+Math.ceil(Math.random()*16));u.speed=u.pct<100?(1.2+Math.random()*3).toFixed(1)+' MB/s':'已完成';done=false}});renderOverlays();if(done){clearInterval(timer);toast('文件上传完成');setTimeout(()=>{state.uploads=[];renderOverlays()},1300)}},450)}
function uploadPanel(){return `<div class="upload-panel"><div class="upload-head">传输任务 <span class="badge blue" style="margin-left:7px">${state.uploads.length}</span><button class="btn ghost icon-only" onclick="state.uploads=[];renderOverlays()">${icon('x')}</button></div><div class="upload-list">${state.uploads.map(u=>`<div class="upload-item"><div class="upload-top">${fileVisual({type:u.name.endsWith('.png')?'img':'doc'})}<span class="upload-name">${u.name}</span><span class="upload-pct">${u.pct}%</span></div><div class="progress"><i style="width:${u.pct}%"></i></div><div class="upload-meta"><span>${u.space==='enterprise'?'企业空间 / '+state.dept:u.space==='collab'?'协作空间':'个人空间'}</span><span>${u.speed}</span></div></div>`).join('')}</div></div>`}
function toggleUploads(){if(state.uploads.length)state.uploads=[];else toast('当前没有传输任务');renderOverlays()}
function openMenu(e,id,space){e.preventDefault?.();const trigger=e.currentTarget||e.target;const rect=trigger.getBoundingClientRect();const width=208;const pointerX=e.clientX||rect.right;const pointerY=e.clientY||rect.bottom;const x=Math.max(10,Math.min(pointerX+4,innerWidth-width-10));const y=Math.max(10,Math.min(pointerY+4,innerHeight-430));if(!state.selected.includes(id))state.selected=[id];state.detail=null;state.menu={x,y,id,space,type:'file'};state.profileOpen=false;state.personalUploadOpen=false;if(space==='personal')syncPersonalSelection();renderOverlays()}
function openCollabMenu(e,id){state.menu={x:Math.min(e.clientX,innerWidth-190),y:Math.min(e.clientY,innerHeight-220),id,type:'collab'};renderOverlays()}
function menuContent(){const m=state.menu;if(m.type==='collab'){const c=collabs.find(x=>x.id===m.id);return `<div class="menu-pop" style="left:${m.x}px;top:${m.y}px"><button class="menu-item" onclick="state.menu=null;openCollab('${m.id}')">${icon('external')}进入空间</button><button class="menu-item" onclick="state.menu=null;openModal('members',{collab:collabs.find(x=>x.id==='${m.id}')})">${icon('users')}成员管理</button><button class="menu-item" onclick="archiveCollab('${m.id}')">${icon('archive')}${c.archived?'恢复空间':'归档空间'}</button><div class="menu-sep"></div><button class="menu-item danger" onclick="state.menu=null;openModal('dissolve',{collab:collabs.find(x=>x.id==='${m.id}')})">${icon('trash')}解散空间</button></div>`}const f=findFile(m.id,m.space);if(!f)return'';const openLabel=f.type==='folder'?'打开':'预览';return `<div class="menu-pop personal-file-menu" style="left:${m.x}px;top:${m.y}px"><button class="menu-item" onclick="state.menu=null;${f.type==='folder'?`openFile('${m.id}','${m.space}')`:`openModal('preview',{file:findFile('${m.id}','${m.space}')})`}">${icon(f.type==='folder'?'folder':'eye')}${openLabel}</button><button class="menu-item" onclick="state.menu=null;toast('已加入下载任务')">${icon('download')}下载</button><button class="menu-item" onclick="state.menu=null;openModal('share',{file:findFile('${m.id}','${m.space}')})">${icon('link')}创建安全外链</button><div class="menu-sep"></div><button class="menu-item" onclick="state.menu=null;openModal('rename',{id:'${m.id}',space:'${m.space}'})">${icon('edit')}重命名</button><button class="menu-item" onclick="state.selected=['${m.id}'];state.menu=null;openModal('move',{space:'${m.space}'})">${icon('move')}移动</button><button class="menu-item" onclick="state.menu=null;copyItem('${m.id}','${m.space}')">${icon('copy')}复制</button>${m.space==='personal'?`<button class="menu-item" onclick="state.menu=null;toggleFavoriteItem('${m.id}')">${icon('star')}${f.favorite?'取消收藏':'添加收藏'}</button>`:''}<button class="menu-item" onclick="state.selected=['${m.id}'];state.menu=null;openModal('tag')">${icon('tag')}设置标签</button>${m.space==='personal'&&f.type==='folder'?`<button class="menu-item" onclick="state.menu=null;openModal('transfer',{id:'${m.id}'})">${icon('transfer')}转移所有权</button>`:''}<button class="menu-item" onclick="state.menu=null;state.detail={id:'${m.id}',space:'${m.space}'};render()">${icon('info')}属性详情</button><div class="menu-sep"></div><button class="menu-item danger" onclick="state.selected=['${m.id}'];state.menu=null;openModal('delete',{space:'${m.space}'})">${icon('trash')}删除</button></div>`}
function archiveCollab(id){const c=collabs.find(x=>x.id===id);c.archived=!c.archived;state.menu=null;toast(c.archived?'协作空间已归档':'协作空间已恢复');render()}
function dissolveCollab(id,name){if(document.getElementById('dissolveName').value!==name)return toast('请输入完整空间名称确认','warning');collabs=collabs.filter(x=>x.id!==id);state.collabDetail=null;closeModal();toast('协作空间已解散','warning');render()}
function copyLink(){toast('外链地址已复制')}
function restoreItem(id){recycle=recycle.filter(x=>x.id!==id);toast('文件已恢复到原始位置');render()}
function purgeItem(id){recycle=recycle.filter(x=>x.id!==id);toast('文件已彻底删除','warning');render()}
function releaseSuspicious(id){suspicious=suspicious.filter(x=>x.id!==id);toast('文件已放行并恢复访问');render()}
function deleteSuspicious(id){suspicious=suspicious.filter(x=>x.id!==id);toast('可疑文件已删除','warning');render()}

document.addEventListener('pointerdown',e=>{
  const el=e.target.closest('.btn,.quick,.nav-item,.collab-card');
  if(!el||!window.anime||!motionAllowed())return;
  anime.remove(el);anime({targets:el,scale:[1,.985,1],duration:180,easing:'easeOutQuad'});
});

if(window.customElements){customElements.whenDefined('iconify-icon').then(()=>document.documentElement.classList.add('iconify-ready'))};
document.getElementById('fileInput').addEventListener('change',()=>startUpload(state.page==='enterprise'?'enterprise':state.page==='collaboration'?'collab':'personal'));
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openModal('globalSearch')}if(e.key==='Escape'){state.modal=null;state.menu=null;renderOverlays()}});
document.addEventListener('click',e=>{let changed=false;if(state.menu&&!e.target.closest('.menu-pop')&&!e.target.closest('.more-btn')){state.menu=null;changed=true}if(state.profileOpen&&!e.target.closest('.profile-wrap')){state.profileOpen=false;changed=true}if(state.personalUploadOpen&&!e.target.closest('.upload-split')){state.personalUploadOpen=false;changed=true}if(changed)render()});
render();
</script>
</body>
</html>
