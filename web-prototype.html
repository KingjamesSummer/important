<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDG知识库｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#fff;color:#315a84;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #d5e9ff;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(23,105,255,.09)}.loader strong{display:block;color:#12345d;margin-bottom:7px}.loader small{color:#5f80a0;line-height:1.6}
</style>
</head>
<body>
<div class="loader"><strong>正在载入 GDG知识库原型…</strong><small>正在加载管理员设置新版交互与系统蓝主题</small></div>
<script>
(async()=>{
  const revision='971ebd67af097c2581fbe22d60be6df7fa8bc801';
  const sources=[
    `https://cdn.jsdelivr.net/gh/KingjamesSummer/important@${revision}/web-prototype.html`,
    `https://raw.githubusercontent.com/KingjamesSummer/important/${revision}/web-prototype.html`
  ];
  let source='';
  for(const url of sources){
    try{
      const response=await fetch(url,{cache:'no-store'});
      if(response.ok){source=await response.text();break}
    }catch(error){}
  }
  if(!source)throw new Error('管理员设置基础版本加载失败');

  const before=source;
  source=source.replace(/assets\/admin-grant-polish-v2\.js\?v=\d+/g,'assets/admin-grant-polish-v2.js?v=3');
  if(source===before)throw new Error('管理员设置脚本挂载点不兼容');

  document.open();
  document.write(source);
  document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
