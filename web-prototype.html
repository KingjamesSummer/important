<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#f8fafc;color:#64748b;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(15,23,42,.08)}.loader strong{display:block;color:#334155;margin-bottom:7px}.loader small{color:#94a3b8;line-height:1.6}
</style>
</head>
<body>
<div class="loader"><strong>正在载入智汇云知原型…</strong><small>正在加载用户端与管理中心交互</small></div>
<script>
(async()=>{
  const revision='636b36dee25058c2a3a8c36fbc8c53015948f453';
  const sources=[
    `https://cdn.jsdelivr.net/gh/KingjamesSummer/important@${revision}/web-prototype.html`,
    `https://raw.githubusercontent.com/KingjamesSummer/important/${revision}/web-prototype.html`
  ];
  let source='';
  for(const url of sources){
    try{
      const response=await fetch(url,{cache:'no-store'});
      if(response.ok){source=await response.text();break}
    }catch(error){}
  }
  if(!source)throw new Error('原型基础版本加载失败');

  const marker='  document.open();document.write(html);document.close();';
  if(!source.includes(marker))throw new Error('原型基础结构不兼容');
  const patch="  html=html.replace('</body>','<scr'+'ipt src=\"assets/admin-dept-console-v1.js?v=1\"></scr'+'ipt></body>');\n";
  source=source.replace(marker,patch+marker);

  document.open();
  document.write(source);
  document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
