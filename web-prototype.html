<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#f8fafc;color:#64748b;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(15,23,42,.08)}.loader strong{display:block;color:#334155;margin-bottom:7px}.loader small{color:#94a3b8}
</style>
</head>
<body>
<div class="loader"><strong>正在载入智汇云知原型…</strong><small>首次打开需要加载在线图标资源</small></div>
<script>
(async()=>{
  const sources=[
    'https://cdn.jsdelivr.net/gh/KingjamesSummer/important@c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html',
    'https://raw.githubusercontent.com/KingjamesSummer/important/c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html'
  ];
  let html='';
  for(const source of sources){
    try{
      const response=await fetch(source,{cache:'no-store'});
      if(response.ok){html=await response.text();break}
    }catch(error){}
  }
  if(!html)throw new Error('原型基础文件加载失败');

  html=html.replace(
    /pageHead\('工作台','集中查看常用文件、协作动态和待处理事项',`<button class="btn"[\s\S]*?上传文件<\/button>`\)/,
    "pageHead('工作台','集中查看常用文件、协作动态和待处理事项')"
  );

  const workbenchCardFill=`<style id="workbench-card-fill-v5">
    body.workbench-v4 .stat-card{
      --card-fill-a:#dfeaff;
      --card-fill-b:#f1f6ff;
      --card-border:#bfd3f7;
      --card-shadow:rgba(70,127,228,.12);
      padding-top:18px;
      background:linear-gradient(135deg,var(--card-fill-a) 0%,var(--card-fill-b) 100%)!important;
      border-color:var(--card-border)!important;
      box-shadow:0 10px 24px var(--card-shadow),inset 0 1px rgba(255,255,255,.90)!important;
    }
    body.workbench-v4 .stat-card:nth-child(1){--card-fill-a:#dce8ff;--card-fill-b:#f2f6ff;--card-border:#bfd3fa;--card-shadow:rgba(70,127,228,.13)}
    body.workbench-v4 .stat-card:nth-child(2){--card-fill-a:#d9eefb;--card-fill-b:#eff9ff;--card-border:#bedff3;--card-shadow:rgba(54,142,212,.12)}
    body.workbench-v4 .stat-card:nth-child(3){--card-fill-a:#e3e5ff;--card-fill-b:#f4f4ff;--card-border:#cbcffa;--card-shadow:rgba(103,120,215,.12)}
    body.workbench-v4 .stat-card:nth-child(4){--card-fill-a:#dfe8f2;--card-fill-b:#f2f6fa;--card-border:#c7d5e6;--card-shadow:rgba(86,124,174,.12)}
    body.workbench-v4 .stat-card::before{
      inset:0!important;
      width:auto!important;
      height:auto!important;
      border-radius:inherit!important;
      background:linear-gradient(118deg,rgba(255,255,255,.34) 0%,rgba(255,255,255,.08) 44%,rgba(255,255,255,.20) 100%)!important;
      background-size:180% 100%!important;
      box-shadow:none!important;
      pointer-events:none;
      animation:wbCardWash 7.4s ease-in-out infinite!important;
    }
    body.workbench-v4 .stat-card::after{
      background:linear-gradient(145deg,rgba(var(--card-accent-rgb),.12),rgba(255,255,255,.12))!important;
    }
    body.workbench-v4 .stat-card:hover{
      background:linear-gradient(135deg,var(--card-fill-a) 0%,var(--card-fill-b) 100%)!important;
      border-color:rgba(var(--card-accent-rgb),.38)!important;
      box-shadow:0 16px 34px rgba(var(--card-accent-rgb),.16),0 5px 12px rgba(47,88,145,.05),inset 0 1px #fff!important;
    }
    body.workbench-v4 .stat-icon,
    body.workbench-v4 .stat-card.blue .stat-icon,
    body.workbench-v4 .stat-card.green .stat-icon,
    body.workbench-v4 .stat-card.orange .stat-icon{
      background:rgba(255,255,255,.66)!important;
    }
    @keyframes wbCardWash{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
    @media(prefers-reduced-motion:reduce){body.workbench-v4 .stat-card::before{animation:none!important}}
  </style>`;

  html=html.replace(
    '</head>',
    '<link rel="stylesheet" href="assets/personal-space-v8.css?v=2"><link rel="stylesheet" href="assets/personal-space-v9.css?v=1"><link rel="stylesheet" href="assets/enterprise-space-v1.css?v=4"><link rel="stylesheet" href="assets/workbench-v4.css?v=3">'+workbenchCardFill+'<link rel="stylesheet" href="assets/collaboration-space-v1.css?v=1"><style>.destination-v9-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}.destination-v9-check .icon-stack{width:14px!important;height:14px!important}.transfer-person-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}</style></head>'
  );

  html=html.replace(
    '</body>',
    '<script src="assets/personal-space-v8.js?v=2"><\/script><script src="assets/personal-space-v9.js?v=1"><\/script><script src="assets/enterprise-space-v1.js?v=4"><\/script><script src="assets/personal-space-v10.js?v=1"><\/script><script src="assets/personal-space-v11.js?v=2"><\/script><script src="assets/workbench-v4.js?v=3"><\/script><script src="assets/collaboration-space-v1.js?v=1"><\/script><script src="assets/collaboration-space-v1-fix.js?v=2"><\/script><script>window.switchDestinationSpace=function(space,button){document.querySelectorAll(".destination-space-item").forEach(item=>item.classList.toggle("active",item===button));document.querySelectorAll(".destination-v9-pane").forEach(pane=>{pane.hidden=pane.dataset.space!==space;pane.classList.toggle("active",pane.dataset.space===space)});document.querySelectorAll(".destination-v9-radio").forEach(input=>input.checked=false);document.querySelectorAll(".destination-v9-row").forEach(row=>row.classList.remove("selected"));const names={personal:"个人空间",enterprise:"企业空间",collab:"协作空间"};const title=document.getElementById("destinationSpaceTitle");if(title)title.textContent=names[space];const summary=document.getElementById("destinationSelectedText");if(summary)summary.textContent="尚未选择";const submit=document.getElementById("destinationSubmit");if(submit)submit.disabled=true;const search=document.getElementById("destinationSearch");if(search){search.value="";filterDestinationRows("")}};<\/script></body>'
  );

  document.open();document.write(html);document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
