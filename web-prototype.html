    "    \"  if(!html.includes(gdgSearchHelperNeedle))throw new Error('全局检索交互结构不兼容');\\n\"+\n"+
    "    \"  html=html.replace(gdgSearchHelperNeedle,()=>gdgSearchPayload.helper+'\\\\n'+gdgSearchHelperNeedle);\\n\";\n"+
    "  source=source.replace(gdgSearchBaseNeedle,()=>gdgSearchBaseNeedle+'\\n'+gdgSearchPatchCode);\n";
  if(!source.includes(searchBridgeNeedle))throw new Error('全局检索补丁挂载点不兼容');
  source=source.replace(searchBridgeNeedle,()=>searchBridge+searchBridgeNeedle);

  const styleNeedle="  const memberStyles=memberPatch.slice(0,splitAt);";
  const styleReplacement="  const memberStyles=memberPatch.slice(0,splitAt)+"+JSON.stringify(systemBlueTheme)+";";
  if(!source.includes(styleNeedle))throw new Error('管理中心样式补丁结构不兼容');
  source=source.replace(styleNeedle,styleReplacement);

  const oldOrder=String.raw`    "  html=html.replace('</body>','<scr'+'ipt src=\"assets/admin-dept-console-v1.js?v=1\"></scr'+'ipt>'+memberAdminScript+'</body>');\n";`;
  const newOrder=String.raw`    "  html=html.replace('</body>','<scr'+'ipt src=\"assets/admin-dept-console-v2.js?v=2\"></scr'+'ipt><scr'+'ipt src=\"assets/public-shell-v1.js?v=3\"></scr'+'ipt><scr'+'ipt src=\"assets/public-shell-hotfix-v1.js?v=2\"></scr'+'ipt><scr'+'ipt src=\"assets/admin-grant-polish-v2.js?v=2\"></scr'+'ipt><scr'+'ipt src=\"assets/admin-shell-hotfix-v1.js?v=2\"></scr'+'ipt><scr'+'ipt src=\"assets/admin-sunny-theme-v1.js?v=1\"></scr'+'ipt><scr'+'ipt src=\"assets/admin-dept-console-v11.js?v=3\"></scr'+'ipt>'+memberAdminScript+'<scr'+'ipt src=\"assets/admin-dept-console-v12.js?v=1\"></scr'+'ipt></body>');\n";`;
  if(!source.includes(oldOrder))throw new Error('管理中心脚本顺序补丁结构不兼容');
  source=source.replace(oldOrder,newOrder);
  source=source.replace(/assets\/workbench-v4\.js\?v=3/g,'assets/workbench-v4.js?v=14');
  source=source.replace(/assets\/enterprise-space-v1\.css\?v=\d+/g,'assets/enterprise-space-v1.css?v=8');
  source=source.replace(/assets\/enterprise-space-v2\.js\?v=\d+/g,'assets/enterprise-space-v2.js?v=3');

  document.open();
  document.write(source);
  document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
