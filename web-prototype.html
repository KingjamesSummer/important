<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#f8fafc;color:#64748b;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(15,23,42,.08)}.loader strong{display:block;color:#334155;margin-bottom:7px}.loader small{color:#94a3b8}
</style>
</head>
<body>
<div class="loader"><strong>正在载入智汇云知原型…</strong><small>首次打开需要加载在线图标资源</small></div>
<script>
(async()=>{
  const sources=[
    'https://cdn.jsdelivr.net/gh/KingjamesSummer/important@c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html',
    'https://raw.githubusercontent.com/KingjamesSummer/important/c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html'
  ];
  let html='';
  for(const source of sources){
    try{
      const response=await fetch(source,{cache:'no-store'});
      if(response.ok){html=await response.text();break}
    }catch(error){}
  }
  if(!html)throw new Error('原型基础文件加载失败');

  html=html.replace(
    /pageHead\('工作台','集中查看常用文件、协作动态和待处理事项',`<button class="btn"[\s\S]*?上传文件<\/button>`\)/,
    "pageHead('工作台','集中查看常用文件、协作动态和待处理事项')"
  );

  const workbenchCardFill=`<style id="workbench-card-fill-v8">
    body.workbench-v4 .main{
      background:linear-gradient(180deg,#f7f9fc 0%,#f3f6fa 100%)!important;
    }
    body.workbench-v4 .page-head{
      margin:0 0 16px!important;
      padding:0 2px 2px!important;
      background:transparent!important;
      border:0!important;
      box-shadow:none!important;
    }
    body.workbench-v4 .page-title{color:#17263a!important}
    body.workbench-v4 .page-subtitle{color:#8092a6!important}
    body.workbench-v4 .stats-grid{margin-bottom:18px!important}
    body.workbench-v4 .stat-card{
      --card-deep:#467fe4;
      --card-mid:#5f91eb;
      --card-light:#7aa6f3;
      --card-shadow:rgba(45,83,145,.20);
      position:relative;
      padding-top:18px;
      overflow:hidden;
      background:linear-gradient(135deg,var(--card-deep) 0%,var(--card-mid) 56%,var(--card-light) 100%)!important;
      background-size:180% 180%!important;
      border-color:rgba(255,255,255,.26)!important;
      box-shadow:0 12px 28px var(--card-shadow),inset 0 1px rgba(255,255,255,.28)!important;
      animation:wbCardFlow 10s ease-in-out infinite!important;
    }
    body.workbench-v4 .stat-card:nth-child(1){--card-deep:#467fe4;--card-mid:#5f91eb;--card-light:#7aa6f3;--card-shadow:rgba(70,127,228,.22);animation-delay:0s!important}
    body.workbench-v4 .stat-card:nth-child(2){--card-deep:#2f86bf;--card-mid:#49a0d1;--card-light:#70b9df;--card-shadow:rgba(47,134,191,.22);animation-delay:-2s!important}
    body.workbench-v4 .stat-card:nth-child(3){--card-deep:#6472cf;--card-mid:#7b85dc;--card-light:#9b9fe8;--card-shadow:rgba(100,114,207,.22);animation-delay:-4s!important}
    body.workbench-v4 .stat-card:nth-child(4){--card-deep:#52749a;--card-mid:#6787aa;--card-light:#84a0bd;--card-shadow:rgba(82,116,154,.22);animation-delay:-6s!important}
    body.workbench-v4 .stat-card::before{
      content:""!important;
      position:absolute!important;
      inset:0!important;
      width:auto!important;
      height:auto!important;
      z-index:0!important;
      border-radius:inherit!important;
      background:
        radial-gradient(circle at 84% 18%,rgba(255,255,255,.26) 0%,rgba(255,255,255,.10) 20%,transparent 46%),
        linear-gradient(118deg,rgba(255,255,255,.08) 0%,transparent 42%,rgba(255,255,255,.12) 100%)!important;
      background-size:160% 160%!important;
      box-shadow:none!important;
      pointer-events:none;
      animation:wbCardGlow 8.6s ease-in-out infinite!important;
    }
    body.workbench-v4 .stat-card::after{
      content:""!important;
      display:block!important;
      position:absolute!important;
      inset:-40% auto -40% -38%!important;
      width:34%!important;
      height:auto!important;
      z-index:0!important;
      border:0!important;
      border-radius:0!important;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent)!important;
      box-shadow:none!important;
      transform:skewX(-18deg) translateX(-180%)!important;
      animation:wbCardSheen 7.8s ease-in-out infinite!important;
      pointer-events:none;
    }
    body.workbench-v4 .stat-card:nth-child(2)::after{animation-delay:1.3s!important}
    body.workbench-v4 .stat-card:nth-child(3)::after{animation-delay:2.6s!important}
    body.workbench-v4 .stat-card:nth-child(4)::after{animation-delay:3.9s!important}
    body.workbench-v4 .stat-card:hover{
      filter:saturate(1.06) brightness(1.02);
      border-color:rgba(255,255,255,.42)!important;
      box-shadow:0 18px 36px var(--card-shadow),0 6px 14px rgba(31,57,96,.10),inset 0 1px rgba(255,255,255,.34)!important;
    }
    body.workbench-v4 .stat-top,
    body.workbench-v4 .stat-number,
    body.workbench-v4 .stat-note{position:relative;z-index:1!important}
    body.workbench-v4 .stat-top{color:rgba(255,255,255,.82)!important}
    body.workbench-v4 .stat-number{color:#fff!important;text-shadow:0 2px 8px rgba(28,49,88,.22)}
    body.workbench-v4 .stat-note{color:rgba(255,255,255,.72)!important}
    body.workbench-v4 .stat-note b{color:#fff!important}
    body.workbench-v4 .stat-icon,
    body.workbench-v4 .stat-card.blue .stat-icon,
    body.workbench-v4 .stat-card.green .stat-icon,
    body.workbench-v4 .stat-card.orange .stat-icon{
      position:relative;
      z-index:1;
      color:#fff!important;
      background:rgba(255,255,255,.16)!important;
      border-color:rgba(255,255,255,.30)!important;
      box-shadow:0 7px 18px rgba(26,52,94,.14),inset 0 1px rgba(255,255,255,.38)!important;
      backdrop-filter:blur(8px);
    }
    @keyframes wbCardFlow{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }
    @keyframes wbCardGlow{
      0%,100%{background-position:20% 30%}
      50%{background-position:82% 64%}
    }
    @keyframes wbCardSheen{
      0%,62%{transform:skewX(-18deg) translateX(-180%)}
      82%,100%{transform:skewX(-18deg) translateX(520%)}
    }
    @media(prefers-reduced-motion:reduce){
      body.workbench-v4 .stat-card,
      body.workbench-v4 .stat-card::before,
      body.workbench-v4 .stat-card::after{animation:none!important}
    }
  </style>`;

  html=html.replace(
    '</head>',
    '<link rel="stylesheet" href="assets/personal-space-v8.css?v=2"><link rel="stylesheet" href="assets/personal-space-v9.css?v=1"><link rel="stylesheet" href="assets/enterprise-space-v1.css?v=4"><link rel="stylesheet" href="assets/workbench-v4.css?v=3">'+workbenchCardFill+'<link rel="stylesheet" href="assets/workbench-v4-avatars.css?v=1"><link rel="stylesheet" href="assets/collaboration-space-v1.css?v=1"><style>.destination-v9-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}.destination-v9-check .icon-stack{width:14px!important;height:14px!important}.transfer-person-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}</style></head>'
  );

  html=html.replace(
    '</body>',
    '<script src="assets/personal-space-v8.js?v=2"><\/script><script src="assets/personal-space-v9.js?v=1"><\/script><script src="assets/enterprise-space-v1.js?v=4"><\/script><script src="assets/personal-space-v10.js?v=1"><\/script><script src="assets/personal-space-v11.js?v=3"><\/script><script src="assets/workbench-v4.js?v=3"><\/script><script src="assets/collaboration-space-v1.js?v=1"><\/script><script src="assets/collaboration-space-v1-fix.js?v=2"><\/script><script>window.switchDestinationSpace=function(space,button){document.querySelectorAll(".destination-space-item").forEach(item=>item.classList.toggle("active",item===button));document.querySelectorAll(".destination-v9-pane").forEach(pane=>{pane.hidden=pane.dataset.space!==space;pane.classList.toggle("active",pane.dataset.space===space)});document.querySelectorAll(".destination-v9-radio").forEach(input=>input.checked=false);document.querySelectorAll(".destination-v9-row").forEach(row=>row.classList.remove("selected"));const names={personal:"个人空间",enterprise:"企业空间",collab:"协作空间"};const title=document.getElementById("destinationSpaceTitle");if(title)title.textContent=names[space];const summary=document.getElementById("destinationSelectedText");if(summary)summary.textContent="尚未选择";const submit=document.getElementById("destinationSubmit");if(submit)submit.disabled=true;const search=document.getElementById("destinationSearch");if(search){search.value="";filterDestinationRows("")}};<\/script></body>'
  );

  document.open();document.write(html);document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
