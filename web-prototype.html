<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜智能知识库管理平台高保真交互原型</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#f8fafc;color:#64748b;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.loader{padding:22px 26px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;box-shadow:0 16px 46px rgba(15,23,42,.08)}.loader strong{display:block;color:#334155;margin-bottom:7px}.loader small{color:#94a3b8}
</style>
</head>
<body>
<div class="loader"><strong>正在载入智汇云知原型…</strong><small>首次打开需要加载在线图标资源</small></div>
<script>
(async()=>{
  const sources=[
    'https://cdn.jsdelivr.net/gh/KingjamesSummer/important@c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html',
    'https://raw.githubusercontent.com/KingjamesSummer/important/c5c80f5be7536b77b6929b8d6978234ad75925b6/web-prototype.html'
  ];
  let html='';
  for(const source of sources){
    try{
      const response=await fetch(source,{cache:'no-store'});
      if(response.ok){html=await response.text();break}
    }catch(error){}
  }
  if(!html)throw new Error('原型基础文件加载失败');

  html=html.replace(
    /pageHead\('工作台','集中查看常用文件、协作动态和待处理事项',`<button class="btn"[\s\S]*?上传文件<\/button>`\)/,
    "pageHead('工作台','集中查看常用文件、协作动态和待处理事项')"
  );

  const workbenchCardFill=`<style id="workbench-card-fill-v9">
    body.workbench-v4 .main{
      background:linear-gradient(180deg,#f7f9fc 0%,#f3f6fa 100%)!important;
    }
    body.workbench-v4 .page-head{
      margin:0 0 16px!important;
      padding:0 2px 2px!important;
      background:transparent!important;
      border:0!important;
      box-shadow:none!important;
    }
    body.workbench-v4 .page-title{color:#17263a!important}
    body.workbench-v4 .page-subtitle{color:#8092a6!important}
    body.workbench-v4 .stats-grid{margin-bottom:18px!important}
    body.workbench-v4 .stat-card{
      --card-a:#416a9f;
      --card-b:#5d7fa9;
      --card-c:#7e98b8;
      --card-shadow:rgba(34,60,96,.20);
      position:relative;
      padding-top:18px;
      overflow:hidden;
      background:
        radial-gradient(circle at 82% 18%,rgba(255,255,255,.18) 0%,rgba(255,255,255,.07) 24%,transparent 48%),
        linear-gradient(142deg,var(--card-a) 0%,var(--card-b) 58%,var(--card-c) 100%)!important;
      background-size:150% 150%!important;
      border-color:rgba(255,255,255,.24)!important;
      box-shadow:0 12px 26px var(--card-shadow),inset 0 1px rgba(255,255,255,.24)!important;
      animation:wbCardDrift 18s ease-in-out infinite!important;
    }
    body.workbench-v4 .stat-card:nth-child(1){--card-a:#3f6ca7;--card-b:#5a7fae;--card-c:#7d9aba;--card-shadow:rgba(55,92,142,.20);animation-delay:0s!important}
    body.workbench-v4 .stat-card:nth-child(2){--card-a:#3d6f8f;--card-b:#5b829d;--card-c:#7d9aad;--card-shadow:rgba(51,91,118,.19);animation-delay:-4s!important}
    body.workbench-v4 .stat-card:nth-child(3){--card-a:#53639a;--card-b:#6d7cab;--card-c:#909abc;--card-shadow:rgba(72,84,133,.19);animation-delay:-8s!important}
    body.workbench-v4 .stat-card:nth-child(4){--card-a:#4d6379;--card-b:#667d92;--card-c:#8799aa;--card-shadow:rgba(64,82,101,.19);animation-delay:-12s!important}
    body.workbench-v4 .stat-card::before{
      content:""!important;
      position:absolute!important;
      inset:0!important;
      width:auto!important;
      height:auto!important;
      z-index:0!important;
      border-radius:inherit!important;
      background:
        linear-gradient(118deg,rgba(255,255,255,.09) 0%,transparent 42%,rgba(255,255,255,.08) 100%)!important;
      background-size:180% 100%!important;
      box-shadow:none!important;
      pointer-events:none;
      animation:wbSoftLight 14s ease-in-out infinite!important;
    }
    body.workbench-v4 .stat-card::after{
      content:""!important;
      display:block!important;
      position:absolute!important;
      width:120px!important;
      height:120px!important;
      right:-48px!important;
      top:-54px!important;
      z-index:0!important;
      border:1px solid rgba(255,255,255,.12)!important;
      border-radius:50%!important;
      background:rgba(255,255,255,.045)!important;
      box-shadow:none!important;
      transform:none!important;
      animation:wbOrbFloat 11s ease-in-out infinite!important;
      pointer-events:none;
    }
    body.workbench-v4 .stat-card:nth-child(2)::after{animation-delay:-2.5s!important}
    body.workbench-v4 .stat-card:nth-child(3)::after{animation-delay:-5s!important}
    body.workbench-v4 .stat-card:nth-child(4)::after{animation-delay:-7.5s!important}
    body.workbench-v4 .stat-card:hover{
      filter:saturate(1.02) brightness(1.035);
      border-color:rgba(255,255,255,.38)!important;
      box-shadow:0 17px 34px var(--card-shadow),0 6px 14px rgba(31,57,96,.09),inset 0 1px rgba(255,255,255,.30)!important;
    }
    body.workbench-v4 .stat-top,
    body.workbench-v4 .stat-number,
    body.workbench-v4 .stat-note{position:relative;z-index:1!important}
    body.workbench-v4 .stat-top{color:rgba(255,255,255,.80)!important}
    body.workbench-v4 .stat-number{color:#fff!important;text-shadow:0 2px 8px rgba(20,39,70,.22)}
    body.workbench-v4 .stat-note{color:rgba(255,255,255,.68)!important}
    body.workbench-v4 .stat-note b{color:#fff!important}
    body.workbench-v4 .stat-icon,
    body.workbench-v4 .stat-card.blue .stat-icon,
    body.workbench-v4 .stat-card.green .stat-icon,
    body.workbench-v4 .stat-card.orange .stat-icon{
      position:relative;
      z-index:1;
      color:#fff!important;
      background:rgba(255,255,255,.14)!important;
      border-color:rgba(255,255,255,.25)!important;
      box-shadow:0 6px 16px rgba(20,39,70,.12),inset 0 1px rgba(255,255,255,.35)!important;
      backdrop-filter:blur(8px);
    }
    @keyframes wbCardDrift{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }
    @keyframes wbSoftLight{
      0%,100%{background-position:0% 50%;opacity:.75}
      50%{background-position:100% 50%;opacity:1}
    }
    @keyframes wbOrbFloat{
      0%,100%{transform:translate3d(0,0,0) scale(1);opacity:.72}
      50%{transform:translate3d(-6px,7px,0) scale(1.045);opacity:1}
    }
    @media(prefers-reduced-motion:reduce){
      body.workbench-v4 .stat-card,
      body.workbench-v4 .stat-card::before,
      body.workbench-v4 .stat-card::after{animation:none!important}
    }
  </style>`;

  html=html.replace(
    '</head>',
    '<link rel="stylesheet" href="assets/personal-space-v8.css?v=2"><link rel="stylesheet" href="assets/personal-space-v9.css?v=1"><link rel="stylesheet" href="assets/enterprise-space-v1.css?v=4"><link rel="stylesheet" href="assets/workbench-v4.css?v=3">'+workbenchCardFill+'<link rel="stylesheet" href="assets/workbench-v4-avatars.css?v=1"><link rel="stylesheet" href="assets/collaboration-space-v1.css?v=1"><style>.destination-v9-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}.destination-v9-check .icon-stack{width:14px!important;height:14px!important}.transfer-person-check{width:18px!important;height:18px!important;border-radius:0!important;background:transparent!important;color:#3f759d!important}.enterprise-nav-count-v4,.enterprise-dept-group-head-v4 small,.enterprise-default-v4,.enterprise-dept-nav-v4>span{display:none!important}.enterprise-library-root-v4{grid-template-columns:18px minmax(0,1fr)!important}.enterprise-dept-group-head-v4{grid-template-columns:22px minmax(0,1fr)!important}.enterprise-dept-nav-v4{grid-template-columns:17px minmax(0,1fr)!important}</style></head>'
  );

  html=html.replace(
    '</body>',
    '<script src="assets/personal-space-v8.js?v=2"><\/script><script src="assets/personal-space-v9.js?v=1"><\/script><script src="assets/enterprise-space-v1.js?v=4"><\/script><script src="assets/personal-space-v10.js?v=1"><\/script><script src="assets/personal-space-v11.js?v=3"><\/script><script src="assets/personal-space-v12.js?v=1"><\/script><script src="assets/workbench-v4.js?v=3"><\/script><script src="assets/collaboration-space-v1.js?v=1"><\/script><script src="assets/collaboration-space-v1-fix.js?v=2"><\/script><script>window.switchDestinationSpace=function(space,button){document.querySelectorAll(".destination-space-item").forEach(item=>item.classList.toggle("active",item===button));document.querySelectorAll(".destination-v9-pane").forEach(pane=>{pane.hidden=pane.dataset.space!==space;pane.classList.toggle("active",pane.dataset.space===space)});document.querySelectorAll(".destination-v9-radio").forEach(input=>input.checked=false);document.querySelectorAll(".destination-v9-row").forEach(row=>row.classList.remove("selected"));const names={personal:"个人空间",enterprise:"企业空间",collab:"协作空间"};const title=document.getElementById("destinationSpaceTitle");if(title)title.textContent=names[space];const summary=document.getElementById("destinationSelectedText");if(summary)summary.textContent="尚未选择";const submit=document.getElementById("destinationSubmit");if(submit)submit.disabled=true;const search=document.getElementById("destinationSearch");if(search){search.value="";filterDestinationRows("")}};<\/script></body>'
  );

  document.open();document.write(html);document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><strong>原型载入失败</strong><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
