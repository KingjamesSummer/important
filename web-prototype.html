<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDG知识库｜智能知识库管理平台高保真交互原型</title>
<meta name="theme-color" content="#f6f9ff">
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#f6f9ff;color:#526178;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}
.loader{min-width:320px;padding:25px 29px;border:1px solid #dbe7f7;border-radius:16px;background:#fff;box-shadow:0 20px 58px rgba(37,99,235,.11)}
.loader-brand{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.loader-logo{width:46px;height:46px;position:relative;display:grid;place-items:center;border:1px solid #dce8f7;border-radius:14px;background:linear-gradient(145deg,#fff,#f5f9ff);box-shadow:0 9px 24px rgba(37,99,235,.11);overflow:hidden}
.loader-logo:after{content:"";position:absolute;inset:-60% -35%;background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.88) 50%,transparent 58%);transform:translateX(-70%) rotate(8deg);animation:loaderGlint 4.8s ease-in-out infinite}
.loader-logo svg{width:38px;height:38px;filter:drop-shadow(0 4px 7px rgba(18,78,163,.12));animation:loaderFloat 4.2s ease-in-out infinite}
.loader-copy strong{display:block;color:#17263a;font-size:16px;letter-spacing:.02em}
.loader-copy span{display:block;margin-top:4px;color:#8493a7;font-size:10px;letter-spacing:.08em}
.loader>small{color:#7c8da3;line-height:1.6}
.loader-line{height:3px;margin-top:17px;border-radius:99px;background:#e8f0fb;overflow:hidden}
.loader-line:after{content:"";display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#1769ff,#5ca4ff);animation:load 1.15s ease-in-out infinite alternate}
@keyframes load{to{transform:translateX(138%)}}
@keyframes loaderFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-1.5px) scale(1.015)}}
@keyframes loaderGlint{0%,62%{transform:translateX(-78%) rotate(8deg);opacity:0}72%{opacity:.75}88%,100%{transform:translateX(78%) rotate(8deg);opacity:0}}
@media(prefers-reduced-motion:reduce){.loader-logo:after,.loader-logo svg,.loader-line:after{animation:none!important}}
</style>
</head>
<body>
<div class="loader">
  <div class="loader-brand">
    <div class="loader-logo" aria-hidden="true">
      <svg viewBox="0 0 96 96" role="img">
        <defs>
          <linearGradient id="loaderBlue" x1="10" y1="14" x2="82" y2="83"><stop stop-color="#0b7cc7"/><stop offset=".55" stop-color="#1648a7"/><stop offset="1" stop-color="#153c91"/></linearGradient>
          <linearGradient id="loaderGreen" x1="42" y1="34" x2="89" y2="73"><stop stop-color="#0aa842"/><stop offset=".58" stop-color="#55bf1d"/><stop offset="1" stop-color="#b8df00"/></linearGradient>
        </defs>
        <path fill="url(#loaderBlue)" d="M82.5 25.8C69.4 12.2 49.8 7.1 32.7 13.1 15.7 19.1 6.2 34.5 7.9 51.9c1.2 12.4 7.9 23.5 18.2 30.3-6.8-13.4-5.1-28.3 3.8-39.5 11.4-14.2 31.4-20.6 52.6-16.9Z"/>
        <path fill="url(#loaderBlue)" d="M12.2 65.4c12.9 8.1 25.3 10 39.7 6.5 13.9-3.4 25.3 1.3 36.2 12.7-16.3-5.8-27.7-4.1-39.3-.5-15.8 4.8-29.1-2.5-36.6-18.7Z"/>
        <path fill="url(#loaderGreen)" d="M40.9 48.7c10.7-15.5 26.6-22.7 47.9-20.2-15 5.7-27.6 14.2-36.4 28.8-5.2 8.6-9.5 6-11.5-8.6Z"/>
        <path fill="url(#loaderGreen)" opacity=".95" d="M56 58.3c8.9-13.9 19.4-23 33.7-29.2-9.8 12.7-14.5 25.6-10.7 39.7-9.7-1.5-17.3-5-23-10.5Z"/>
      </svg>
    </div>
    <div class="loader-copy"><strong>GDG知识库</strong><span>INTELLIGENT KNOWLEDGE HUB</span></div>
  </div>
  <small>正在加载增强版部门管理与成员权限详情</small>
  <div class="loader-line"></div>
</div>
<script>
(async()=>{
  const revision='f9dd1e961fa2d73fc75792a4ddef0f5ccad5b1fb';
  const sources=[
    `https://cdn.jsdelivr.net/gh/KingjamesSummer/important@${revision}/web-prototype.html`,
    `https://raw.githubusercontent.com/KingjamesSummer/important/${revision}/web-prototype.html`
  ];
  let source='';
  for(const url of sources){
    try{
      const response=await fetch(url,{cache:'no-store'});
      if(response.ok){source=await response.text();break}
    }catch(error){}
  }
  if(!source)throw new Error('稳定版本加载失败，请检查网络连接');

  const runtimeMarker="  document.open();\n  document.write(source);\n  document.close();";
  const finalAppInjection="  source=source.replace('</body>','<scr'+'ipt src=\"assets/admin-dept-console-v3.js?v=3\"></scr'+'ipt></body>');\n";
  const nestedRuntimePatch=[
    "  const adminV3Marker="+JSON.stringify(runtimeMarker)+";",
    "  const adminV3Injection="+JSON.stringify(finalAppInjection)+";",
    "  if(!source.includes(adminV3Marker))throw new Error('部门管理增强补丁结构不兼容');",
    "  source=source.replace(adminV3Marker,adminV3Injection+adminV3Marker);"
  ].join('\n')+'\n';
  if(!source.includes(runtimeMarker))throw new Error('稳定版本运行结构不兼容');
  source=source.replace(runtimeMarker,nestedRuntimePatch+runtimeMarker);

  document.open();
  document.write(source);
  document.close();
})().catch(error=>{
  document.body.innerHTML='<div class="loader"><div class="loader-copy"><strong>原型载入失败</strong><span>STABLE SHELL ERROR</span></div><small>'+String(error.message||error)+'</small></div>';
});
</script>
</body>
</html>
