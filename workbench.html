<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智汇云知｜工作台优化版</title>
<meta name="theme-color" content="#f8fafc">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f8fafc}
#prototypeFrame{display:block;width:100%;height:100%;border:0;background:#f8fafc}
.patch-error{position:fixed;inset:0;z-index:20;display:none;place-items:center;background:#f8fafc;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;color:#334155}
.patch-error.show{display:grid}.patch-error div{max-width:520px;padding:28px;border:1px solid #e2e8f0;border-radius:16px;background:#fff;box-shadow:0 18px 48px rgba(15,23,42,.08)}
.patch-error strong{display:block;margin-bottom:8px;color:#0f172a;font-size:18px}.patch-error p{margin:0;color:#64748b;line-height:1.7}
</style>
<style id="workbenchStyles" type="text/css">
.workbench-page{--wb-accent:#416b8b;--wb-accent-strong:#2e5675;--wb-soft:#edf4f8;--wb-line:#e3eaf0;--wb-ink:#172538;--wb-text:#53677d;--wb-muted:#8a9aab}
.workbench-page .page-head{margin-bottom:14px}.workbench-page .page-actions:empty{display:none}.workbench-page .page-title{font-size:24px;letter-spacing:-.35px}.workbench-page .page-subtitle{margin-top:5px;color:#8291a3}
.wb-intro{min-height:74px;margin-bottom:14px;padding:16px 18px;display:flex;align-items:center;gap:18px;border:1px solid var(--wb-line);border-radius:14px;background:linear-gradient(110deg,#fff 0,#fbfdff 58%,#f1f6f9 100%);box-shadow:0 5px 18px rgba(31,52,72,.045)}
.wb-intro-copy{min-width:0}.wb-intro-copy strong{display:block;color:var(--wb-ink);font-size:15px;font-weight:680}.wb-intro-copy span{display:block;margin-top:5px;color:var(--wb-muted);font-size:12px}.wb-intro-meta{margin-left:auto;display:flex;align-items:center;gap:18px;white-space:nowrap}.wb-intro-meta div{padding-left:18px;border-left:1px solid #e5ebf0}.wb-intro-meta small{display:block;color:var(--wb-muted);font-size:10px}.wb-intro-meta b{display:block;margin-top:3px;color:var(--wb-accent-strong);font-size:14px;font-weight:700}
.wb-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}.wb-metric{min-height:112px;padding:16px 17px;border:1px solid var(--wb-line);border-radius:14px;background:#fff;text-align:left;transition:border-color .18s,box-shadow .18s,transform .18s}.wb-metric:hover{transform:translateY(-2px);border-color:#cbd9e4;box-shadow:0 12px 26px rgba(31,52,72,.075)}.wb-metric:focus-visible{outline:3px solid rgba(65,107,139,.16);outline-offset:2px}.wb-metric-top{display:flex;align-items:center;justify-content:space-between;color:var(--wb-text);font-size:12px}.wb-metric-icon{width:34px;height:34px;display:grid;place-items:center;border-radius:10px;background:var(--wb-soft);color:var(--wb-accent)}.wb-metric-icon .icon{width:17px;height:17px}.wb-metric-value{display:flex;align-items:flex-end;gap:8px;margin-top:12px}.wb-metric-value strong{color:var(--wb-ink);font-size:27px;line-height:1;font-weight:720;letter-spacing:-.7px}.wb-metric-value span{padding-bottom:2px;color:var(--wb-muted);font-size:10px}.wb-metric-note{display:flex;align-items:center;gap:5px;margin-top:9px;color:var(--wb-muted);font-size:11px}.wb-metric-note em{font-style:normal;color:#4f7b67;font-weight:650}.wb-metric.is-urgent .wb-metric-icon{background:#faf1df;color:#936627}.wb-metric.is-urgent .wb-metric-note em{color:#a05c37}.wb-metric.is-collab .wb-metric-icon{background:#eaf5ef;color:#3f7962}.wb-metric.is-link .wb-metric-icon{background:#f1f4f7;color:#62798e}
.wb-layout{display:grid;grid-template-columns:minmax(0,1.58fr) minmax(310px,.72fr);gap:14px;align-items:start}.wb-stack{display:grid;gap:14px}.wb-panel{border:1px solid var(--wb-line);border-radius:14px;background:#fff;box-shadow:0 3px 14px rgba(31,52,72,.035);overflow:hidden}.wb-panel-head{min-height:60px;padding:13px 17px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #edf1f4}.wb-panel-title{color:var(--wb-ink);font-size:15px;font-weight:680}.wb-panel-subtitle{margin-top:3px;color:var(--wb-muted);font-size:11px}.wb-head-link{margin-left:auto;height:30px;padding:0 8px;border:0;border-radius:8px;background:transparent;color:var(--wb-accent);font-size:12px}.wb-head-link:hover{background:var(--wb-soft);color:var(--wb-accent-strong)}
.wb-quick-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:14px}.wb-quick{min-height:92px;padding:13px;border:1px solid #e5ebf0;border-radius:12px;background:#fcfdfe;text-align:left;transition:.18s}.wb-quick:hover{border-color:#cbd9e4;background:#fff;box-shadow:0 8px 18px rgba(31,52,72,.06);transform:translateY(-1px)}.wb-quick-top{display:flex;align-items:center;justify-content:space-between}.wb-quick-icon{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:var(--wb-soft);color:var(--wb-accent)}.wb-quick-icon .icon{width:17px;height:17px}.wb-quick-arrow{color:#a2afbb;transition:transform .18s,color .18s}.wb-quick:hover .wb-quick-arrow{transform:translateX(2px);color:var(--wb-accent)}.wb-quick strong{display:block;margin-top:10px;color:#2c4056;font-size:12px;font-weight:680}.wb-quick p{margin:4px 0 0;color:var(--wb-muted);font-size:10px;line-height:1.45}
.wb-file-table{width:100%}.wb-file-head,.wb-file-row{display:grid;grid-template-columns:minmax(250px,1fr) 155px 150px;align-items:center;column-gap:12px}.wb-file-head{height:38px;padding:0 17px;background:#f8fafc;color:#91a0af;font-size:10px}.wb-file-row{width:100%;min-height:62px;padding:8px 17px;border:0;border-top:1px solid #f0f3f6;background:#fff;text-align:left;transition:.15s}.wb-file-row:first-of-type{border-top:0}.wb-file-row:hover{background:#fbfdff}.wb-file-main{min-width:0;display:flex;align-items:center;gap:11px}.wb-file-main .file-symbol{width:36px;height:38px;border-radius:10px;box-shadow:none}.wb-file-main .file-symbol iconify-icon{font-size:27px}.wb-file-name{min-width:0}.wb-file-name strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#2a4058;font-size:12px;font-weight:650}.wb-file-name span{display:block;margin-top:4px;color:#97a5b4;font-size:10px}.wb-source{color:#63778d;font-size:11px}.wb-time{color:#7f90a3;font-size:11px}.wb-file-row:focus-visible{outline:2px solid rgba(65,107,139,.2);outline-offset:-2px}
.wb-task-list{padding:5px 15px 9px}.wb-task{width:100%;padding:12px 2px;display:grid;grid-template-columns:30px minmax(0,1fr) auto;gap:10px;align-items:center;border:0;border-bottom:1px solid #eef2f5;background:transparent;text-align:left}.wb-task:last-child{border-bottom:0}.wb-task:hover .wb-task-title{color:var(--wb-accent-strong)}.wb-task-icon{width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#f2f5f7;color:#6c8296}.wb-task-icon .icon{width:15px;height:15px}.wb-task-title{display:block;color:#344a61;font-size:11px;font-weight:650}.wb-task-copy{display:block;margin-top:3px;color:#98a5b3;font-size:10px}.wb-task-tag{height:22px;display:inline-flex;align-items:center;padding:0 7px;border-radius:7px;background:#f1f4f7;color:#6d8195;font-size:9px}.wb-task-tag.warn{background:#faf1df;color:#936627}.wb-task-tag.danger{background:#f9eaea;color:#a34d4d}
.wb-usage{padding:16px 17px}.wb-usage-total{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}.wb-usage-total strong{color:var(--wb-ink);font-size:24px;line-height:1;font-weight:720}.wb-usage-total span{color:var(--wb-muted);font-size:10px}.wb-usage-bar{height:8px;margin-top:15px;display:flex;gap:3px;overflow:hidden;border-radius:999px;background:#edf1f4}.wb-usage-bar i{display:block;height:100%;border-radius:999px}.wb-usage-bar i:nth-child(1){flex:52;background:#5f83a0}.wb-usage-bar i:nth-child(2){flex:29;background:#93b1c7}.wb-usage-bar i:nth-child(3){flex:19;background:#c4d5e2}.wb-usage-legend{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.wb-usage-legend div{color:#7f90a3;font-size:9px}.wb-usage-legend b{display:block;margin-top:3px;color:#4e6277;font-size:11px;font-weight:650}.wb-dot{width:6px;height:6px;display:inline-block;margin-right:5px;border-radius:2px;background:#5f83a0}.wb-usage-legend div:nth-child(2) .wb-dot{background:#93b1c7}.wb-usage-legend div:nth-child(3) .wb-dot{background:#c4d5e2}
.wb-activity-list{padding:4px 15px 8px}.wb-activity{width:100%;padding:11px 1px;display:grid;grid-template-columns:30px minmax(0,1fr);gap:10px;border:0;border-bottom:1px solid #eef2f5;background:transparent;text-align:left}.wb-activity:last-child{border-bottom:0}.wb-activity-avatar{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:#edf2f5;color:#647b8f;font-size:10px;font-weight:700}.wb-activity-main{min-width:0;color:#53677c;font-size:10px;line-height:1.5}.wb-activity-main strong{color:#33495f;font-size:11px}.wb-activity-main span{display:block;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#99a6b3}.wb-activity:hover .wb-activity-main strong{color:var(--wb-accent-strong)}
@media(max-width:1260px){.wb-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.wb-quick-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.wb-layout{grid-template-columns:minmax(0,1.45fr) minmax(290px,.75fr)}}
@media(max-width:980px){.wb-layout{grid-template-columns:1fr}.wb-intro-meta{display:none}.wb-file-head,.wb-file-row{grid-template-columns:minmax(220px,1fr) 130px}.wb-file-head span:nth-child(3),.wb-file-row .wb-time{display:none}}
@media(max-width:680px){.wb-metrics,.wb-quick-grid{grid-template-columns:1fr}.wb-intro{align-items:flex-start}.wb-file-head,.wb-file-row{grid-template-columns:1fr}.wb-file-head span:not(:first-child),.wb-file-row .wb-source,.wb-file-row .wb-time{display:none}}
</style>
</head>
<body>
<iframe id="prototypeFrame" src="web-prototype.html" title="智汇云知 Web 端交互原型"></iframe>
<div class="patch-error" id="patchError"><div><strong>工作台增强样式未能加载</strong><p>请通过同一站点地址访问此页面。原始 Web 端原型仍可直接打开。</p></div></div>
<script id="workbenchPatch" type="text/plain">
workbench = function(){
  const now=new Date();
  const hour=now.getHours();
  const greeting=hour<6?'夜深了':hour<11?'上午好':hour<14?'中午好':hour<18?'下午好':'晚上好';
  const dateText=new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric',weekday:'short'}).format(now);
  const recent=[
    {file:personalFiles[2],space:'personal',source:'个人空间'},
    {file:personalFiles[3],space:'personal',source:'个人空间'},
    {file:personalFiles[4],space:'personal',source:'个人空间'},
    {file:(enterpriseFiles['研发中心']||[])[3],space:'enterprise',source:'企业空间 / 研发中心'}
  ].filter(item=>item.file);
  const recentRows=recent.map(({file,space,source})=>`<button class="wb-file-row" onclick="openFile('${file.id}','${space}')" title="打开 ${safe(file.name)}"><span class="wb-file-main">${fileVisual(file)}<span class="wb-file-name"><strong>${safe(file.name)}</strong><span>${file.favorite?'已收藏 · ':''}${file.tag?safe(file.tag):'普通文件'}</span></span></span><span class="wb-source">${source}</span><span class="wb-time">${safe(file.modified)}</span></button>`).join('');
  return `<section class="workbench-page">
    ${pageHead('工作台','聚合近期文件、待处理事项与协作动态')}
    <div class="wb-intro">
      <div class="wb-intro-copy"><strong>${greeting}，张明远</strong><span>今天有 5 项待处理事项，其中 2 项即将超时。</span></div>
      <div class="wb-intro-meta"><div><small>今天</small><b>${dateText}</b></div><div><small>协作更新</small><b>9 条</b></div></div>
    </div>
    <div class="wb-metrics">
      <button class="wb-metric" onclick="navigate('personal')"><span class="wb-metric-top"><span>最近访问</span><span class="wb-metric-icon">${icon('clock')}</span></span><span class="wb-metric-value"><strong>18</strong><span>个文件</span></span><span class="wb-metric-note"><em>+6</em> 较昨日新增</span></button>
      <button class="wb-metric is-urgent" onclick="navigate('related')"><span class="wb-metric-top"><span>待我处理</span><span class="wb-metric-icon">${icon('message')}</span></span><span class="wb-metric-value"><strong>5</strong><span>项任务</span></span><span class="wb-metric-note"><em>2 项</em> 权限申请即将超时</span></button>
      <button class="wb-metric is-collab" onclick="navigate('collaboration')"><span class="wb-metric-top"><span>协作空间</span><span class="wb-metric-icon">${icon('users')}</span></span><span class="wb-metric-value"><strong>7</strong><span>个空间</span></span><span class="wb-metric-note"><em>3 个</em> 今天有更新</span></button>
      <button class="wb-metric is-link" onclick="navigate('links')"><span class="wb-metric-top"><span>有效外链</span><span class="wb-metric-icon">${icon('link')}</span></span><span class="wb-metric-value"><strong>12</strong><span>条链接</span></span><span class="wb-metric-note"><em>1 条</em> 将在 3 天内失效</span></button>
    </div>
    <div class="wb-layout">
      <div class="wb-stack">
        <section class="wb-panel">
          <div class="wb-panel-head"><div><div class="wb-panel-title">快捷入口</div><div class="wb-panel-subtitle">按常见工作场景快速开始</div></div></div>
          <div class="wb-quick-grid">
            <button class="wb-quick" onclick="navigate('enterprise')"><span class="wb-quick-top"><span class="wb-quick-icon">${icon('building')}</span><span class="wb-quick-arrow">${icon('chevron')}</span></span><strong>进入企业空间</strong><p>查阅部门资料与组织知识资产</p></button>
            <button class="wb-quick" onclick="navigate('personal')"><span class="wb-quick-top"><span class="wb-quick-icon">${icon('user')}</span><span class="wb-quick-arrow">${icon('chevron')}</span></span><strong>整理个人文件</strong><p>管理工作草稿与临时资料</p></button>
            <button class="wb-quick" onclick="navigate('collaboration')"><span class="wb-quick-top"><span class="wb-quick-icon">${icon('users')}</span><span class="wb-quick-arrow">${icon('chevron')}</span></span><strong>项目协作</strong><p>跨部门共同维护项目文件</p></button>
            <button class="wb-quick" onclick="navigate('collect')"><span class="wb-quick-top"><span class="wb-quick-icon">${icon('collect')}</span><span class="wb-quick-arrow">${icon('chevron')}</span></span><strong>文件收集</strong><p>查看或发起成员材料收集</p></button>
          </div>
        </section>
        <section class="wb-panel">
          <div class="wb-panel-head"><div><div class="wb-panel-title">最近访问</div><div class="wb-panel-subtitle">继续处理最近打开的文件</div></div><button class="wb-head-link" onclick="navigate('personal')">查看全部</button></div>
          <div class="wb-file-table"><div class="wb-file-head"><span>名称</span><span>来源</span><span>修改时间</span></div>${recentRows}</div>
        </section>
      </div>
      <div class="wb-stack">
        <section class="wb-panel">
          <div class="wb-panel-head"><div><div class="wb-panel-title">待我处理</div><div class="wb-panel-subtitle">优先处理临近截止事项</div></div><button class="wb-head-link" onclick="navigate('related')">查看全部</button></div>
          <div class="wb-task-list">
            <button class="wb-task" onclick="navigate('related')"><span class="wb-task-icon">${icon('shield')}</span><span><span class="wb-task-title">权限申请待审批</span><span class="wb-task-copy">2 项申请将在今天超时</span></span><span class="wb-task-tag danger">紧急</span></button>
            <button class="wb-task" onclick="navigate('collect')"><span class="wb-task-icon">${icon('collect')}</span><span><span class="wb-task-title">文件收集待提交</span><span class="wb-task-copy">2 个收集任务尚未完成</span></span><span class="wb-task-tag warn">今天</span></button>
            <button class="wb-task" onclick="navigate('links')"><span class="wb-task-icon">${icon('link')}</span><span><span class="wb-task-title">外链即将失效</span><span class="wb-task-copy">1 条链接将在 3 天内失效</span></span><span class="wb-task-tag">3 天</span></button>
          </div>
        </section>
        <section class="wb-panel">
          <div class="wb-panel-head"><div><div class="wb-panel-title">空间使用概览</div><div class="wb-panel-subtitle">当前文件资产分布</div></div></div>
          <div class="wb-usage"><div class="wb-usage-total"><strong>248.6 GB</strong><span>共 6,842 个文件</span></div><div class="wb-usage-bar"><i></i><i></i><i></i></div><div class="wb-usage-legend"><div><span class="wb-dot"></span>企业空间<b>52%</b></div><div><span class="wb-dot"></span>协作空间<b>29%</b></div><div><span class="wb-dot"></span>个人空间<b>19%</b></div></div></div>
        </section>
        <section class="wb-panel">
          <div class="wb-panel-head"><div><div class="wb-panel-title">协作动态</div><div class="wb-panel-subtitle">与你相关的最新变化</div></div><button class="wb-head-link" onclick="navigate('related')">查看全部</button></div>
          <div class="wb-activity-list">
            <button class="wb-activity" onclick="navigate('collaboration')"><span class="wb-activity-avatar">许</span><span class="wb-activity-main"><strong>许欣更新了《交互原型评审稿》</strong><span>企业网盘 UI 评审组 · 12 分钟前</span></span></button>
            <button class="wb-activity" onclick="navigate('collaboration')"><span class="wb-activity-avatar">周</span><span class="wb-activity-main"><strong>周凯邀请你评审架构方案</strong><span>智能知识库一期项目 · 1 小时前</span></span></button>
            <button class="wb-activity" onclick="navigate('related')"><span class="wb-activity-avatar">李</span><span class="wb-activity-main"><strong>李晓华共享了季度经营分析报告</strong><span>与我相关 · 昨天 17:20</span></span></button>
          </div>
        </section>
      </div>
    </div>
  </section>`;
};
</script>
<script>
(function(){
  const frame=document.getElementById('prototypeFrame');
  const error=document.getElementById('patchError');
  frame.addEventListener('load',function(){
    try{
      const win=frame.contentWindow;
      const doc=frame.contentDocument;
      const style=doc.createElement('style');
      style.id='workbench-v2-styles';
      style.textContent=document.getElementById('workbenchStyles').textContent;
      doc.head.appendChild(style);
      win.eval(document.getElementById('workbenchPatch').textContent);
      win.eval("if(state.page==='workbench'){render();document.querySelector('.main')?.scrollTo(0,0)}");
      document.title='智汇云知｜工作台';
    }catch(err){
      console.error('Workbench enhancement failed:',err);
      error.classList.add('show');
    }
  });
})();
</script>
</body>
</html>
