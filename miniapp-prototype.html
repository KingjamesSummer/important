</style></head><body>
<div class="canvas">
<section class="info-panel"><span class="eyebrow"><iconify-icon icon="solar:cloud-file-bold-duotone"></iconify-icon> 智汇云知 · Mini Program</span><h1>把企业知识库<br>装进手机里</h1><p>延续 Web 端蓝白视觉体系，围绕快速访问、移动上传、协作处理和消息触达重新组织小程序端信息架构。</p><div class="feature-list"><div class="feature"><i><iconify-icon icon="solar:folder-with-files-bold-duotone"></iconify-icon></i><div><strong>三空间统一访问</strong><span>企业、个人、协作空间随时切换</span></div></div><div class="feature"><i><iconify-icon icon="solar:upload-square-bold-duotone"></iconify-icon></i><div><strong>移动上传与分享</strong><span>拍照、文件、微信会话快速导入</span></div></div><div class="feature"><i><iconify-icon icon="solar:shield-check-bold-duotone"></iconify-icon></i><div><strong>安全能力不缩水</strong><span>外链、提取码、权限与水印策略</span></div></div></div></section>
<div class="phone-wrap"><div class="phone"><div class="screen"><div class="island"></div><div class="statusbar"><span>9:41</span><div class="status-icons"><iconify-icon icon="solar:signal-bold"></iconify-icon><iconify-icon icon="solar:wi-fi-router-minimalistic-bold"></iconify-icon><iconify-icon icon="solar:battery-charge-bold"></iconify-icon></div></div><div class="appview" id="appview"></div><nav class="tabbar" id="tabbar"></nav><div id="overlay"></div></div></div></div>
<section class="screen-panel"><h3>页面导航</h3><div class="screen-list" id="screenList"></div><div class="note">原型支持底部 Tab 切换、空间类型切换、文件操作面板、上传反馈和消息状态演示。界面尺寸按 390 × 844 设计。</div></section>
</div>
<script>
const state={page:'home',space:'personal',sheet:null,toast:null};
const pages=[['home','solar:home-2-bold-duotone','首页','快捷入口与最近访问'],['files','solar:folder-with-files-bold-duotone','文件','三空间移动文件管理'],['collab','solar:users-group-rounded-bold-duotone','协作','项目空间与成员动态'],['messages','solar:bell-bold-duotone','消息','分享、审批与系统通知'],['profile','solar:user-circle-bold-duotone','我的','账号、容量与安全设置']];
const files={enterprise:[['solar:folder-bold-duotone','制度与规范','文件夹 · 24 项'],['vscode-icons:file-type-pdf2','集团信息安全管理办法.pdf','3.6 MB · 今天 10:12'],['vscode-icons:file-type-word','公文格式规范（2026版）.docx','1.2 MB · 昨天 16:32']],personal:[['solar:folder-bold-duotone','我的项目资料','文件夹 · 16 项'],['vscode-icons:file-type-word','个人工作计划.docx','328 KB · 今天 08:32'],['vscode-icons:file-type-excel','任务跟踪表.xlsx','736 KB · 昨天 14:20'],['vscode-icons:file-type-powerpoint','周例会汇报.pptx','8.9 MB · 06-20 17:08']],collab:[['solar:folder-bold-duotone','01 产品需求','文件夹 · 12 项'],['vscode-icons:file-type-pdf2','系统架构评审稿.pdf','8.6 MB · 今天 09:20'],['vscode-icons:file-type-figma','交互视觉规范.fig','18.3 MB · 昨天 18:31']]};
function recentRow(f){return `<div class="recent" onclick="openSheet('${f[1]}','${f[0]}')"><div class="file-icon"><iconify-icon icon="${f[0]}"></iconify-icon></div><div class="file-main"><strong>${f[1]}</strong><span>${f[2]}</span></div><button class="more"><iconify-icon icon="solar:menu-dots-bold"></iconify-icon></button></div>`}
function home(){return `<div class="page"><div class="page-top"><div class="hello"><div><h2>早上好，张明远</h2><p>今天有 3 条协作动态等待处理</p></div><div class="avatar">张</div></div><div class="search"><iconify-icon icon="solar:magnifer-linear"></iconify-icon><input placeholder="搜索文件、空间或成员"><kbd>搜索</kbd></div></div><div class="hero"><div class="hero-label">个人空间用量</div><h3>我的知识资产</h3><p>最近 7 天新增 18 个文件</p><div class="hero-row"><div class="hero-number">31.4 <small>GB / 100 GB</small></div><button class="hero-btn" onclick="go('files')">查看文件</button></div></div><div class="section"><div class="section-head"><strong>快捷操作</strong><button>全部工具</button></div><div class="quick-grid"><button class="quick" onclick="notify('请选择需要上传的文件')"><i><iconify-icon icon="solar:upload-square-bold-duotone"></iconify-icon></i>上传文件</button><button class="quick" onclick="notify('已创建新文件夹')"><i><iconify-icon icon="solar:folder-with-files-bold-duotone"></iconify-icon></i>新建文件夹</button><button class="quick" onclick="notify('进入安全外链')"><i><iconify-icon icon="solar:link-circle-bold-duotone"></iconify-icon></i>安全外链</button><button class="quick" onclick="go('collab')"><i><iconify-icon icon="solar:users-group-rounded-bold-duotone"></iconify-icon></i>协作空间</button></div></div><div class="section"><div class="section-head"><strong>最近访问</strong><button onclick="go('files')">查看全部</button></div><div class="card">${files.personal.slice(1,4).map(recentRow).join('')}</div></div></div>`}
function filePage(){return `<div class="page"><div class="titlebar"><h2>文件</h2><button class="icon-btn" onclick="notify('已打开筛选')"><iconify-icon icon="solar:filter-bold-duotone"></iconify-icon></button></div><div class="seg">${[['enterprise','企业空间'],['personal','个人空间'],['collab','协作空间']].map(x=>`<button class="${state.space===x[0]?'active':''}" onclick="setSpace('${x[0]}')">${x[1]}</button>`).join('')}</div><div class="mini-search"><iconify-icon icon="solar:magnifer-linear"></iconify-icon><input placeholder="在当前空间中搜索"></div><div class="folder-strip">${files[state.space].filter(x=>x[0].includes('folder')).concat([['solar:folder-bold-duotone','共享资料','文件夹 · 8 项'],['solar:folder-bold-duotone','归档文件','文件夹 · 21 项']]).map(f=>`<div class="folder-card"><iconify-icon icon="${f[0]}"></iconify-icon><strong>${f[1]}</strong><span>${f[2]}</span></div>`).join('')}</div><div class="section"><div class="section-head"><strong>全部文件</strong><button>按时间排序</button></div><div class="card">${files[state.space].map(recentRow).join('')}</div></div></div><button class="fab" onclick="notify('上传任务已加入队列')"><iconify-icon icon="solar:add-circle-bold"></iconify-icon></button>`}
function collab(){const cards=[['智能知识库一期项目','产品、研发、测试共同维护需求、设计与交付材料。','86 个文件 · 今天 09:42'],['2026 数字化转型方案','集团数字化建设规划、调研和汇报材料。','42 个文件 · 昨天 17:21'],['企业网盘 UI 评审组','集中管理原型稿、视觉规范和评审意见。','31 个文件 · 06-21 15:18']];return `<div class="page"><div class="titlebar"><h2>协作空间</h2><button class="icon-btn" onclick="notify('新建协作空间')"><iconify-icon icon="solar:add-circle-bold-duotone"></iconify-icon></button></div><div class="mini-search"><iconify-icon icon="solar:magnifer-linear"></iconify-icon><input placeholder="搜索协作空间"></div><div class="section"><div class="section-head"><strong>我参与的空间</strong><button>已归档</button></div>${cards.map((c,i)=>`<div class="card collab-card" onclick="notify('进入：${c[0]}')"><div class="collab-top"><div class="collab-logo"><iconify-icon icon="solar:users-group-rounded-bold-duotone"></iconify-icon></div><div class="collab-main"><strong>${c[0]}</strong><p>${c[1]}</p></div><iconify-icon icon="solar:alt-arrow-right-linear"></iconify-icon></div><div style="display:flex;align-items:center"><div class="avatars"><span class="mini-avatar">张</span><span class="mini-avatar">周</span><span class="mini-avatar">许</span><span class="mini-avatar">+${i+2}</span></div><span class="collab-meta">${c[2]}</span></div></div>`).join('')}</div></div>`}
function messages(){const items=[['solar:share-circle-bold-duotone','周凯向你共享了文件','《智能知识库总体架构方案.pdf》','10:28',1],['solar:users-group-rounded-bold-duotone','协作空间成员变更','许欣加入“企业网盘 UI 评审组”','09:46',1],['solar:shield-check-bold-duotone','安全外链访问提醒','你创建的外链今天被访问 6 次','昨天',0],['solar:trash-bin-trash-bold-duotone','文件即将到期清理','误删恢复中有 2 个文件将在 3 天后清理','06-21',0]];return `<div class="page"><div class="titlebar"><h2>消息</h2><button class="icon-btn" onclick="notify('已全部标记为已读')"><iconify-icon icon="solar:check-read-bold-duotone"></iconify-icon></button></div><div class="section"><div class="card">${items.map(x=>`<div class="message-item"><div class="message-icon ${x[4]?'unread':''}"><iconify-icon icon="${x[0]}"></iconify-icon></div><div class="message-main"><strong>${x[1]}</strong><p>${x[2]}</p></div><span class="message-time">${x[3]}</span></div>`).join('')}</div></div></div>`}
function profile(){const menus=[['solar:star-bold-duotone','我的收藏'],['solar:link-circle-bold-duotone','安全外链'],['solar:trash-bin-trash-bold-duotone','误删恢复'],['solar:shield-check-bold-duotone','安全与登录'],['solar:settings-bold-duotone','通用设置']];return `<div class="page"><div class="profile-hero"><div class="profile-row"><div class="profile-avatar">张</div><div><h3>张明远</h3><p>研发中心 · 技术开发岗</p></div><iconify-icon style="margin-left:auto" icon="solar:qr-code-bold-duotone"></iconify-icon></div><div class="usage"><div class="usage-top"><span>个人空间</span><span>31.4 GB / 100 GB</span></div><div class="usage-bar"><i></i></div></div></div><div class="card menu-card">${menus.map(x=>`<div class="menu-row" onclick="notify('${x[1]}')"><i><iconify-icon icon="${x[0]}"></iconify-icon></i><span>${x[1]}</span><iconify-icon icon="solar:alt-arrow-right-linear"></iconify-icon></div>`).join('')}</div><div style="padding:20px 16px;text-align:center;font-size:10px;color:#9aa8b8">智汇云知 v1.0 · 企业知识资产安全管理平台</div></div>`}
function render(){document.getElementById('appview').innerHTML=state.page==='home'?home():state.page==='files'?filePage():state.page==='collab'?collab():state.page==='messages'?messages():profile();document.getElementById('tabbar').innerHTML=pages.map(x=>`<button class="tab ${state.page===x[0]?'active':''}" onclick="go('${x[0]}')"><iconify-icon icon="${x[1]}"></iconify-icon><span>${x[2]}</span></button>`).join('');document.getElementById('screenList').innerHTML=pages.map(x=>`<button class="screen-btn ${state.page===x[0]?'active':''}" onclick="go('${x[0]}')"><i><iconify-icon icon="${x[1]}"></iconify-icon></i><div><strong>${x[2]}</strong><span>${x[3]}</span></div></button>`).join('');document.getElementById('overlay').innerHTML=state.sheet?sheet():state.toast?`<div class="toast">${state.toast}</div>`:'';requestAnimationFrame(()=>{if(window.anime)anime({targets:'.page>*',opacity:[0,1],translateY:[7,0],delay:anime.stagger(35),duration:320,easing:'easeOutQuad'})})}
function go(p){state.page=p;state.sheet=null;render()}function setSpace(s){state.space=s;render()}function openSheet(name,icon){state.sheet={name,icon};render()}function sheet(){return `<div class="sheet-layer" onclick="if(event.target===this){state.sheet=null;render()}"><div class="sheet"><div class="grab"></div><div class="sheet-file"><div class="file-icon"><iconify-icon icon="${state.sheet.icon}"></iconify-icon></div><div class="file-main"><strong>${state.sheet.name}</strong><span>选择要执行的操作</span></div></div><div class="sheet-actions"><button class="sheet-action" onclick="notify('正在预览文件')"><iconify-icon icon="solar:eye-bold-duotone"></iconify-icon>预览</button><button class="sheet-action" onclick="notify('已开始下载')"><iconify-icon icon="solar:download-square-bold-duotone"></iconify-icon>下载</button><button class="sheet-action" onclick="notify('分享链接已复制')"><iconify-icon icon="solar:share-circle-bold-duotone"></iconify-icon>分享</button><button class="sheet-action" onclick="notify('已加入收藏')"><iconify-icon icon="solar:star-bold-duotone"></iconify-icon>收藏</button></div></div></div>`}function notify(msg){state.sheet=null;state.toast=msg;render();setTimeout(()=>{state.toast=null;render()},1500)}render();
</script></body></html>
